// ── BOARD SERIALISATION ───────────────────────────────────────────────
// Firebase can't store arrays with null — serialize board to flat object
function serializeBoard(board) {
  var obj = {};
  for (var r=0; r<8; r++) for (var c=0; c<8; c++) {
    var p = board[r][c];
    if (p) obj[`${r}_${c}`] = p;
  }
  return obj;
}

function deserializeBoard(obj) {
  var board = Array(8).fill(null).map(() => Array(8).fill(null));
  if (!obj) return board;
  for (var [key, val] of Object.entries(obj)) {
    var [r,c] = key.split('_').map(Number);
    board[r][c] = val;
  }
  return board;
}

// ── GAME STATE → FIREBASE ─────────────────────────────────────────────
function serializeGameState(G) {
  return {
    mode:     G.mode,
    turn:     G.turn,
    board:    serializeBoard(G.board),
    ep:       G.ep    ? `${G.ep.row},${G.ep.col}`    : null,
    cr:       { wk:G.cr.w.k, wq:G.cr.w.q, bk:G.cr.b.k, bq:G.cr.b.q },
    rsc:      { wk:G.rsc.w.k, wq:G.rsc.w.q, bk:G.rsc.b.k, bq:G.rsc.b.q },
    lmFrom:   G.lmFrom || null,
    lmTo:     G.lmTo   || null,
    hmc:      G.hmc,
    posHist:  G.posHist.length ? G.posHist.join('|') : null,
    over:     G.over,
    winner:   G.winner || null,
    // Checkers
    mustCap:  G.mustCap,
    chain:    G.chain,
    chainSq:  G.chainSq ? `${G.chainSq.row},${G.chainSq.col}` : null,
    // CTC
    ctcScore: G.ctcScore,
    ctcBonus: G.ctcBonus ? `${G.ctcBonus.row},${G.ctcBonus.col}` : null,
    // Chess123
    skills:   G.mode === 'chess123' ? {
      w: serializeSkills(G.skills.w),
      b: serializeSkills(G.skills.b),
    } : null,
    c123phase: G.mode === 'chess123' ? G.c123.phase : null,
  };
}

function serializeSkills(sk) {
  return {
    bank:         sk.bank,
    checkCount:   sk.checkCount,
    s2unlocked:   sk.s2unlocked,
    s2used:       sk.s2used,
    autoBank:     sk.autoBank.length ? sk.autoBank.map(a=>a.turnsLeft).join(',') : null,
    spUnlocked:   sk.spUnlocked,
    spPending:    sk.spPending,
    spConfirming: sk.spConfirming,
    spDone:       sk.spDone,
    cooldown:     sk.cooldown,
    midLost:      sk.midLost,
  };
}

function deserializeGameState(data, G) {
  if (!data) return;
  G.mode    = data.mode    || G.mode;
  G.turn    = data.turn    || 'w';
  G.board   = deserializeBoard(data.board);
  G.ep      = data.ep ? { row: parseInt(data.ep.split(',')[0]), col: parseInt(data.ep.split(',')[1]) } : null;
  G.cr      = { w:{k:!!data.cr?.wk, q:!!data.cr?.wq}, b:{k:!!data.cr?.bk, q:!!data.cr?.bq} };
  G.rsc     = { w:{k:data.rsc?.wk??7, q:data.rsc?.wq??0}, b:{k:data.rsc?.bk??7, q:data.rsc?.bq??0} };
  G.lmFrom  = data.lmFrom  || null;
  G.lmTo    = data.lmTo    || null;
  G.hmc     = data.hmc     || 0;
  G.posHist = data.posHist ? data.posHist.split('|') : [];
  G.over    = !!data.over;
  G.mustCap = !!data.mustCap;
  G.chain   = !!data.chain;
  G.chainSq = data.chainSq ? { row:parseInt(data.chainSq.split(',')[0]), col:parseInt(data.chainSq.split(',')[1]) } : null;
  G.ctcScore = data.ctcScore || {w:0, b:0};
  G.ctcBonus = data.ctcBonus ? { row:parseInt(data.ctcBonus.split(',')[0]), col:parseInt(data.ctcBonus.split(',')[1]) } : null;

  if (data.mode === 'chess123' && data.skills) {
    G.skills = {
      w: deserializeSkills(data.skills.w),
      b: deserializeSkills(data.skills.b),
    };
    G.c123.phase = data.c123phase || 'normal';
  }
}

function deserializeSkills(sk) {
  if (!sk) return null;
  var s = freshSkills();
  s.bank         = sk.bank         ?? 2;
  s.checkCount   = sk.checkCount   ?? 0;
  s.s2unlocked   = !!sk.s2unlocked;
  s.s2used       = !!sk.s2used;
  s.autoBank     = sk.autoBank ? sk.autoBank.split(',').map(t=>({turnsLeft:parseInt(t)})) : [];
  s.spUnlocked   = !!sk.spUnlocked;
  s.spPending    = sk.spPending    ?? 0;
  s.spConfirming = !!sk.spConfirming;
  s.spDone       = !!sk.spDone;
  s.cooldown     = !!sk.cooldown;
  s.midLost      = sk.midLost      ?? 0;
  return s;
}

// ── ROOM OPERATIONS ───────────────────────────────────────────────────

// Create a new room — called by host
async function createRoom(roomId, mode, hostColor, G) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var expires = Date.now() + 6 * 60 * 60 * 1000; // 6 hours

  var roomData = {
    mode,
    status:    'waiting',
    createdAt: serverTimestamp(),
    expiresAt: expires,
    players: {
      [hostColor]: { joined: true, ready: true }
    },
    myColor:  hostColor,
    ...serializeGameState(G),
  };

  await set(roomRef, roomData);

  // Auto-cleanup on disconnect if still waiting
  onDisconnect(ref(db, `rooms/${roomId}/players/${hostColor}`))
    .remove();

  return roomId;
}

// Join existing room — called by guest
async function joinRoom(roomId, guestColor) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var snap    = await get(roomRef);

  if (!snap.exists()) throw new Error('Room not found');
  var data = snap.val();
  if (data.status !== 'waiting') throw new Error('Game already started');
  if (data.players?.[guestColor]) throw new Error('Color already taken');

  await update(ref(db, `rooms/${roomId}`), {
    [`players/${guestColor}`]: { joined: true, ready: true },
    status: 'playing',
  });

  onDisconnect(ref(db, `rooms/${roomId}/players/${guestColor}`))
    .remove();

  return data;
}

// Submit a move — write full game state to Firebase
async function submitMove(roomId, G) {
  await update(ref(db, `rooms/${roomId}`), serializeGameState(G));
}

// Listen to room changes — fires on every state update
function listenRoom(roomId, callback) {
  var roomRef = ref(db, `rooms/${roomId}`);
  onValue(roomRef, snap => {
    if (snap.exists()) callback(snap.val());
  });
  return () => off(roomRef); // returns unsubscribe fn
}

// End game
async function endRoom(roomId, winner) {
  await update(ref(db, `rooms/${roomId}`), {
    status: 'ended',
    winner,
    over:   true,
  });
}

// Get room once (for joining)
async function getRoom(roomId) {
  var snap = await get(ref(db, `rooms/${roomId}`));
  return snap.exists() ? snap.val() : null;
}

// ── STATE ─────────────────────────────────────────────────
var MP = {
  active:      false,
  roomId:      null,
  myColor:     null,   // 'w' or 'b'
  isHost:      false,
  unsubscribe: null,
  oppUnsubscribe: null,

// ── SCREEN SWITCHING ──────────────────────────────────────
function showHomeScreen() {
  document.getElementById('home-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
}
function showGameScreen() {
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
}

// ── URL HELPERS ───────────────────────────────────────────
function getRoomFromURL() {
  var params = new URLSearchParams(window.location.search);
  return { roomId: params.get('r'), color: params.get('c') };
}
function buildJoinURL(roomId, color) {
  var base = window.location.href.split('?')[0];
  return `${base}?r=${roomId}&c=${color}`;
}

// ── MODE LABELS ───────────────────────────────────────────
var modeLabels = {
  standard:'Standard Chess', chess960:'Chess 960',
  kinghill:'King of the Hill', horde:'Horde',
  checkers:'Checkers', anticheckers:'Anti-Checkers',
  coasttocoast:'Coast to Coast', chess123:'Chess123',
};

// ── HOME SCREEN ───────────────────────────────────────────
function renderHome(G, onLocalStart, onGameStart) {
  var el = document.getElementById('home-content');
  if (!el) return;

  var modeBtns = Object.entries(modeLabels).map(([key, label]) =>
    `<button class="home-mode-btn ${G.mode===key?'active':''}" data-mode="${key}">${label}</button>`
  ).join('');

  el.innerHTML = `
    <div class="home-wrap">
      <div class="home-logo-wrap">
        <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
        <div class="home-tagline">Game Variants &nbsp;·&nbsp; by MaxMin</div>
      </div>
      <div class="home-section-label">Select Game</div>
      <div class="home-modes" id="home-modes">${modeBtns}</div>
      <div class="home-actions">
        <button class="home-action-btn home-action-local" id="btn-local">
          <span class="ha-icon">&#9816;</span>
          <span class="ha-text">
            <span class="ha-title">Local Play</span>
            <span class="ha-sub">2 players · 1 device</span>
          </span>
        </button>
        <button class="home-action-btn home-action-multi" id="btn-multi">
          <span class="ha-icon">&#9675;</span>
          <span class="ha-text">
            <span class="ha-title">Multiplayer</span>
            <span class="ha-sub">2 devices · online</span>
          </span>
        </button>
      </div>
      <div class="home-footer">MaxPlay &nbsp;·&nbsp; MaxMin &copy; 2025</div>
    </div>
  `;

  el.querySelectorAll('.home-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      G.mode = btn.dataset.mode;
      el.querySelectorAll('.home-mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === G.mode));
    });
  });

  document.getElementById('btn-local').addEventListener('click', () => onLocalStart(G));
  document.getElementById('btn-multi').addEventListener('click', () => renderMultiLobby(G, onGameStart));
}

// ── MULTIPLAYER LOBBY ─────────────────────────────────────
function renderMultiLobby(G, onGameStart) {
  var el = document.getElementById('home-content');
  el.innerHTML = `
    <div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo" style="margin-bottom:6px">
      <div class="lobby-sub-title">Multiplayer</div>

      <div class="home-section-label">
        Game: <span style="color:#f0f0f0" id="mp-mode-display">${modeLabels[G.mode]}</span>
      </div>
      <div class="home-modes" id="mp-modes" style="margin-bottom:14px">
        ${Object.entries(modeLabels).map(([k,v]) =>
          `<button class="home-mode-btn ${G.mode===k?'active':''}" data-mode="${k}">${v}</button>`
        ).join('')}
      </div>

      <button class="home-btn home-btn-white" id="btn-host-w">&#9898; Host as White / Red</button>
      <button class="home-btn home-btn-black" id="btn-host-b">&#9899; Host as Black</button>

      <div class="home-divider"><span>OR JOIN</span></div>

      <div class="home-join-row">
        <input class="home-join-input" id="join-code" placeholder="ENTER CODE" maxlength="6" autocomplete="off">
        <button class="home-btn home-btn-red home-btn-join" id="btn-join">JOIN</button>
      </div>

      <div class="home-err" id="home-err"></div>
      <button class="home-btn home-btn-back" id="btn-back">&#8592; Back</button>
    </div>
  `;

  // Mode selection in lobby
  el.querySelectorAll('.home-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      G.mode = btn.dataset.mode;
      el.querySelectorAll('.home-mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === G.mode));
      var d = document.getElementById('mp-mode-display');
      if (d) d.textContent = modeLabels[G.mode];
    });
  });

  document.getElementById('btn-host-w').onclick = () => hostGame(G, 'w', onGameStart);
  document.getElementById('btn-host-b').onclick = () => hostGame(G, 'b', onGameStart);
  document.getElementById('btn-join').onclick = () => {
    var code = (document.getElementById('join-code').value || '').trim().toUpperCase();
    if (code.length !== 6) { showErr('Enter a 6-character room code'); return; }
    joinGame(code, G, onGameStart);
  };
  document.getElementById('join-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-join').click();
  });
  document.getElementById('btn-back').onclick = () =>
    renderHome(G, window._onLocalStart, onGameStart);
}

function showErr(msg) {
  var el = document.getElementById('home-err');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ── HOST ──────────────────────────────────────────────────
async function hostGame(G, color, onGameStart) {
  var el = document.getElementById('home-content');
  var roomId = genRoomId();
  el.innerHTML = `<div class="home-wrap"><div class="home-spinner">Creating room…</div></div>`;

  try {
    // Init board BEFORE saving to Firebase so pieces are included
    if (window._initBoard) window._initBoard(G);

    await createRoom(roomId, G.mode, color, G);
    MP.roomId = roomId; MP.myColor = color;
    MP.isHost = true; MP.active = true;
    renderWaiting(roomId, color, G, onGameStart);
  } catch(err) {
    el.innerHTML = `
      <div class="home-wrap">
        <div class="home-err" style="display:block">${err.message.includes('permission') ? '🔒 Firebase rules not set — go to Firebase Console → Realtime Database → Rules and allow read/write.' : 'Error: '+err.message}</div>
        <button class="home-btn home-btn-back" id="btn-retry">← Back</button>
      </div>`;
    document.getElementById('btn-retry').onclick = () =>
      renderMultiLobby(G, onGameStart);
  }
}

// ── WAITING ROOM ──────────────────────────────────────────
function renderWaiting(roomId, myColor, G, onGameStart) {
  var el       = document.getElementById('home-content');
  var oppColor = myColor === 'w' ? 'b' : 'w';
  var joinURL  = buildJoinURL(roomId, oppColor);

  el.innerHTML = `
    <div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
      <div class="lobby-sub-title">Room Created</div>

      <div class="home-room-code" id="room-code-display">${roomId}</div>
      <div class="home-waiting-msg" id="waiting-status">Waiting for opponent…</div>

      <div class="home-room-info">
        <div class="home-room-detail">Mode: <b>${modeLabels[G.mode]}</b></div>
        <div class="home-room-detail">You are: <b>${myColor==='w'?'White / Red':'Black'}</b></div>
      </div>

      <div class="home-qr"><canvas id="qr-canvas"></canvas></div>

      <div class="home-share-label">Share link with opponent</div>
      <div class="home-share-url">${joinURL}</div>

      <button class="home-btn home-btn-copy" id="btn-copy">&#128203; Copy Link</button>
      <button class="home-btn home-btn-back" id="btn-cancel">&#10005; Cancel</button>
    </div>
  `;

  generateQR(joinURL, 'qr-canvas');

  document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard?.writeText(joinURL).then(() => {
      var b = document.getElementById('btn-copy');
      if (b) b.textContent = '✓ Copied!';
      setTimeout(() => { var b2=document.getElementById('btn-copy'); if(b2) b2.textContent='📋 Copy Link'; }, 2000);
    });
  };

  document.getElementById('btn-cancel').onclick = () => {
    if (MP.unsubscribe) MP.unsubscribe();
    MP.active = false; MP.roomId = null; MP.isHost = false;
    renderHome(G, window._onLocalStart, onGameStart);
  };

  // Listen for opponent joining
  MP.unsubscribe = listenRoom(roomId, data => {
    if (data.status === 'playing' && data.players?.w?.joined && data.players?.b?.joined) {
      if (MP.unsubscribe) MP.unsubscribe();
      MP.unsubscribe = null;
      onGameStart(roomId, myColor, G);
    }
  });
}

// ── JOIN ──────────────────────────────────────────────────
async function joinGame(roomId, G, onGameStart) {
  var el = document.getElementById('home-content');
  el.innerHTML = `<div class="home-wrap"><div class="home-spinner">Joining room ${roomId}…</div></div>`;

  try {
    var data = await getRoom(roomId);
    if (!data)                  throw new Error('Room not found. Check code and try again.');
    if (data.status === 'ended') throw new Error('This game has already ended.');

    var wTaken = !!data.players?.w?.joined;
    var bTaken = !!data.players?.b?.joined;
    if (wTaken && bTaken)       throw new Error('Room is full.');

    var myColor = !wTaken ? 'w' : 'b';
    await joinRoom(roomId, myColor);

    // Sync mode from host
    if (data.mode) G.mode = data.mode;

    MP.roomId = roomId; MP.myColor = myColor;
    MP.isHost = false; MP.active = true;
    onGameStart(roomId, myColor, G);
  } catch(err) {
    el.innerHTML = `
      <div class="home-wrap">
        <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
        <div class="home-err" style="display:block">${err.message}</div>
        <div class="home-join-row" style="margin-top:12px">
          <input class="home-join-input" id="retry-code" placeholder="ROOM CODE" maxlength="6" autocomplete="off" value="${roomId}">
          <button class="home-btn home-btn-red home-btn-join" id="btn-retry-join">JOIN</button>
        </div>
        <button class="home-btn home-btn-back" id="btn-back-err" style="margin-top:8px">&#8592; Back</button>
      </div>`;
    document.getElementById('btn-retry-join').onclick = () => {
      var code = (document.getElementById('retry-code').value||'').trim().toUpperCase();
      if (code.length === 6) joinGame(code, G, onGameStart);
    };
    document.getElementById('back-err')?.addEventListener('click', () =>
      renderHome(G, window._onLocalStart, onGameStart));
    document.getElementById('btn-back-err').onclick = () =>
      renderHome(G, window._onLocalStart, onGameStart);
  }
}

// ── QR GENERATOR ─────────────────────────────────────────
function generateQR(url, canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var img = new Image(), size = 180;
  img.onload = () => {
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);
  };
  img.onerror = () => { if(canvas) canvas.style.display='none'; };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}&bgcolor=f0f0f0&color=0d0d0d&margin=10`;
}

// ── AUTO JOIN FROM URL ────────────────────────────────────
async function handleURLJoin(G, onLocalStart, onGameStart) {
  var { roomId, color } = getRoomFromURL();
  if (!roomId) return false;

  // Clear URL params
  window.history.replaceState({}, '', window.location.href.split('?')[0]);

  // Show home screen with spinner
  showHomeScreen();
  var el = document.getElementById('home-content');
  el.innerHTML = `<div class="home-wrap">
    <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
    <div class="home-spinner">Joining room ${roomId}…</div>
  </div>`;

  try {
    var data = await getRoom(roomId);
    if (!data) throw new Error('Room not found.');

    var wTaken = !!data.players?.w?.joined;
    var bTaken = !!data.players?.b?.joined;

    // Determine color
    var myColor = color;
    if (myColor === 'w' && wTaken && !bTaken) myColor = 'b';
    if (myColor === 'b' && bTaken && !wTaken) myColor = 'w';
    if (!myColor) myColor = !wTaken ? 'w' : !bTaken ? 'b' : null;
    if (!myColor || (myColor==='w'&&wTaken) || (myColor==='b'&&bTaken)) {
      // Show manual join form
      el.innerHTML = `<div class="home-wrap">
        <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
        <div class="home-err" style="display:block">Room full or already joined. Enter code to try again:</div>
        <div class="home-join-row" style="margin-top:12px">
          <input class="home-join-input" id="fallback-code" placeholder="ROOM CODE" maxlength="6" value="${roomId}">
          <button class="home-btn home-btn-red home-btn-join" id="btn-fb-join">JOIN</button>
        </div>
        <button class="home-btn home-btn-back" id="btn-fb-back" style="margin-top:8px">&#8592; Home</button>
      </div>`;
      document.getElementById('btn-fb-join').onclick = () => {
        var code = (document.getElementById('fallback-code').value||'').trim().toUpperCase();
        if (code.length===6) joinGame(code, G, onGameStart);
      };
      document.getElementById('btn-fb-back').onclick = () =>
        renderHome(G, window._onLocalStart, onGameStart);
      return true;
    }

    // Sync mode from host
    if (data.mode) G.mode = data.mode;

    await joinRoom(roomId, myColor);
    MP.roomId = roomId; MP.myColor = myColor;
    MP.isHost = false; MP.active = true;
    onGameStart(roomId, myColor, G);
    return true;
  } catch(err) {
    el.innerHTML = `<div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
      <div class="home-err" style="display:block">${err.message}</div>
      <div class="home-join-row" style="margin-top:12px">
        <input class="home-join-input" id="err-code" placeholder="ROOM CODE" maxlength="6" value="${roomId}">
        <button class="home-btn home-btn-red home-btn-join" id="btn-err-join">JOIN</button>
      </div>
      <button class="home-btn home-btn-back" id="btn-err-back" style="margin-top:8px">&#8592; Home</button>
    </div>`;
    document.getElementById('btn-err-join').onclick = () => {
      var code = (document.getElementById('err-code').value||'').trim().toUpperCase();
      if (code.length===6) joinGame(code, G, onGameStart);
    };
    document.getElementById('btn-err-back').onclick = () =>
      renderHome(G, window._onLocalStart, onGameStart);
    return true;
  }
}

function showLobby() {}

// ── main.js ──
// ════════════════════════════════════════════════════════
//  js/main.js
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  GLOBAL STATE
// ════════════════════════════════════════════════════════
var G = freshState();

// ════════════════════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════════════════════
var boardEl    = document.getElementById('board');
var bwrapEl    = document.getElementById('bwrap');
var bcontEl    = document.getElementById('bcont');
var tplrEl     = document.getElementById('tplr');
var lmvEl      = document.getElementById('lmv');
var chkiEl     = document.getElementById('chki');
var scoreRow   = document.getElementById('scoreRow');
var scoreRedEl = document.getElementById('scoreRed');
var scoreBlkEl = document.getElementById('scoreBlk');

// ════════════════════════════════════════════════════════
//  BOARD ORIENTATION
//  White player → pieces at bottom (normal)
//  Black player → board flipped (pieces at bottom)
//  Local play   → never flips
// ════════════════════════════════════════════════════════
function applyBoardOrientation() {
  if (!MP.active) {
    // Local: no flip
    bcontEl.classList.remove('flip');
    return;
  }
  // Multiplayer: Black player sees flipped board (their pieces at bottom)
  if (MP.myColor === 'b') {
    bcontEl.classList.add('flip');
  } else {
    bcontEl.classList.remove('flip');
  }
}

// ════════════════════════════════════════════════════════
//  MOVE SELECTION
// ════════════════════════════════════════════════════════
function getMovesFor(row, col) {
  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  G.mustCap = isC ? anyCapture(G.turn, G.board) : false;

  var ms;
  if (isC)        ms = checkerMoves(row, col, G.board);
  else if (isCTC) ms = ctcMoves(row, col, G.board);
  else            ms = legalMoves(row, col, G);

  if (G.mustCap) ms = ms.filter(m => m.cap);

  if (is123 && G.c123.phase === 'move2-second' && G.c123.firstPiece) {
    if (row === G.c123.firstPiece.row && col === G.c123.firstPiece.col) return [];
  }
  if (is123 && G.c123.phase === 's2-second' && G.c123.firstPiece) {
    if (row !== G.c123.firstPiece.row || col !== G.c123.firstPiece.col) return [];
  }
  return ms;
}

window.activateSkill = function(skillKey) {
  G.hist.push(snapState(G, lmvEl.innerHTML));
  activateSkill123(skillKey, G, chkiEl);
};

// ════════════════════════════════════════════════════════
//  CLICK HANDLER
// ════════════════════════════════════════════════════════
window.handleBoardClick = function(row, col) {
  if (G.over) return;

  // Multiplayer: block clicks on opponent's turn
  if (MP.active && G.turn !== MP.myColor) return;

  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  if (is123 && G.c123.phase === 'sp-promote') {
    execChess123(row, col, null, G, lmvEl, chkiEl);
    if (MP.active && MP.roomId) setTimeout(() => submitMove(MP.roomId, G), 80);
    return;
  }

  if (isCTC && G.ctcBonus) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execCTCBonus(G.ctcBonus.row, G.ctcBonus.col, mv, G, lmvEl, chkiEl);
      if (MP.active && MP.roomId) setTimeout(() => submitMove(MP.roomId, G), 80);
    }
    return;
  }

  if (isC && G.chain && G.chainSq) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execChecker(G.chainSq.row, G.chainSq.col, mv, G, lmvEl, chkiEl);
      if (MP.active && MP.roomId) setTimeout(() => submitMove(MP.roomId, G), 80);
    }
    return;
  }

  if (!G.sel) {
    var p = G.board[row][col];
    if (!p || p.color !== G.turn) return;
    if ((isC||isCTC) && p.type !== 'checker') return;
    if (is123 && G.c123.phase === 's2-second') {
      var fp = G.c123.firstPiece;
      if (!fp || row !== fp.row || col !== fp.col) return;
    }
    var ms = getMovesFor(row, col);
    if (!ms.length) return;
    G.sel = {row, col}; G.moves = ms;
    render(G);
  } else {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      if (!is123) G.hist.push(snapState(G, lmvEl.innerHTML));
      var {row:fr, col:fc} = G.sel;
      G.sel = null; G.moves = [];

      var afterMove = () => {
        if (MP.active && MP.roomId) setTimeout(() => submitMove(MP.roomId, G), 80);
      };

      if (isC)        { execChecker(fr, fc, mv, G, lmvEl, chkiEl); afterMove(); }
      else if (isCTC) { execCTC(fr, fc, mv, G, lmvEl, chkiEl); afterMove(); }
      else if (is123) { execChess123(fr, fc, mv, G, lmvEl, chkiEl); afterMove(); }
      else            { execChess(fr, fc, mv, G, lmvEl, chkiEl); afterMove(); }
    } else {
      var p = G.board[row][col];
      if (p && p.color===G.turn && !((isC||isCTC) && p.type!=='checker')) {
        var ms = getMovesFor(row, col);
        if (ms.length) { G.sel={row,col}; G.moves=ms; render(G); return; }
      }
      G.sel = null; G.moves = [];
      render(G);
    }
  }
};

// ════════════════════════════════════════════════════════
//  OPPONENT DISCONNECT DETECTION
// ════════════════════════════════════════════════════════
var disconnectTimer = null;

function watchOpponentPresence(roomId, oppColor) {
  var presRef = ref(db, `rooms/${roomId}/players/${oppColor}`);
  var unsub = onValue(presRef, snap => {
    if (!snap.exists() || !snap.val()?.joined) {
      // Opponent disconnected
      clearTimeout(disconnectTimer);
      disconnectTimer = setTimeout(() => {
        if (!G.over && MP.active) {
          showDisconnectOverlay();
        }
      }, 3000); // 3 second grace period
    } else {
      clearTimeout(disconnectTimer);
      // Remove disconnect overlay if it was shown
      var ov = document.getElementById('disconnect-overlay');
      if (ov) ov.remove();
    }
  });
  return () => off(presRef);
}

function showDisconnectOverlay() {
  var existing = document.getElementById('disconnect-overlay');
  if (existing) return;

  var ov = document.createElement('div');
  ov.id = 'disconnect-overlay';
  ov.className = 'ov';
  ov.innerHTML = `
    <div class="vcard">
      <div class="vico">📡</div>
      <div class="vtit">Opponent Left</div>
      <div class="vsub">Your opponent disconnected</div>
      <button class="vbtn" onclick="window.doReset()">BACK TO HOME</button>
    </div>
  `;
  bwrapEl.appendChild(ov);
}

// ════════════════════════════════════════════════════════
//  LOCAL GAME START
// ════════════════════════════════════════════════════════
function onLocalStart(G_ref) {
  var mode = G_ref.mode;
  Object.assign(G, freshState());
  G.mode = mode;
  initBoard(G);
  lmvEl.innerHTML = '—';
  chkiEl.innerHTML = '';

  var modeLbl = document.getElementById('game-mode-label');
  var typeLbl = document.getElementById('game-type-label');
  if (modeLbl) modeLbl.textContent = modeLabels[mode] || mode;
  if (typeLbl) { typeLbl.textContent = 'Local'; typeLbl.className = 'game-type-label local'; }

  var clrLbl = document.getElementById('my-color-label');
  if (clrLbl) clrLbl.style.display = 'none';

  bcontEl.classList.remove('flip'); // no flip in local
  showGameScreen();
  render(G);
}
window._onLocalStart = onLocalStart;
window._initBoard = function(g) { initBoard(g); };

// ════════════════════════════════════════════════════════
//  MULTIPLAYER GAME START
// ════════════════════════════════════════════════════════
function onGameStart(roomId, myColor, gameG) {
  MP.active  = true;
  MP.roomId  = roomId;
  MP.myColor = myColor;

  // Color label
  var colorLabel = document.getElementById('my-color-label');
  if (colorLabel) {
    colorLabel.textContent = myColor === 'w' ? 'YOU ARE WHITE / RED' : 'YOU ARE BLACK';
    colorLabel.style.display = 'block';
  }

  // In-game header
  var modeLbl = document.getElementById('game-mode-label');
  var typeLbl = document.getElementById('game-type-label');
  if (modeLbl) modeLbl.textContent = modeLabels[G.mode] || G.mode;
  if (typeLbl) { typeLbl.textContent = 'Online'; typeLbl.className = 'game-type-label online'; }

  // Apply board orientation immediately
  applyBoardOrientation();

  showGameScreen();
  // Show empty board immediately while waiting for first sync
  initBoard(G);
  render(G);

  // Watch opponent presence for disconnect detection
  var oppColor = myColor === 'w' ? 'b' : 'w';
  if (MP.oppUnsubscribe) MP.oppUnsubscribe();
  MP.oppUnsubscribe = watchOpponentPresence(roomId, oppColor);

  // Firebase state listener
  var firstSync = true; // track first update after game starts
  if (MP.unsubscribe) MP.unsubscribe();
  MP.unsubscribe = listenRoom(roomId, data => {
    if (!data || data.status === 'waiting') return;

    // Sync mode
    if (data.mode && data.mode !== G.mode) {
      G.mode = data.mode;
      if (modeLbl) modeLbl.textContent = modeLabels[G.mode] || G.mode;
    }

    // Apply game state from Firebase
    // Host: skip first sync (we already have correct board from initBoard)
    // Guest: always apply (we need the board from host)
    if (!MP.isHost || !firstSync) {
      deserializeGameState(data, G);
    }
    firstSync = false;
    G.sel = null; G.moves = [];

    // Turn indicator
    var isMyTurn = G.turn === MP.myColor;
    if (!G.over) {
      chkiEl.innerHTML = isMyTurn ? '' : '⏳ Opponent\'s turn…';
    }

    // Keep board orientation correct
    applyBoardOrientation();
    render(G);
  });
}

// ════════════════════════════════════════════════════════
//  UNDO
// ════════════════════════════════════════════════════════
function doUndo() {
  if (MP.active) return;
  if (!G.hist.length) return;
  restoreState(G, G.hist.pop(), lmvEl);
  G.over = false; G.sel = null; G.moves = [];
  G.ctcBonus = null;
  clearOverlays();
  render(G);
}

// ════════════════════════════════════════════════════════
//  RESIGN / BACK HOME
// ════════════════════════════════════════════════════════
function doResignOrReset() {
  clearTimeout(disconnectTimer);
  if (MP.active) {
    if (MP.unsubscribe)    MP.unsubscribe();
    if (MP.oppUnsubscribe) MP.oppUnsubscribe();
    MP.active = false; MP.roomId = null; MP.myColor = null;
  }
  clearOverlays();
  var mode = G.mode;
  Object.assign(G, freshState());
  G.mode = mode;
  lmvEl.innerHTML = '—';
  chkiEl.innerHTML = '';

  var clrLbl = document.getElementById('my-color-label');
  if (clrLbl) clrLbl.style.display = 'none';

  bcontEl.classList.remove('flip');
  showHomeScreen();
  renderHome(G, onLocalStart, onGameStart);
}
window.doReset = doResignOrReset;

// ════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════
document.getElementById('game-back-btn')?.addEventListener('click', doResignOrReset);
document.getElementById('undoBtn')?.addEventListener('click', doUndo);
document.getElementById('resetBtn')?.addEventListener('click', doResignOrReset);

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
var joined = await handleURLJoin(G, onLocalStart, onGameStart);
if (!joined) {
  initBoard(G);
  renderHome(G, onLocalStart, onGameStart);
}

})().catch(function(err) {
  console.error('MaxPlay error:', err);
  var d=document.createElement('div');
  d.style.cssText='color:#ff6060;padding:16px;font-family:monospace;position:fixed;top:10px;left:10px;right:10px;background:#0d0d0d;z-index:9999;font-size:11px;border:2px solid #cc2336;border-radius:2px';
  d.textContent='MaxPlay Error: '+err.message;
  document.body.appendChild(d);
});

</script>
