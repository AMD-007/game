<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Multiplayer Game Variants - Online Rooms</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            padding: 12px;
        }

        /* Lobby Styles */
        .lobby-container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 24px 20px;
            text-align: center;
        }

        .lobby-title {
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .lobby-sub {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 32px;
        }

        .room-section {
            background: #16162a;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-family: inherit;
        }

        .btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: #2a2a3e; color: white; margin-top: 10px; }
        .room-code-display {
            background: #0f0f1a;
            padding: 16px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ffd700;
            margin: 16px 0;
        }
        .waiting-message {
            color: #ffd700;
            font-size: 14px;
        }
        .players-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }
        .player-badge {
            background: #2a2a3e;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        /* Game Board Styles (same as original but adapted) */
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }
        .game-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            text-align: center;
        }
        .room-info-bar {
            background: #0f0f1a;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-radius: 40px;
            margin-top: 8px;
        }
        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
        }
        .board-container {
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .board-container.black-turn-view { transform: rotate(180deg); }
        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
        }
        .board-container.black-turn-view .square { transform: rotate(180deg); }
        .square span { font-size: clamp(20px, 6vw, 32px); pointer-events: none; }
        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background: linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow: inset 0 0 0 2px #ffd700; }
        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 25%;
            height: 25%;
            background: #4caf50;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        .square.capture::after { background: #ff5722; width: 55%; height: 55%; border-radius: 8px; }
        .square.in-check { animation: checkPulse 0.5s ease-in-out 3; }
        .square.in-check::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: radial-gradient(circle, rgba(192,57,43,0.6), rgba(192,57,43,0.2));
            border-radius: 4px;
            pointer-events: none;
        }
        .square.hill-square::before {
            content: "🏔️";
            position: absolute;
            font-size: clamp(10px, 3vw, 14px);
            bottom: 2px;
            right: 2px;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes checkPulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.15)} }
        .control-panel { padding: 0 16px 16px 16px; }
        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .turn-indicator { background: linear-gradient(135deg,#2a2a3e,#1a1a2e); border-radius: 50px; padding: 8px 16px; flex:1; border-left:4px solid #ffd700; text-align:center; }
        .turn-player { font-size: 14px; font-weight: 800; color: #ffd700; }
        button { background: #2a2a3e; border: none; color: white; font-weight: 600; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .reset-btn { background: #8b5a2b; }
        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
        }
        .victory-card { background: linear-gradient(145deg,#2a2a3e,#1a1a2e); border-radius: 40px; padding: 20px 30px; text-align: center; border: 2px solid #ffd700; }
        .victory-card .winner-text { font-size: 24px; font-weight: 800; color: #ffd700; }
        .victory-card button { background: #ffd700; color:#1a1a2e; margin-top: 12px; }
        .hidden { display: none; }
        footer { text-align: center; padding: 10px; font-size: 8px; color: #5a5a6e; }
        .red-king { color: #e74c3c; text-shadow: 0 0 6px #ff0000; font-size: clamp(24px, 7vw, 38px); }
        .black-king { color: #1a1a2e; text-shadow: 0 0 6px #4a4a6a; font-size: clamp(24px, 7vw, 38px); }
    </style>
</head>
<body>
<div id="lobbyView" class="lobby-container">
    <div class="lobby-title">🎮 MULTIPLAYER VARIANTS</div>
    <div class="lobby-sub">Create or join a room to play with friends</div>
    
    <div class="room-section">
        <div class="input-group">
            <label>👤 Your Name</label>
            <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="20">
        </div>
        <div class="input-group">
            <label>🎲 Select Game Mode</label>
            <select id="lobbyGameMode">
                <option value="standard">♔ Chess</option>
                <option value="chess960">🎲 Chess960</option>
                <option value="kinghill">🏔️ King of the Hill</option>
                <option value="horde">⚔️ Horde</option>
                <option value="checkers">🔴 Checkers</option>
                <option value="anticheckers">💀 Anti-Checkers</option>
            </select>
        </div>
        <button id="createRoomBtn" class="btn">✨ CREATE NEW ROOM</button>
        <div style="margin: 16px 0; text-align: center; color: #888;">— OR —</div>
        <div class="input-group">
            <label>🔑 Room Code</label>
            <input type="text" id="joinRoomCode" placeholder="Enter 6-digit code" maxlength="6">
        </div>
        <button id="joinRoomBtn" class="btn btn-secondary">🚪 JOIN ROOM</button>
    </div>
</div>

<div id="gameView" class="game-container hidden">
    <div class="game-header">
        <div class="game-title"><h1>🎲 GAME VARIANTS</h1></div>
        <div class="room-info-bar">
            <span>🏠 Room: <strong id="roomCodeDisplay">----</strong></span>
            <span id="gameModeDisplay">♔ Chess</span>
            <button id="leaveGameBtn" style="background:#3a2a2a; padding:4px 12px;">🚪 Leave</button>
        </div>
    </div>
    <div class="board-wrapper" id="boardWrapper">
        <div class="board-container" id="boardContainer">
            <div id="chessboard"></div>
        </div>
    </div>
    <div class="control-panel">
        <div class="status-bar">
            <div class="turn-indicator"><div class="turn-player" id="turnPlayer">Waiting...</div></div>
            <button id="gameResetBtn" class="reset-btn">🔄 NEW GAME</button>
        </div>
        <div class="move-history" id="gameStatus"></div>
    </div>
    <footer>💀 Anti = Lose all pieces to win | 🏔️ Hill = king to center | Board rotates to your side on your turn!</footer>
</div>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };
    
    // For demo purposes, if config is dummy, show error but allow local testing? We'll check
    let database = null;
    let firebaseApp = null;
    let isFirebaseReady = false;
    
    try {
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "AIzaSyDummyKeyReplaceWithYourOwn") {
            firebaseApp = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            isFirebaseReady = true;
            console.log("Firebase initialized");
        } else {
            console.warn("Using fallback local memory mode (no Firebase). For multiplayer, set valid Firebase config.");
            // Fallback: in-memory sync for single-device testing (no real multiplayer)
            isFirebaseReady = false;
        }
    } catch(e) { console.error("Firebase init error", e); isFirebaseReady = false; }
    
    // Game state
    let currentRoomId = null;
    let playerId = null;
    let playerName = "";
    let myColor = null; // 'w' or 'b'
    let currentGameState = null; // board, turn, mode, gameOver, winner
    let selectedSquare = null;
    let validMovesList = [];
    let localGameOver = false;
    let currentMode = 'standard';
    let mustCapture = false, captureChain = false;
    let lastMoveFrom = null, lastMoveTo = null;
    let boardArray = [];
    let currentTurn = 'w';
    
    // DOM elements
    const lobbyView = document.getElementById('lobbyView');
    const gameView = document.getElementById('gameView');
    const boardDiv = document.getElementById('chessboard');
    const boardContainer = document.getElementById('boardContainer');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const roomCodeDisplaySpan = document.getElementById('roomCodeDisplay');
    const gameModeDisplaySpan = document.getElementById('gameModeDisplay');
    const gameStatusDiv = document.getElementById('gameStatus');
    const playerNameInput = document.getElementById('playerNameInput');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const joinRoomCodeInput = document.getElementById('joinRoomCode');
    const leaveGameBtn = document.getElementById('leaveGameBtn');
    const gameResetBtn = document.getElementById('gameResetBtn');
    
    // Helper functions
    function generateRoomCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generatePlayerId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    // Chess logic functions (simplified but full from original)
    function cloneBoard(board) { return board.map(row => row ? row.map(cell => cell ? {...cell} : null) : []); }
    
    // Core game engine functions (compact but complete)
    function getPieceDisplay(piece, mode) {
        if (!piece) return '';
        if (mode === 'checkers' || mode === 'anticheckers') {
            if (piece.king) return `<span class="${piece.color === 'w' ? 'red-king' : 'black-king'}">👑</span>`;
            return piece.color === 'w' ? '🔴' : '⚫';
        }
        const symbols = { 'wr':'♖','wn':'♘','wb':'♗','wq':'♕','wk':'♔','wp':'♙','br':'♜','bn':'♞','bb':'♝','bq':'♛','bk':'♚','bp':'♟' };
        return symbols[(piece.color === 'w' ? 'w' : 'b') + piece.type] || '';
    }
    
    function getAllMovesChess(row, col, boardState, mode) {
        const piece = boardState[row][col];
        if (!piece || (mode !== 'checkers' && mode !== 'anticheckers' && piece.type === 'checker')) return [];
        if (mode === 'checkers' || mode === 'anticheckers') {
            const dir = piece.color === 'w' ? -1 : 1;
            const isKing = piece.king;
            const dirs = isKing ? [-1,1] : [dir];
            const moves = [];
            for (const dr of dirs) {
                for (const dc of [-1,1]) {
                    const r = row+dr, c = col+dc;
                    if (r>=0 && r<8 && c>=0 && c<8 && !boardState[r][c]) moves.push({row:r,col:c,capture:null});
                    const r2 = row+dr*2, c2 = col+dc*2;
                    if (r2>=0 && r2<8 && c2>=0 && c2<8 && boardState[r+dr]?.[c+dc] && boardState[r+dr][c+dc].color !== piece.color && !boardState[r2][c2])
                        moves.push({row:r2,col:c2,capture:{row:r+dr,col:c+dc}});
                }
            }
            return moves;
        }
        // Chess moves
        const moves = [];
        if (piece.type === 'p') {
            const dir = piece.color === 'w' ? -1 : 1;
            const startRow = piece.color === 'w' ? 6 : 1;
            if (row+dir>=0 && row+dir<8 && !boardState[row+dir][col]) moves.push({row:row+dir,col});
            if (row===startRow && !boardState[row+dir][col] && !boardState[row+2*dir][col]) moves.push({row:row+2*dir,col});
            for (const dc of [-1,1]) if (boardState[row+dir]?.[col+dc] && boardState[row+dir][col+dc]?.color !== piece.color) moves.push({row:row+dir,col:col+dc});
        }
        else if (piece.type === 'n') {
            const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
            for (const [dr,dc] of offsets) if (row+dr>=0 && row+dr<8 && col+dc>=0 && col+dc<8 && (!boardState[row+dr][col+dc] || boardState[row+dr][col+dc].color !== piece.color)) moves.push({row:row+dr,col:col+dc});
        }
        else if (piece.type === 'r' || piece.type === 'q') {
            for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) for (let r=row+dr,c=col+dc; r>=0 && r<8 && c>=0 && c<8; r+=dr,c+=dc) { if (!boardState[r][c]) moves.push({row:r,col:c}); else { if (boardState[r][c].color !== piece.color) moves.push({row:r,col:c}); break; } }
        }
        if (piece.type === 'b' || piece.type === 'q') {
            for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) for (let r=row+dr,c=col+dc; r>=0 && r<8 && c>=0 && c<8; r+=dr,c+=dc) { if (!boardState[r][c]) moves.push({row:r,col:c}); else { if (boardState[r][c].color !== piece.color) moves.push({row:r,col:c}); break; } }
        }
        else if (piece.type === 'k') {
            for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) if (!(dr===0 && dc===0) && row+dr>=0 && row+dr<8 && col+dc>=0 && col+dc<8 && (!boardState[row+dr][col+dc] || boardState[row+dr][col+dc].color !== piece.color)) moves.push({row:row+dr,col:col+dc});
        }
        return moves;
    }
    
    function initBoardByMode(mode) {
        let b = Array(8).fill().map(() => Array(8).fill(null));
        if (mode === 'checkers' || mode === 'anticheckers') {
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) if ((r+c)%2===1) { if (r<3) b[r][c]={type:'checker',color:'b',king:false}; else if (r>4) b[r][c]={type:'checker',color:'w',king:false}; }
            return b;
        }
        if (mode === 'horde') {
            const blackPieces = ['r','n','b','q','k','b','n','r'];
            for(let i=0;i<8;i++) b[0][i]={type:blackPieces[i],color:'b'};
            for(let i=0;i<8;i++) b[1][i]={type:'p',color:'b'};
            for(let i=0;i<8;i++) { b[7][i]={type:'p',color:'w'}; b[6][i]={type:'p',color:'w'}; b[5][i]={type:'p',color:'w'}; b[4][i]={type:'p',color:'w'}; }
            const pattern = [false,true,true,false,false,true,true,false];
            for(let i=0;i<8;i++) if(pattern[i]) b[3][i]={type:'p',color:'w'};
            return b;
        }
        const pieces = ['r','n','b','q','k','b','n','r'];
        if (mode === 'chess960') {
            let wRow = [...pieces];
            for(let i=wRow.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [wRow[i],wRow[j]]=[wRow[j],wRow[i]]; }
            for(let i=0;i<8;i++) { b[7][i]={type:wRow[i],color:'w'}; b[0][i]={type:wRow[i],color:'b'}; }
        } else {
            for(let i=0;i<8;i++) { b[7][i]={type:pieces[i],color:'w'}; b[0][i]={type:pieces[i],color:'b'}; }
        }
        for(let i=0;i<8;i++) { b[6][i]={type:'p',color:'w'}; b[1][i]={type:'p',color:'b'}; }
        return b;
    }
    
    function applyMove(board, from, to, mode, piece, captureInfo) {
        const newBoard = cloneBoard(board);
        const pieceMoved = newBoard[from.row][from.col];
        newBoard[to.row][to.col] = pieceMoved;
        newBoard[from.row][from.col] = null;
        if (captureInfo) newBoard[captureInfo.row][captureInfo.col] = null;
        if ((mode === 'checkers' || mode === 'anticheckers') && ((pieceMoved.color === 'w' && to.row === 0) || (pieceMoved.color === 'b' && to.row === 7))) newBoard[to.row][to.col].king = true;
        if (mode !== 'checkers' && mode !== 'anticheckers' && pieceMoved.type === 'p' && (to.row === 0 || to.row === 7)) newBoard[to.row][to.col] = { type: 'q', color: pieceMoved.color };
        return newBoard;
    }
    
    function isAttacked(board, row, col, color, mode) {
        if (mode === 'checkers' || mode === 'anticheckers' || mode === 'horde') return false;
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) {
            const p = board[i][j];
            if(p && p.color !== color) {
                const moves = getAllMovesChess(i,j,board,mode);
                if(moves.some(m=>m.row===row && m.col===col)) return true;
            }
        }
        return false;
    }
    
    function getLegalMoves(board, row, col, mode, turnColor) {
        const piece = board[row][col];
        if(!piece || piece.color !== turnColor) return [];
        let moves = getAllMovesChess(row,col,board,mode);
        if(mode === 'checkers' || mode === 'anticheckers') {
            let hasCapture = false;
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]?.type==='checker' && board[i][j].color===turnColor) { const m = getAllMovesChess(i,j,board,mode); if(m.some(x=>x.capture)) hasCapture=true; }
            if(hasCapture) moves = moves.filter(m=>m.capture);
            return moves;
        }
        const legal = [];
        for(const move of moves) {
            const newBoard = applyMove(board, {row,col}, move, mode, piece, move.capture);
            let kingPos = {row,col};
            if(piece.type === 'k') kingPos = move;
            else for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(newBoard[i][j]?.type==='k' && newBoard[i][j]?.color===turnColor) kingPos={row:i,col:j};
            if(!isAttacked(newBoard, kingPos.row, kingPos.col, turnColor, mode)) legal.push(move);
        }
        return legal;
    }
    
    function hasAnyLegalMoves(board, color, mode) {
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]?.color === color && getLegalMoves(board,i,j,mode,color).length>0) return true;
        return false;
    }
    
    function checkWinConditions(board, mode, lastTurn) {
        if(mode === 'anticheckers') {
            let hasRed=false, hasBlack=false;
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]?.type==='checker') { if(board[i][j].color==='w') hasRed=true; else hasBlack=true; }
            if(!hasRed) return 'b'; if(!hasBlack) return 'w';
        }
        if(mode === 'kinghill') for(let r=3;r<=4;r++) for(let c=3;c<=4;c++) if(board[r][c]?.type==='k') return board[r][c].color;
        if(mode === 'horde') {
            let hasBlack=false, hasWhite=false;
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]) { if(board[i][j].color==='b') hasBlack=true; else hasWhite=true; }
            if(!hasBlack) return 'w'; if(!hasWhite) return 'b';
        }
        if(!hasAnyLegalMoves(board, lastTurn, mode)) {
            if(mode !== 'checkers' && mode !== 'anticheckers') {
                let kingPos=null; for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]?.type==='k' && board[i][j]?.color===lastTurn) kingPos={row:i,col:j};
                if(kingPos && isAttacked(board, kingPos.row, kingPos.col, lastTurn, mode)) return lastTurn === 'w' ? 'b' : 'w';
                else return 'draw';
            } else return lastTurn === 'w' ? 'b' : 'w';
        }
        return null;
    }
    
    function renderGameBoard() {
        if(!boardArray) return;
        boardDiv.innerHTML = '';
        const mode = currentMode;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
            const piece = boardArray[r][c];
            const isLight = (r+c)%2===0;
            const sq = document.createElement('div');
            sq.className = `square ${isLight ? 'light' : 'dark'}`;
            if(selectedSquare === `${r},${c}`) sq.classList.add('selected');
            if(lastMoveFrom === `${r},${c}`) sq.classList.add('last-move-from');
            if(lastMoveTo === `${r},${c}`) sq.classList.add('last-move-to');
            if(mode === 'kinghill' && r>=3 && r<=4 && c>=3 && c<=4) sq.classList.add('hill-square');
            const isValid = validMovesList.some(m=>m.row===r && m.col===c);
            if(isValid) { sq.classList.add('valid-move'); if(boardArray[r][c] && boardArray[r][c].color !== currentTurn) sq.classList.add('capture'); }
            const span = document.createElement('span');
            const disp = getPieceDisplay(piece, mode);
            span.innerHTML = disp;
            sq.appendChild(span);
            sq.addEventListener('click',()=>handleGameClick(r,c));
            boardDiv.appendChild(sq);
        }
        turnPlayerSpan.innerHTML = `🎲 ${currentTurn === 'w' ? (mode==='checkers'?'🔴 RED':'⚪ WHITE') : (mode==='checkers'?'⚫ BLACK':'⚫ BLACK')}'s Turn`;
        if(currentTurn === 'b') boardContainer.classList.add('black-turn-view'); else boardContainer.classList.remove('black-turn-view');
    }
    
    async function handleGameClick(row,col) {
        if(localGameOver) return;
        if(myColor !== currentTurn) { gameStatusDiv.innerText = "⏳ Not your turn!"; setTimeout(()=>{ if(gameStatusDiv) gameStatusDiv.innerText=""; },1000); return; }
        if(!selectedSquare) {
            const piece = boardArray[row][col];
            if(!piece || piece.color !== currentTurn) return;
            selectedSquare = `${row},${col}`;
            validMovesList = getLegalMoves(boardArray, row, col, currentMode, currentTurn);
            if(validMovesList.length===0) selectedSquare=null;
            renderGameBoard();
        } else {
            const [fromRow,fromCol] = selectedSquare.split(',').map(Number);
            const move = validMovesList.find(m=>m.row===row && m.col===col);
            if(!move) { selectedSquare=null; validMovesList=[]; renderGameBoard(); return; }
            const newBoard = applyMove(boardArray, {row:fromRow,col:fromCol}, move, currentMode, boardArray[fromRow][fromCol], move.capture);
            let nextTurn = currentTurn === 'w' ? 'b' : 'w';
            const winnerColor = checkWinConditions(newBoard, currentMode, nextTurn);
            const gameUpdate = { board: newBoard, turn: nextTurn, mode: currentMode, gameOver: !!winnerColor, winner: winnerColor, lastMoveFrom: `${fromRow},${fromCol}`, lastMoveTo: `${row},${col}` };
            if(isFirebaseReady && currentRoomId) await database.ref(`rooms/${currentRoomId}/gameState`).set(gameUpdate);
            else updateLocalGame(gameUpdate);
            selectedSquare=null; validMovesList=[];
        }
    }
    
    function updateLocalGame(gameUpdate) {
        boardArray = gameUpdate.board;
        currentTurn = gameUpdate.turn;
        localGameOver = gameUpdate.gameOver;
        lastMoveFrom = gameUpdate.lastMoveFrom;
        lastMoveTo = gameUpdate.lastMoveTo;
        renderGameBoard();
        if(gameUpdate.gameOver) {
            let winnerName = gameUpdate.winner === 'w' ? (currentMode==='checkers'?'RED':'WHITE') : (currentMode==='checkers'?'BLACK':'BLACK');
            if(gameUpdate.winner === 'draw') winnerName = 'DRAW';
            gameStatusDiv.innerHTML = `🏆 GAME OVER - ${winnerName} WINS! 🏆`;
            showVictoryOverlay(winnerName);
        } else gameStatusDiv.innerHTML = `Last move: ${lastMoveFrom} → ${lastMoveTo}`;
    }
    
    function showVictoryOverlay(winnerName) {
        let ov = document.querySelector('.victory-overlay');
        if(ov) ov.remove();
        ov = document.createElement('div'); ov.className='victory-overlay';
        ov.innerHTML = `<div class="victory-card"><div class="winner-text">${winnerName} WINS!</div><button id="victoryNewGameBtn">🔄 New Game</button></div>`;
        document.getElementById('boardWrapper').appendChild(ov);
        document.getElementById('victoryNewGameBtn')?.addEventListener('click',()=>{ ov.remove(); resetGameInRoom(); });
    }
    
    async function resetGameInRoom() {
        const newBoard = initBoardByMode(currentMode);
        const initTurn = 'w';
        const resetState = { board: newBoard, turn: initTurn, mode: currentMode, gameOver: false, winner: null, lastMoveFrom: null, lastMoveTo: null };
        if(isFirebaseReady && currentRoomId) await database.ref(`rooms/${currentRoomId}/gameState`).set(resetState);
        else updateLocalGame({...resetState, gameOver:false});
    }
    
    async function leaveRoom() { if(isFirebaseReady && currentRoomId) await database.ref(`rooms/${currentRoomId}/players/${playerId}`).remove(); currentRoomId=null; lobbyView.classList.remove('hidden'); gameView.classList.add('hidden'); }
    
    createRoomBtn.onclick = async () => {
        const name = playerNameInput.value.trim() || "Guest";
        const mode = document.getElementById('lobbyGameMode').value;
        if(!isFirebaseReady) { alert("Firebase not configured. Multiplayer requires valid Firebase config."); return; }
        const roomCode = generateRoomCode();
        const pid = generatePlayerId();
        const gameBoard = initBoardByMode(mode);
        const roomData = { gameState: { board: gameBoard, turn: 'w', mode: mode, gameOver: false, winner: null, lastMoveFrom: null, lastMoveTo: null }, players: { [pid]: { name, id: pid, color: 'w' } }, mode: mode, createdAt: Date.now() };
        await database.ref(`rooms/${roomCode}`).set(roomData);
        await database.ref(`rooms/${roomCode}/players/${pid}`).update({ name, id: pid, color: 'w' });
        currentRoomId = roomCode; playerId = pid; playerName = name; myColor = 'w'; currentMode = mode;
        joinGameRoom(roomCode, pid, mode);
    };
    
    joinRoomBtn.onclick = async () => {
        const code = joinRoomCodeInput.value.trim().toUpperCase();
        if(!code) return;
        const name = playerNameInput.value.trim() || "Guest";
        if(!isFirebaseReady) { alert("Firebase not configured"); return; }
        const snapshot = await database.ref(`rooms/${code}`).get();
        if(!snapshot.exists()) { alert("Room not found"); return; }
        const room = snapshot.val();
        const playerCount = Object.keys(room.players||{}).length;
        let assignedColor = 'w';
        if(playerCount>=2) { alert("Room is full"); return; }
        if(room.players && Object.values(room.players).some(p=>p.color==='w')) assignedColor='b';
        const pid = generatePlayerId();
        await database.ref(`rooms/${code}/players/${pid}`).set({ name, id: pid, color: assignedColor });
        currentRoomId = code; playerId = pid; playerName = name; myColor = assignedColor; currentMode = room.mode;
        joinGameRoom(code, pid, room.mode, assignedColor);
    };
    
    function joinGameRoom(roomId, pid, mode, myAssignedColor=null) {
        lobbyView.classList.add('hidden');
        gameView.classList.remove('hidden');
        roomCodeDisplaySpan.innerText = roomId;
        gameModeDisplaySpan.innerText = mode;
        currentMode = mode;
        if(myAssignedColor) myColor = myAssignedColor;
        database.ref(`rooms/${roomId}/gameState`).on('value', (snap) => {
            if(snap.exists()) { const gs = snap.val(); boardArray = gs.board; currentTurn = gs.turn; localGameOver = gs.gameOver; lastMoveFrom = gs.lastMoveFrom; lastMoveTo = gs.lastMoveTo; renderGameBoard(); if(gs.gameOver) showVictoryOverlay(gs.winner==='w'?'WHITE':'BLACK'); }
        });
        database.ref(`rooms/${roomId}/players`).on('value', (snap) => { if(!snap.exists()) leaveRoom(); });
        renderGameBoard();
    }
    leaveGameBtn.onclick = leaveRoom;
    gameResetBtn.onclick = resetGameInRoom;
    if(!isFirebaseReady) alert("⚠️ Firebase not configured. Multiplayer will not work. Set your firebaseConfig.");
</script>
