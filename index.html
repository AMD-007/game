<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multi-Device Games - Play Together!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* Connection Screen */
        .connection-screen {
            max-width: 500px;
            width: 100%;
            background: #1e1e2e;
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .connection-screen h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .connection-screen p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .room-code {
            font-size: 48px;
            font-weight: 800;
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            letter-spacing: 10px;
            color: #ffd700;
            margin: 20px 0;
            font-family: monospace;
        }

        .input-code {
            background: #0f0f1a;
            border: 2px solid #2a2a3e;
            color: white;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border-radius: 16px;
            width: 100%;
            font-family: monospace;
            letter-spacing: 8px;
        }

        .btn {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.1s;
        }

        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #ffd700; color: #1a1a2e; }
        .btn-danger { background: #c0392b; }

        .waiting-status {
            color: #ffd700;
            margin-top: 20px;
            font-size: 14px;
        }

        .qr-container {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }

        /* Game Screen */
        .game-screen {
            display: none;
            max-width: 550px;
            width: 100%;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }

        .room-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-code-display {
            background: #0f0f1a;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
        }

        .player-role {
            font-size: 14px;
            font-weight: bold;
            padding: 6px 14px;
            background: #0f0f1a;
            border-radius: 30px;
        }

        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #0f0f1a;
            padding: 6px;
            border-radius: 50px;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        .side-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }

        .side-btn {
            background: #0f0f1a;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .side-btn.selected {
            background: #ffd700;
            color: #1a1a2e;
        }

        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: all 0.1s ease;
        }

        .square span {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .square .red-king {
            color: #e74c3c;
            text-shadow: 0 0 6px #ff0000;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #c0392b;
        }
        
        .square .black-king {
            color: #1a1a2e;
            text-shadow: 0 0 6px #4a4a6a;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #000000;
        }

        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background: linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow: inset 0 0 0 2px #ffd700; }
        
        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 25%;
            height: 25%;
            background: #4caf50;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        
        .square.capture::after {
            background: #ff5722;
            width: 55%;
            height: 55%;
            border-radius: 8px;
        }

        .square.last-move-from::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(52, 152, 219, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .square.last-move-to::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(46, 204, 113, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .square.in-check::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: radial-gradient(circle, rgba(192, 57, 43, 0.6), rgba(192, 57, 43, 0.2));
            border-radius: 4px;
            pointer-events: none;
            z-index: 1;
        }

        .square.hill-square {
            position: relative;
        }
        
        .square.hill-square::before {
            content: "🏔️";
            position: absolute;
            font-size: clamp(10px, 3vw, 14px);
            bottom: 2px;
            right: 2px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }

        .control-panel {
            padding: 0 16px 16px 16px;
        }

        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 50px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            border-left: 4px solid #ffd700;
        }

        .turn-indicator .turn-label { font-size: 9px; color: #888; letter-spacing: 1.5px; }
        .turn-indicator .turn-player { font-size: 14px; font-weight: 800; color: #ffd700; }

        button {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
        }

        button:active { transform: scale(0.95); }

        .reset-btn { background: #8b5a2b; }
        .leave-btn { background: #c0392b; padding: 6px 14px; font-size: 11px; }

        .move-history {
            background: #16162a;
            padding: 10px 16px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
            border-radius: 30px;
        }

        .move-history span { color: #ffd700; font-weight: bold; }

        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
        }

        .victory-card {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px;
            padding: 24px 32px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .victory-card .winner-text { font-size: 24px; font-weight: 800; color: #ffd700; margin-bottom: 16px; }
        .victory-card button { background: #ffd700; color: #1a1a2e; margin-top: 16px; }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 9px;
            color: #5a5a6e;
            border-top: 1px solid #2a2a3e;
            background: #16162a;
        }

        @media (max-width: 500px) {
            .room-code { font-size: 36px; letter-spacing: 8px; }
            .input-code { font-size: 22px; letter-spacing: 6px; }
            .btn { padding: 10px 20px; font-size: 14px; }
            .mode-btn { padding: 4px 8px; font-size: 9px; }
            .side-btn { padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>

</div>

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // ==================== GAME STATE ====================
    let currentRoomId = null;

    let currentMode = 'standard';
    let gameStarted = false;
    let gameStateListener = null;
    let roomListener = null;
    
    // Game engine variables
    let selectedSquare = null;
    let validMovesList = [];
    let mustCapture = false;
    let captureChain = false;
    
    // DOM Elements
    const connectionScreen = document.getElementById('connectionScreen');
    const gameScreen = document.getElementById('gameScreen');
    const boardDiv = document.getElementById('chessboard');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const lastMoveSpan = document.getElementById('lastMoveSpan');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playerRoleSpan = document.getElementById('playerRole');
    const waitingStatus = document.getElementById('waitingStatus');
    const qrContainer = document.getElementById('qrContainer');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const sideBtns = document.querySelectorAll('.side-btn');
    const resetGameBtn = document.getElementById('resetGameBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const createGameBtn = document.getElementById('createGameBtn');
    const joinGameBtn = document.getElementById('joinGameBtn');
    const joinCodeInput = document.getElementById('joinCodeInput');
    
    // Chess symbols
    const chessSymbols = {
        'white_r': '♖', 'white_n': '♘', 'white_b': '♗', 'white_q': '♕', 'white_k': '♔', 'white_p': '♙',
        'black_r': '♜', 'black_n': '♞', 'black_b': '♝', 'black_q': '♛', 'black_k': '♚', 'black_p': '♟'
    };
    
    // ==================== INITIAL BOARD SETUP ====================
    function getInitialBoard(mode) {
        const boardState = Array(8).fill().map(() => Array(8).fill(null));
        
        if (mode === 'checkers' || mode === 'anticheckers') {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        if (row < 3) boardState[row][col] = { type: 'checker', color: 'black', king: false };
                        else if (row > 4) boardState[row][col] = { type: 'checker', color: 'white', king: false };
                    }
                }
            }
            return boardState;
        }
        
        if (mode === 'horde') {
            const blackPieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                boardState[0][i] = { type: blackPieces[i], color: 'black' };
                boardState[1][i] = { type: 'p', color: 'black' };
            }
            for (let i = 0; i < 8; i++) {
                boardState[7][i] = { type: 'p', color: 'white' };
                boardState[6][i] = { type: 'p', color: 'white' };
                boardState[5][i] = { type: 'p', color: 'white' };
                boardState[4][i] = { type: 'p', color: 'white' };
            }
            const row3Pattern = [false, true, true, false, false, true, true, false];
            for (let i = 0; i < 8; i++) {
                if (row3Pattern[i]) boardState[3][i] = { type: 'p', color: 'white' };
            }
            return boardState;
        }
        
        // Chess / Chess960 / King of the Hill
        for (let i = 0; i < 8; i++) {
            boardState[1][i] = { type: 'p', color: 'black' };
            boardState[6][i] = { type: 'p', color: 'white' };
        }
        
        const pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        
        if (mode === 'chess960') {
            let shuffled = [...pieces];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            for (let i = 0; i < 8; i++) {
                boardState[0][i] = { type: shuffled[i], color: 'black' };
                boardState[7][i] = { type: shuffled[i], color: 'white' };
            }
        } else {
            for (let i = 0; i < 8; i++) {
                boardState[0][i] = { type: pieces[i], color: 'black' };
                boardState[7][i] = { type: pieces[i], color: 'white' };
            }
        }
        
        return boardState;
    }
    
    function getInitialGameState() {
        return {
            board: getInitialBoard(currentMode),
            currentTurn: 'white',
            gameOver: false,
            winner: null,
            mode: currentMode,
            lastMove: null,
            lastMoveFrom: null,
            lastMoveTo: null
        };
    }
    
    // ==================== GAME ENGINE FUNCTIONS ====================
    function getPieceDisplay(piece, mode) {
        if (!piece) return '';
        if (mode === 'checkers' || mode === 'anticheckers') {
            if (piece.king) {
                if (piece.color === 'white') return '<span class="red-king">👑</span>';
                else return '<span class="black-king">👑</span>';
            }
            return piece.color === 'white' ? '🔴' : '⚫';
        }
        const key = (piece.color === 'white' ? 'white' : 'black') + '_' + piece.type;
        return chessSymbols[key] || '';
    }
    
    function toRowCol(square) {
        const col = square.charCodeAt(0) - 97;
        const row = 8 - parseInt(square[1]);
        return { row, col };
    }
    
    function toSquare(row, col) {
        return String.fromCharCode(97 + col) + (8 - row);
    }
    
    // Checkers move logic
    function getCheckersMoves(row, col, boardState, allowNonCapture = true) {
        const piece = boardState[row][col];
        if (!piece || piece.type !== 'checker') return [];
        
        const color = piece.color;
        const direction = color === 'white' ? -1 : 1;
        const isKing = piece.king;
        const moves = [];
        const dirs = isKing ? [-1, 1] : [direction];
        
        for (const dr of dirs) {
            for (const dc of [-1, 1]) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                    const target = boardState[newRow][newCol];
                    if (!target) {
                        if (allowNonCapture) {
                            moves.push({ row: newRow, col: newCol, capture: null });
                        }
                    } else if (target.color !== color) {
                        const jumpRow = newRow + dr;
                        const jumpCol = newCol + dc;
                        if (jumpRow >= 0 && jumpRow < 8 && jumpCol >= 0 && jumpCol < 8 && !boardState[jumpRow][jumpCol]) {
                            moves.push({ row: jumpRow, col: jumpCol, capture: { row: newRow, col: newCol } });
                        }
                    }
                }
            }
        }
        return moves;
    }
    
    function isCaptureAvailable(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'checker' && piece.color === color) {
                    if (getCheckersMoves(i, j, boardState, false).some(m => m.capture)) return true;
                }
            }
        }
        return false;
    }
    
    function makeCheckersMove(fromRow, fromCol, toRow, toCol, boardState) {
        const piece = boardState[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;
        
        const moves = getCheckersMoves(fromRow, fromCol, boardState);
        const validMove = moves.find(m => m.row === toRow && m.col === toCol);
        if (!validMove) return false;
        
        boardState[toRow][toCol] = boardState[fromRow][fromCol];
        boardState[fromRow][fromCol] = null;
        if (validMove.capture) boardState[validMove.capture.row][validMove.capture.col] = null;
        if ((piece.color === 'white' && toRow === 0) || (piece.color === 'black' && toRow === 7)) {
            boardState[toRow][toCol].king = true;
        }
        
        return true;
    }
    
    // Chess move logic
    function getAllMoves(row, col, boardState) {
        const piece = boardState[row][col];
        if (!piece || piece.type === 'checker') return [];
        
        const color = piece.color;
        const type = piece.type;
        const moves = [];
        
        if (type === 'p') {
            const dir = color === 'white' ? -1 : 1;
            const startRow = color === 'white' ? 6 : 1;
            const r1 = row + dir;
            if (r1 >= 0 && r1 < 8 && !boardState[r1][col]) {
                moves.push({ row: r1, col });
                if (row === startRow && !boardState[r1 + dir][col]) moves.push({ row: r1 + dir, col });
            }
            for (const dc of [-1, 1]) {
                const c = col + dc;
                if (c >= 0 && c < 8) {
                    const r = row + dir;
                    if (r >= 0 && r < 8 && boardState[r][c] && boardState[r][c].color !== color) {
                        moves.push({ row: r, col: c });
                    }
                }
            }
        } else if (type === 'n') {
            const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
            for (const [dr, dc] of offsets) {
                const r = row + dr, c = col + dc;
                if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target || target.color !== color) moves.push({ row: r, col: c });
                }
            }
        } else if (type === 'r' || type === 'q') {
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for (const [dr, dc] of dirs) {
                let r = row + dr, c = col + dc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target) moves.push({ row: r, col: c });
                    else {
                        if (target.color !== color) moves.push({ row: r, col: c });
                        break;
                    }
                    r += dr; c += dc;
                }
            }
        } else if (type === 'b' || type === 'q') {
            const dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
            for (const [dr, dc] of dirs) {
                let r = row + dr, c = col + dc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target) moves.push({ row: r, col: c });
                    else {
                        if (target.color !== color) moves.push({ row: r, col: c });
                        break;
                    }
                    r += dr; c += dc;
                }
            }
        } else if (type === 'k') {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                        const target = boardState[r][c];
                        if (!target || target.color !== color) moves.push({ row: r, col: c });
                    }
                }
            }
        }
        return moves;
    }
    
    function isAttacked(row, col, color, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers' || currentMode === 'horde') return false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.color !== color && piece.type !== 'checker') {
                    if (getAllMoves(i, j, boardState).some(m => m.row === row && m.col === col)) return true;
                }
            }
        }
        return false;
    }
    
    function findKingPosition(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'k' && piece.color === color) return { row: i, col: j };
            }
        }
        return null;
    }
    
    function getLegalMoves(row, col, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            const mustCapture = isCaptureAvailable(boardState[row][col]?.color, boardState);
            let moves = getCheckersMoves(row, col, boardState);
            if (mustCapture) moves = moves.filter(m => m.capture);
            return moves;
        }
        
        const piece = boardState[row][col];
        if (!piece) return [];
        if (currentMode === 'horde' && piece.color === 'white') {
            return getAllMoves(row, col, boardState);
        }
        
        const allMoves = getAllMoves(row, col, boardState);
        const legal = [];
        for (const move of allMoves) {
            const savedTarget = boardState[move.row][move.col];
            const savedPiece = boardState[row][col];
            boardState[move.row][move.col] = boardState[row][col];
            boardState[row][col] = null;
            
            let kingRow, kingCol;
            if (piece.type === 'k') {
                kingRow = move.row;
                kingCol = move.col;
            } else {
                const kingPos = findKingPosition(piece.color, boardState);
                if (kingPos) {
                    kingRow = kingPos.row;
                    kingCol = kingPos.col;
                } else {
                    boardState[row][col] = savedPiece;
                    boardState[move.row][move.col] = savedTarget;
                    legal.push(move);
                    continue;
                }
            }
            
            const safe = !isAttacked(kingRow, kingCol, piece.color, boardState);
            boardState[row][col] = savedPiece;
            boardState[move.row][move.col] = savedTarget;
            if (safe) legal.push(move);
        }
        return legal;
    }
    
    function makeGameMove(fromRow, fromCol, toRow, toCol, boardState, gameTurn) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            return makeCheckersMove(fromRow, fromCol, toRow, toCol, boardState);
        }
        
        const piece = boardState[fromRow][fromCol];
        if (!piece || piece.color !== gameTurn) return false;
        
        const legalMoves = getLegalMoves(fromRow, fromCol, boardState);
        if (!legalMoves.some(m => m.row === toRow && m.col === toCol)) return false;
        
        boardState[toRow][toCol] = boardState[fromRow][fromCol];
        boardState[fromRow][fromCol] = null;
        if (piece.type === 'p' && (toRow === 0 || toRow === 7)) {
            boardState[toRow][toCol] = { type: 'q', color: piece.color };
        }
        
        return true;
    }
    
    function checkWinConditions(boardState, mode) {
        if (mode === 'kinghill') {
            for (let row = 3; row <= 4; row++) {
                for (let col = 3; col <= 4; col++) {
                    const piece = boardState[row][col];
                    if (piece && piece.type === 'k') {
                        return { gameOver: true, winner: piece.color === 'white' ? 'WHITE' : 'BLACK' };
                    }
                }
            }
        }
        
        if (mode === 'horde') {
            let hasBlack = false, hasWhite = false;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = boardState[i][j];
                    if (piece) {
                        if (piece.color === 'black') hasBlack = true;
                        else hasWhite = true;
                    }
                }
            }
            if (!hasBlack) return { gameOver: true, winner: 'WHITE' };
            if (!hasWhite) return { gameOver: true, winner: 'BLACK' };
        }
        
        if (mode === 'anticheckers') {
            let hasWhite = false, hasBlack = false;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = boardState[i][j];
                    if (piece && piece.type === 'checker') {
                        if (piece.color === 'white') hasWhite = true;
                        else hasBlack = true;
                    }
                }
            }
            if (!hasWhite) return { gameOver: true, winner: 'BLACK' };
            if (!hasBlack) return { gameOver: true, winner: 'WHITE' };
        }
        
        if (mode === 'checkers') {
            let hasWhiteMoves = false, hasBlackMoves = false;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = boardState[i][j];
                    if (piece && piece.type === 'checker') {
                        if (piece.color === 'white' && getCheckersMoves(i, j, boardState).length > 0) hasWhiteMoves = true;
                        if (piece.color === 'black' && getCheckersMoves(i, j, boardState).length > 0) hasBlackMoves = true;
                    }
                }
            }
            if (!hasWhiteMoves) return { gameOver: true, winner: 'BLACK' };
            if (!hasBlackMoves) return { gameOver: true, winner: 'WHITE' };
        }
        
        if (mode !== 'checkers' && mode !== 'anticheckers' && mode !== 'horde') {
            const whiteHasMoves = hasAnyLegalMoves('white', boardState);
            const blackHasMoves = hasAnyLegalMoves('black', boardState);
            
            if (!whiteHasMoves || !blackHasMoves) {
                if (isAttacked(findKingPosition('white', boardState)?.row, findKingPosition('white', boardState)?.col, 'white', boardState)) {
                    return { gameOver: true, winner: 'BLACK' };
                }
                if (isAttacked(findKingPosition('black', boardState)?.row, findKingPosition('black', boardState)?.col, 'black', boardState)) {
                    return { gameOver: true, winner: 'WHITE' };
                }
                if (!whiteHasMoves || !blackHasMoves) {
                    return { gameOver: true, winner: null };
                }
            }
        }
        
        return { gameOver: false, winner: null };
    }
    
    function hasAnyLegalMoves(color, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = boardState[i][j];
                    if (piece && piece.type === 'checker' && piece.color === color) {
                        if (getCheckersMoves(i, j, boardState).length > 0) return true;
                    }
                }
            }
            return false;
        }
        
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.color === color && getLegalMoves(i, j, boardState).length > 0) return true;
            }
        }
        return false;
    }
    
    // ==================== RENDER BOARD ====================
    function renderBoardFromState(gameState, localGameTurn, localSelectedSquare, localValidMoves) {
        if (!gameState) return;
        
        boardDiv.innerHTML = '';
        const stateBoard = gameState.board;
        const mode = gameState.mode;
        
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = stateBoard[row][col];
                const isLight = (row + col) % 2 === 0;
                const squareName = toSquare(row, col);
                
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light' : 'dark'}`;
                
                if (localSelectedSquare === squareName) square.classList.add('selected');
                if (gameState.lastMoveFrom === squareName) square.classList.add('last-move-from');
                if (gameState.lastMoveTo === squareName) square.classList.add('last-move-to');
                
                // Check if king in check
                if (mode !== 'checkers' && mode !== 'anticheckers' && mode !== 'horde') {
                    const pieceAtSquare = stateBoard[row][col];
                    if (pieceAtSquare && pieceAtSquare.type === 'k') {
                        if (isAttacked(row, col, pieceAtSquare.color, stateBoard)) {
                            square.classList.add('in-check');
                        }
                    }
                }
                
                // Hill squares
                if (mode === 'kinghill' && row >= 3 && row <= 4 && col >= 3 && col <= 4) {
                    square.classList.add('hill-square');
                }
                
                const isValidTarget = localValidMoves.some(m => m.row === row && m.col === col);
                if (isValidTarget) {
                    square.classList.add('valid-move');
                    if (stateBoard[row][col] && stateBoard[row][col].color !== gameState.currentTurn) {
                        square.classList.add('capture');
                    }
                }
                
                const span = document.createElement('span');
                const displayValue = getPieceDisplay(piece, mode);
                if (displayValue.includes('red-king') || displayValue.includes('black-king')) {
                    span.innerHTML = displayValue;
                } else {
                    span.textContent = displayValue;
                }
                square.appendChild(span);
                
                square.addEventListener('click', (function(r, c) {
                    return () => onSquareClick(r, c);
                })(row, col));
                
                boardDiv.appendChild(square);
            }
        }
        
        // Update turn display
        const isMyTurn = (gameState.currentTurn === playerSide);
        let turnText = gameState.currentTurn === 'white' ? '⚪ WHITE' : '⚫ BLACK';
        if (mode === 'checkers' || mode === 'anticheckers') {
            turnText = gameState.currentTurn === 'white' ? '🔴 RED' : '⚫ BLACK';
        } else if (mode === 'horde') {
            turnText = gameState.currentTurn === 'white' ? '⚪ WHITE (HORDE)' : '⚫ BLACK';
        }
        turnPlayerSpan.innerHTML = `${turnText}'s TURN${isMyTurn ? ' (YOU)' : ''}`;
        
        lastMoveSpan.textContent = gameState.lastMove || 'None';
        
        if (gameState.gameOver) {
            const existing = document.querySelector('.victory-overlay');
            if (!existing && gameState.winner) {
                const overlay = document.createElement('div');
                overlay.className = 'victory-overlay';
                overlay.innerHTML = `
                    <div class="victory-card">
                        <div class="winner-text">🏆 ${gameState.winner} WINS! 🏆</div>
                        <button onclick="this.closest('.victory-overlay').remove()">CONTINUE</button>
                    </div>
                `;
                document.getElementById('boardWrapper').appendChild(overlay);
            }
        }
    }
    
    // ==================== GAME ACTIONS ====================
    function onSquareClick(row, col) {
        if (!gameStarted) return;
        
        database.ref(`rooms/${currentRoomId}/gameState`).once('value', (snapshot) => {
            const gameState = snapshot.val();
            if (!gameState || gameState.gameOver) return;
            if (gameState.currentTurn !== playerSide) return;
            if (gameState.mode !== currentMode) {
                currentMode = gameState.mode;
            }
            
            const square = toSquare(row, col);
            
            if (selectedSquare === null) {
                const piece = gameState.board[row][col];
                if (!piece || piece.color !== playerSide) return;
                
                selectedSquare = square;
                validMovesList = getLegalMoves(row, col, gameState.board);
                
                if (validMovesList.length === 0) {
                    selectedSquare = null;
                } else {
                    renderBoardFromState(gameState, gameState.currentTurn, selectedSquare, validMovesList);
                }
                return;
            }
            
            const fromPos = toRowCol(selectedSquare);
            const newBoard = JSON.parse(JSON.stringify(gameState.board));
            const moveSuccess = makeGameMove(fromPos.row, fromPos.col, row, col, newBoard, gameState.currentTurn);
            
            if (moveSuccess) {
                const newTurn = gameState.currentTurn === 'white' ? 'black' : 'white';
                const fromSquareName = selectedSquare;
                const toSquareName = toSquare(row, col);
                
                const winCheck = checkWinConditions(newBoard, gameState.mode);
                
                const updatedState = {
                    ...gameState,
                    board: newBoard,
                    currentTurn: newTurn,
                    gameOver: winCheck.gameOver,
                    winner: winCheck.winner,
                    lastMove: `${fromSquareName}→${toSquareName}`,
                    lastMoveFrom: fromSquareName,
                    lastMoveTo: toSquareName,
                    mode: gameState.mode
                };
                
                database.ref(`rooms/${currentRoomId}/gameState`).set(updatedState);
            }
            
            selectedSquare = null;
            validMovesList = [];
            renderBoardFromState(gameState, gameState.currentTurn, null, []);
        });
    }
    
    // ==================== FIREBASE ROOM FUNCTIONS ====================
    function createRoom() {
        const roomCode = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        currentRoomId = roomCode;
        
        const roomData = {
            mode: currentMode,
            playerWhite: null,
            playerBlack: null,
            gameStarted: false,
            createdAt: Date.now()
        };
        
        database.ref(`rooms/${roomCode}`).set(roomData);
        
        showSideSelection(roomCode);
    }
    
    function showSideSelection(roomCode) {
        connectionScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        roomCodeDisplay.innerHTML = `Room: ${roomCode}`;
        playerRoleSpan.innerHTML = 'Choose your side';
        
        sideBtns.forEach(btn => {
            btn.style.display = 'inline-block';
            btn.classList.remove('selected');
        });
        
        modeBtns.forEach(btn => {
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
        });
        
        const handleSideSelect = (side) => {
            playerSide = side;
            const sideName = side === 'white' ? 'WHITE' : 'BLACK';
            playerRoleSpan.innerHTML = `⚪ ${sideName} (Waiting for opponent...)`;
            
            const update = {};
            update[`rooms/${roomCode}/player${side === 'white' ? 'White' : 'Black'}`] = true;
            database.ref().update(update);
            
            startRoomListener(roomCode);
            
            sideBtns.forEach(btn => btn.style.display = 'none');
            modeBtns.forEach(btn => {
                btn.style.pointerEvents = 'auto';
                btn.style.opacity = '1';
            });
        };
        
        document.querySelector('[data-side="white"]').onclick = () => handleSideSelect('white');
        document.querySelector('[data-side="black"]').onclick = () => handleSideSelect('black');
        
        const url = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
        qrContainer.innerHTML = `<div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}" alt="QR"><p style="margin-top:10px;font-size:12px;">Share this QR code</p></div>`;
    }
    
    function startRoomListener(roomCode) {
        if (roomListener) database.ref(`rooms/${roomCode}`).off();
        roomListener = database.ref(`rooms/${roomCode}`);
        roomListener.on('value', (snapshot) => {
            const room = snapshot.val();
            if (room && room.playerWhite && room.playerBlack && !room.gameStarted) {
                const gameState = getInitialGameState();
                database.ref(`rooms/${roomCode}/gameState`).set(gameState);
                database.ref(`rooms/${roomCode}/gameStarted`).set(true);
                
                gameStarted = true;
                playerRoleSpan.innerHTML = playerSide === 'white' ? '⚪ WHITE' : '⚫ BLACK';
                selectedSquare = null;
                validMovesList = [];
                
                startGameListener(roomCode);
            }
        });
    }
    
    function startGameListener(roomCode) {
        if (gameStateListener) database.ref(`rooms/${roomCode}/gameState`).off();
        gameStateListener = database.ref(`rooms/${roomCode}/gameState`);
        gameStateListener.on('value', (snapshot) => {
            const gameState = snapshot.val();
            if (gameState) {
                currentMode = gameState.mode;
                renderBoardFromState(gameState, gameState.currentTurn, selectedSquare, validMovesList);
                
                modeBtns.forEach(btn => {
                    if (btn.dataset.mode === currentMode) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }
        });
    }
    
    function joinRoom(roomCode) {
        currentRoomId = roomCode;
        connectionScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        roomCodeDisplay.innerHTML = `Room: ${roomCode}`;
        playerRoleSpan.innerHTML = 'Joining room...';
        
        database.ref(`rooms/${roomCode}`).once('value', (snapshot) => {
            const room = snapshot.val();
            if (!room) {
                alert('Room not found!');
                leaveGame();
                return;
            }
            
            if (!room.playerWhite) {
                playerSide = 'white';
                database.ref(`rooms/${roomCode}/playerWhite`).set(true);
            } else if (!room.playerBlack) {
                playerSide = 'black';
                database.ref(`rooms/${roomCode}/playerBlack`).set(true);
            } else {
                alert('Room is full!');
                leaveGame();
                return;
            }
            
            playerRoleSpan.innerHTML = playerSide === 'white' ? '⚪ WHITE' : '⚫ BLACK';
            
            if (room.gameStarted) {
                gameStarted = true;
                selectedSquare = null;
                validMovesList = [];
                startGameListener(roomCode);
            } else {
                const waitListener = database.ref(`rooms/${roomCode}/gameStarted`);
                waitListener.on('value', (snap) => {
                    if (snap.val()) {
                        gameStarted = true;
                        waitListener.off();
                        startGameListener(roomCode);
                        playerRoleSpan.innerHTML = playerSide === 'white' ? '⚪ WHITE' : '⚫ BLACK';
                        selectedSquare = null;
                        validMovesList = [];
                    }
                });
            }
        });
    }
    
    function leaveGame() {
        if (currentRoomId) {
            database.ref(`rooms/${currentRoomId}`).remove();
            if (gameStateListener) gameStateListener.off();
            if (roomListener) roomListener.off();
        }
        currentRoomId = null;
        playerSide = null;
        gameStarted = false;
        selectedSquare = null;
        validMovesList = [];
        connectionScreen.style.display = 'flex';
        gameScreen.style.display = 'none';
        waitingStatus.innerHTML = '';
        qrContainer.innerHTML = '';
    }
    
    function resetGame() {
        if (!currentRoomId) return;
        const newGameState = getInitialGameState();
        database.ref(`rooms/${currentRoomId}/gameState`).set(newGameState);
        selectedSquare = null;
        validMovesList = [];
    }
    
    function changeMode(mode) {
        if (!currentRoomId || gameStarted) {
            currentMode = mode;
            if (gameStarted && currentRoomId) {
                resetGame();
            }
            return;
        }
        currentMode = mode;
        database.ref(`rooms/${currentRoomId}/mode`).set(mode);
    }
    
    // ==================== EVENT LISTENERS ====================
    createGameBtn.addEventListener('click', createRoom);
    joinGameBtn.addEventListener('click', () => {
        const code = joinCodeInput.value.trim();
        if (code.length === 6) joinRoom(code);
        else alert('Enter 6-digit code');
    });
    leaveBtn.addEventListener('click', leaveGame);
    resetGameBtn.addEventListener('click', resetGame);
    
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => changeMode(btn.dataset.mode));
    });
    
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('room');
    if (roomFromUrl && roomFromUrl.length === 6) {
        joinCodeInput.value = roomFromUrl;
        setTimeout(() => joinRoom(roomFromUrl), 500);
    }
    
    modeBtns.forEach(btn => {
        if (btn.dataset.mode === 'standard') btn.classList.add('active');
    });
</script>
