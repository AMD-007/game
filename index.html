<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Game Variants - Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 8px;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .screen {
            display: none;
            padding: 20px;
        }

        .screen.active {
            display: block;
        }

        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }

        .game-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
        }

        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #0f0f1a;
            padding: 6px;
            border-radius: 50px;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 600;
            color: #aaa;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .mode-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        /* Lobby Screen */
        .lobby-screen {
            text-align: center;
        }

        .lobby-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .room-input-group {
            margin-bottom: 20px;
        }

        .room-input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a3e;
            border: 2px solid #3a3a4e;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 12px;
        }

        .room-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .btn {
            background: #ffd700;
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: #2a2a3e;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .room-code {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: 800;
            font-size: 24px;
            padding: 12px 20px;
            border-radius: 20px;
            margin: 20px 0;
            letter-spacing: 4px;
            font-family: monospace;
        }

        .player-status {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            justify-content: center;
        }

        .player-slot {
            background: #2a2a3e;
            padding: 12px 20px;
            border-radius: 20px;
            flex: 1;
            text-align: center;
        }

        .player-slot.connected {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
        }

        .player-slot.waiting {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .game-status {
            background: #16162a;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            color: #ffd700;
            font-weight: 600;
        }

        /* Game Screen */
        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
            perspective: 1000px;
        }

        .board-container {
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
        }

        .board-container.black-turn-view {
            transform: rotate(180deg);
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .connection-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .connection-status.disconnected {
            background: #f44336;
        }

        .spectator-notice {
            background: rgba(255, 193, 7, 0.9);
            color: #1a1a2e;
            padding: 8px 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Rest of your existing styles remain the same */
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: all 0.1s ease;
        }

        .board-container.black-turn-view .square {
            transform: rotate(180deg);
        }

        .square span {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
            position: relative;
            pointer-events: none;
            display: inline-block;
        }

        .square .red-king {
            color: #e74c3c;
            text-shadow: 0 0 6px #ff0000, 0 0 3px #ff6b6b, 1px 1px 1px rgba(0,0,0,0.4);
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #c0392b;
        }
        
        .square .black-king {
            color: #1a1a2e;
            text-shadow: 0 0 6px #4a4a6a, 0 0 3px #6a6a8a, 1px 1px 1px rgba(0,0,0,0.5);
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #000000;
        }

        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background: linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow: inset 0 0 0 2px #ffd700; }
        .square.in-check { position: relative; animation: checkPulse 0.5s ease-in-out 3; }
        .square.check-giver { position: relative; animation: checkGiverPulse 0.5s ease-in-out 3; }
        .square.hill-square::before { content: "🏔️"; position: absolute; font-size: clamp(10px, 3vw, 14px); bottom: 2px; right: 2px; opacity: 0.6; pointer-events: none; z-index: 1; }
        .square.last-move-from::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(52, 152, 219, 0.4); pointer-events: none; z-index: 1; }
        .square.last-move-to::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(46, 204, 113, 0.4); pointer-events: none; z-index: 1; }
        .square.valid-move::after { content: ""; position: absolute; width: 25%; height: 25%; background: #4caf50; border-radius: 50%; opacity: 0.8; pointer-events: none; z-index: 2; }
        .square.capture::after { background: #ff5722; width: 55%; height: 55%; border-radius: 8px; }

        @keyframes checkPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.15); } }
        @keyframes checkGiverPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }

        .control-panel {
            padding: 0 16px 16px 16px;
        }

        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 50px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            border-left: 4px solid #ffd700;
        }

        .turn-indicator .turn-label {
            font-size: 9px;
            color: #888;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
        }

        .turn-indicator .turn-player {
            font-size: 14px;
            font-weight: 800;
            color: #ffd700;
        }

        button {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
            background: #3a3a4e;
        }

        .reset-btn {
            background: #8b5a2b;
        }

        .reset-btn:active {
            background: #6b4420;
        }

        .move-history {
            background: #16162a;
            padding: 8px 16px;
            border-top: 1px solid #2a2a3e;
            display: flex;
            gap: 12px;
            font-size: 10px;
            flex-wrap: wrap;
        }

        .last-move-info {
            color: #aaa;
            flex: 1;
        }

        .last-move-info span, .check-info span {
            color: #ffd700;
            font-weight: bold;
        }
        
        .check-info {
            color: #e67e22;
        }

        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .victory-card {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px;
            padding: 20px 30px;
            text-align: center;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            min-width: 180px;
        }

        .victory-card .winner-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .victory-card .winner-text {
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .victory-card button {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 8px;
            color: #5a5a6e;
            border-top: 1px solid #2a2a3e;
            background: #16162a;
        }

        @media (max-width: 500px) {
            .board-wrapper { padding: 12px; }
            .mode-btn { padding: 4px 8px; font-size: 9px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="screen active">
        <div class="lobby-screen">
            <h1 class="lobby-title">🎲 GAME VARIANTS</h1>
            <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">Create a room or join with code</p>
            
            <div class="room-input-group">
                <input type="text" id="roomCodeInput" class="room-input" placeholder="Enter room code" maxlength="6">
                <button id="joinRoomBtn" class="btn">JOIN ROOM</button>
            </div>
            
            <button id="createRoomBtn" class="btn">CREATE ROOM</button>
            
            <div style="margin-top: 30px; color: #888; font-size: 12px;">
                Rooms expire after 1 hour of inactivity
            </div>
        </div>
    </div>

    <!-- Game Mode Selection Screen -->
    <div id="modeSelectionScreen" class="screen">
        <div class="game-header">
            <div class="game-title">
                <h1 id="roomCodeDisplay"></h1>
                <div class="mode-selector" id="modeSelector">
                    <div class="mode-btn active" data-mode="standard">♔ Chess</div>
                    <div class="mode-btn" data-mode="chess960">🎲 960</div>
                    <div class="mode-btn" data-mode="kinghill">🏔️ Hill</div>
                    <div class="mode-btn" data-mode="horde">⚔️ Horde</div>
                    <div class="mode-btn" data-mode="checkers">🔴 Checkers</div>
                    <div class="mode-btn" data-mode="anticheckers">💀 Anti</div>
                </div>
            </div>
        </div>
        <div style="padding: 20px; text-align: center;">
            <button id="startGameBtn" class="btn">START GAME</button>
            <button id="backToLobbyBtn" class="btn btn-secondary" style="margin-top: 12px;">BACK</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <div class="game-title">
                <h1 id="gameRoomCode"></h1>
            </div>
        </div>
        
        <div class="board-wrapper" id="boardWrapper">
            <div id="connectionStatus" class="connection-status">Connected</div>
            <div class="board-container" id="boardContainer">
                <div id="chessboard"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="status-bar">
                <div class="turn-indicator" id="turnIndicator">
                    <div class="turn-label">CURRENT TURN</div>
                    <div class="turn-player" id="turnPlayer">⚪ WHITE</div>
                </div>
                <button id="resetBtn" class="reset-btn">NEW GAME</button>
            </div>
            <div class="move-history">
                <div class="last-move-info">
                    📍 Last: <span id="lastMove">None</span>
                </div>
                <div class="check-info" id="checkInfo"></div>
            </div>
        </div>
        <footer>💀 Anti = Lose all pieces to win | 🏔️ Hill = king to center | ⚔️ Horde = 36 pawns | Share room code with friends!</footer>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, set, onValue, remove, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    // Replace with your Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Game state
    let board = [];
    let currentTurn = 'w';
    let selectedSquare = null;
    let validMovesList = [];
    let gameOver = false;
    let winner = null;
    let currentMode = 'standard';
    let mustCapture = false;
    let captureChain = false;
    let lastMoveFrom = null;
    let lastMoveTo = null;
    let roomId = null;
    let playerId = null;
    let playerColor = null;
    let isConnected = true;
    let gameStarted = false;

    // DOM elements
    const screens = {
        lobby: document.getElementById('lobbyScreen'),
        modeSelection: document.getElementById('modeSelectionScreen'),
        game: document.getElementById('gameScreen')
    };
    const boardDiv = document.getElementById('chessboard');
    const boardContainer = document.getElementById('boardContainer');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const resetBtn = document.getElementById('resetBtn');
    const lastMoveSpan = document.getElementById('lastMove');
    const checkInfoSpan = document.getElementById('checkInfo');
    const connectionStatus = document.getElementById('connectionStatus');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const gameRoomCode = document.getElementById('gameRoomCode');

    // UI Controls
    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
    document.getElementById('backToLobbyBtn').addEventListener('click', () => showScreen('lobby'));
    document.getElementById('startGameBtn').addEventListener('click', startGame);
    resetBtn.addEventListener('click', requestNewGame);

    // Generate random room code
    function generateRoomCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    // Screen management
    function showScreen(screenName) {
        Object.values(screens).forEach(screen => screen.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    // Create room
    async function createRoom() {
        roomId = generateRoomCode();
        playerId = generateRoomCode();
        playerColor = 'w'; // Creator is white
        
        try {
            await set(ref(db, `rooms/${roomId}`), {
                mode: 'standard',
                turn: 'w',
                started: false,
                players: {
                    [playerId]: { color: 'w', connected: true, joinedAt: serverTimestamp() }
                },
                board: null,
                lastMove: null,
                gameOver: false,
                createdAt: serverTimestamp()
            });
            
            showScreen('modeSelection');
            roomCodeDisplay.textContent = `Room: ${roomId}`;
            gameRoomCode.textContent = `Room: ${roomId}`;
            
            // Listen for room changes
            listenToRoom(roomId);
        } catch (error) {
            alert('Failed to create room. Please try again.');
        }
    }

    // Join room
    async function joinRoom() {
        const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
        if (!code || code.length !== 6) {
            alert('Please enter a valid 6-character room code');
            return;
        }

        roomId = code;
        playerId = generateRoomCode();
        
        const roomRef = ref(db, `rooms/${roomId}`);
        const snapshot = await get(ref(db, `rooms/${roomId}`));
        
        if (!snapshot.exists()) {
            alert('Room not found. Check the code and try again.');
            return;
        }

        const roomData = snapshot.val();
        if (roomData.started) {
            alert('Game already started. Create a new room.');
            return;
        }

        if (roomData.players && Object.keys(roomData.players).length >= 2) {
            alert('Room is full.');
            return;
        }

        // Assign color (second player is black)
        const availableColor = Object.keys(roomData.players || {}).length === 0 ? 'w' : 'b';
        playerColor = availableColor;

        try {
            await set(ref(db, `rooms/${roomId}/players/${playerId}`), {
                color: playerColor,
                connected: true,
                joinedAt: serverTimestamp()
            });
            
            showScreen('modeSelection');
            roomCodeDisplay.textContent = `Room: ${roomId}`;
            gameRoomCode.textContent = `Room: ${roomId}`;
            
            listenToRoom(roomId);
        } catch (error) {
            alert('Failed to join room. Please try again.');
        }
    }

    // Listen to room updates
    function listenToRoom(roomId) {
        const roomRef = ref(db, `rooms/${roomId}`);
        
        onValue(roomRef, (snapshot) => {
            if (!snapshot.exists()) {
                alert('Room expired or was deleted');
                leaveRoom();
                return;
            }
            
            const roomData = snapshot.val();
            updateConnectionStatus(true);
            
            if (!roomData.started) {
                updatePlayerStatus(roomData);
                return;
            }
            
            // Game started - sync game state
            syncGameState(roomData);
            
            if (!gameStarted) {
                showScreen('game');
                gameStarted = true;
            }
        }, (error) => {
            console.error('Realtime listener error:', error);
            updateConnectionStatus(false);
        });
    }

    function updatePlayerStatus(roomData) {
        const playerSlots = document.querySelectorAll('.player-slot');
        const players = roomData.players || {};
        
        // Update player 1 (white)
        if (players[Object.keys(players)[0]]) {
            // Player 1 connected
        }
        
        // Update player 2 (black)
        if (Object.keys(players).length >= 2) {
            // Both players connected
        }
    }

    function syncGameState(roomData) {
        currentMode = roomData.mode || 'standard';
        currentTurn = roomData.turn || 'w';
        gameOver = roomData.gameOver || false;
        board = roomData.board || [];
        lastMoveFrom = roomData.lastMove?.from;
        lastMoveTo = roomData.lastMove?.to;
        
        if (!gameOver) {
            renderBoard();
            updateTurnDisplay();
        }
    }

    function updateConnectionStatus(connected) {
        isConnected = connected;
        connectionStatus.textContent = connected ? 'Connected' : 'Disconnected';
        connectionStatus.className = `connection-status ${connected ? '' : 'disconnected'}`;
    }

    // Make move via Firebase
    async function makeRemoteMove(fromRow, fromCol, toRow, toCol) {
        if (!roomId || gameOver || !isConnected) return false;
        
        if (currentTurn !== playerColor) {
            showSpectatorNotice();
            return false;
        }
        
        const success = makeMove(fromRow, fromCol, toRow, toCol);
        if (!success) return false;
        
        try {
            await set(ref(db, `rooms/${roomId}`), {
                mode: currentMode,
                turn: currentTurn,
                started: true,
                board: board,
                lastMove: { from: lastMoveFrom, to: lastMoveTo },
                gameOver: gameOver,
                winner: winner
            });
            return true;
        } catch (error) {
            console.error('Failed to sync move:', error);
            return false;
        }
    }

    function showSpectatorNotice() {
        // Show it's not your turn
        const indicator = document.getElementById('turnIndicator');
        indicator.style.background = 'linear-gradient(135deg, #f44336, #d32f2f)';
    }

    async function startGame() {
        const selectedModeBtn = document.querySelector('#modeSelector .mode-btn.active');
        currentMode = selectedModeBtn.dataset.mode;
        
        try {
            await set(ref(db, `rooms/${roomId}/mode`), currentMode);
            await set(ref(db, `rooms/${roomId}/started`), true);
            showScreen('game');
            initBoard();
            renderBoard();
            gameStarted = true;
        } catch (error) {
            alert('Failed to start game');
        }
    }

    async function requestNewGame() {
        if (!roomId) return;
        
        const confirmed = confirm('Start a new game? Current game will be reset.');
        if (!confirmed) return;
        
        try {
            await set(ref(db, `rooms/${roomId}`), {
                mode: currentMode,
                turn: 'w',
                started: true,
                board: null,
