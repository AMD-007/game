function render(G) {
  boardEl.innerHTML = '';

  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);

  // Check givers — only for chess modes
  var givers  = (G.over||isC||isCTC) ? [] : checkGivers(G.turn, G);
  var gSet    = new Set(givers.map(g=>`${g.row},${g.col}`));

  for (var r=0; r<8; r++) for (var c=0; c<8; c++) {
    var p   = G.board[r][c];
    var sq  = document.createElement('div');
    sq.className = `sq ${(r+c)%2===0?'li':'dk'}`;

    var sqAlg = alg(r,c);
    var isSel = G.sel && G.sel.row===r && G.sel.col===c;
    var mvM   = G.moves.find(m=>m.row===r&&m.col===c);

    if (isSel)             sq.classList.add('sel');
    if (G.lmFrom===sqAlg)  sq.classList.add('lf');
    if (G.lmTo===sqAlg)    sq.classList.add('lt');

    // Chess-only states
    if (!isC && !isCTC && !G.over) {
      if (p?.type==='k' && inCheck(p.color, G.board)) sq.classList.add('chk');
      if (gSet.has(`${r},${c}`))                      sq.classList.add('gvr');
    }

    // King of the Hill centre squares
    if (G.mode==='kinghill' && r>=3&&r<=4&&c>=3&&c<=4) sq.classList.add('hill');

    // Coast to Coast home corners
    if (isCTC) {
      if (r===CTC_HOME.w.row && c===CTC_HOME.w.col) sq.classList.add('ctc-home-r');
      if (r===CTC_HOME.b.row && c===CTC_HOME.b.col) sq.classList.add('ctc-home-b');
    }

    // Valid move indicators
    if (mvM) {
      var isCap = (p && p.color!==G.turn) || mvM.cap || mvM.epCap;
      sq.classList.add(isCap ? 'vc' : 'vm');
    }

    // Chess123 SP promote: highlight selectable pawns with gold ring
    if (is123Mode(G.mode) && G.c123.phase==='sp-promote' && G.c123.spPawns) {
      if (G.c123.spPawns.some(pw=>pw.row===r&&pw.col===c)) {
        sq.classList.add('sp-pawn');
      }
    }

    sq.innerHTML = pieceHTML(p);
    sq.dataset.sq = `${r},${c}`;  // for animation targeting

    // Click listener — captures r,c correctly in closure
    ;(function(rr,cc) {
      sq.addEventListener('click', () => window.handleBoardClick(rr,cc));
    })(r,c);

    boardEl.appendChild(sq);
  }

  // ── TURN LABEL ──
  if (!G.over) {
    if (isC||isCTC)
      tplrEl.innerHTML = G.turn==='w' ? '🔴 RED\'S TURN' : '⚫ BLACK\'S TURN';
    else if (G.mode==='horde')
      tplrEl.innerHTML = G.turn==='w' ? '⚪ HORDE TURN' : '⚫ BLACK\'S TURN';
    else
      tplrEl.innerHTML = G.turn==='w' ? '⚪ WHITE\'S TURN' : '⚫ BLACK\'S TURN';
  }

  // ── SCORE ROW (CTC only) ──
  if (isCTC) {
    scoreRow.style.display  = 'flex';
    scoreRedEl.textContent  = G.ctcScore.w;
    scoreBlkEl.textContent  = G.ctcScore.b;
  } else {
    scoreRow.style.display = 'none';
  }

  // ── CHECK INDICATOR ──
  if (!G.over && isChessMode(G.mode) && G.mode!=='horde' && inCheck(G.turn, G.board)) {
    chkiEl.innerHTML = `⚠️ CHECK${givers.length>1?' (Double)':''}!`;
  } else if (!G.ctcBonus) {
    chkiEl.innerHTML = '';
  }

  // ── BOARD FLIP ──
  // ── BOARD FLIP — removed, 2-device multiplayer ──
  // No board rotation — each player uses their own device in multiplayer
  // Single device: players sit on same side or physically rotate device
  bcontEl.classList.remove('flip');

  // ── CHESS123 HUD ──
  if (is123Mode(G.mode)) render123HUD(G);
  else {
    var hudEl = document.getElementById('hud123');
    if (hudEl) hudEl.style.display = 'none';
  }
}

// ── BOARD SERIALISATION ───────────────────────────────────────────────
// Firebase can't store arrays with null — serialize board to flat object
function serializeBoard(board) {
  var obj = {};
  for (var r=0; r<8; r++) for (var c=0; c<8; c++) {
    var p = board[r][c];
    if (p) obj[`${r}_${c}`] = p;
  }
  return obj;
}

function deserializeBoard(obj) {
  var board = Array(8).fill(null).map(() => Array(8).fill(null));
  if (!obj) return board;
  for (var [key, val] of Object.entries(obj)) {
    var [r,c] = key.split('_').map(Number);
    board[r][c] = val;
  }
  return board;
}

// ── GAME STATE → FIREBASE ─────────────────────────────────────────────
function serializeGameState(G) {
  return {
    mode:     G.mode,
    turn:     G.turn,
    board:    serializeBoard(G.board),
    ep:       G.ep    ? `${G.ep.row},${G.ep.col}`    : null,
    cr:       { wk:G.cr.w.k, wq:G.cr.w.q, bk:G.cr.b.k, bq:G.cr.b.q },
    rsc:      { wk:G.rsc.w.k, wq:G.rsc.w.q, bk:G.rsc.b.k, bq:G.rsc.b.q },
    lmFrom:   G.lmFrom || null,
    lmTo:     G.lmTo   || null,
    hmc:      G.hmc,
    posHist:  G.posHist.length ? G.posHist.join('|') : null,
    over:     G.over,
    winner:   G.winner || null,
    // Checkers
    mustCap:  G.mustCap,
    chain:    G.chain,
    chainSq:  G.chainSq ? `${G.chainSq.row},${G.chainSq.col}` : null,
    // CTC
    ctcScore: G.ctcScore,
    ctcBonus: G.ctcBonus ? `${G.ctcBonus.row},${G.ctcBonus.col}` : null,
    // Chess123
    skills:   G.mode === 'chess123' ? {
      w: serializeSkills(G.skills.w),
      b: serializeSkills(G.skills.b),
    } : null,
    c123phase: G.mode === 'chess123' ? G.c123.phase : null,
  };
}

function serializeSkills(sk) {
  return {
    bank:         sk.bank,
    checkCount:   sk.checkCount,
    s2unlocked:   sk.s2unlocked,
    s2used:       sk.s2used,
    autoBank:     sk.autoBank.length ? sk.autoBank.map(a=>a.turnsLeft).join(',') : null,
    spUnlocked:   sk.spUnlocked,
    spPending:    sk.spPending,
    spConfirming: sk.spConfirming,
    spDone:       sk.spDone,
    cooldown:     sk.cooldown,
    midLost:      sk.midLost,
  };
}

function deserializeGameState(data, G) {
  if (!data) return;
  G.mode    = data.mode    || G.mode;
  G.turn    = data.turn    || 'w';
  G.board   = deserializeBoard(data.board);
  G.ep      = data.ep ? { row: parseInt(data.ep.split(',')[0]), col: parseInt(data.ep.split(',')[1]) } : null;
  G.cr      = { w:{k:!!data.cr?.wk, q:!!data.cr?.wq}, b:{k:!!data.cr?.bk, q:!!data.cr?.bq} };
  G.rsc     = { w:{k:data.rsc?.wk??7, q:data.rsc?.wq??0}, b:{k:data.rsc?.bk??7, q:data.rsc?.bq??0} };
  G.lmFrom  = data.lmFrom  || null;
  G.lmTo    = data.lmTo    || null;
  G.hmc     = data.hmc     || 0;
  G.posHist = data.posHist ? data.posHist.split('|') : [];
  G.over    = !!data.over;
  G.mustCap = !!data.mustCap;
  G.chain   = !!data.chain;
  G.chainSq = data.chainSq ? { row:parseInt(data.chainSq.split(',')[0]), col:parseInt(data.chainSq.split(',')[1]) } : null;
  G.ctcScore = data.ctcScore || {w:0, b:0};
  G.ctcBonus = data.ctcBonus ? { row:parseInt(data.ctcBonus.split(',')[0]), col:parseInt(data.ctcBonus.split(',')[1]) } : null;

  if (data.mode === 'chess123' && data.skills) {
    G.skills = {
      w: deserializeSkills(data.skills.w),
      b: deserializeSkills(data.skills.b),
    };
    G.c123.phase = data.c123phase || 'normal';
  }
}

function deserializeSkills(sk) {
  if (!sk) return null;
  var s = freshSkills();
  s.bank         = sk.bank         ?? 2;
  s.checkCount   = sk.checkCount   ?? 0;
  s.s2unlocked   = !!sk.s2unlocked;
  s.s2used       = !!sk.s2used;
  s.autoBank     = sk.autoBank ? sk.autoBank.split(',').map(t=>({turnsLeft:parseInt(t)})) : [];
  s.spUnlocked   = !!sk.spUnlocked;
  s.spPending    = sk.spPending    ?? 0;
  s.spConfirming = !!sk.spConfirming;
  s.spDone       = !!sk.spDone;
  s.cooldown     = !!sk.cooldown;
  s.midLost      = sk.midLost      ?? 0;
  return s;
}

// Create a new room — called by host
async function createRoom(roomId, mode, hostColor, G) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var expires = Date.now() + 6 * 60 * 60 * 1000; // 6 hours

  var roomData = {
    mode,
    status:    'waiting',
    createdAt: serverTimestamp(),
    expiresAt: expires,
    players: {
      [hostColor]: { joined: true, ready: true }
    },
    myColor:  hostColor,
    ...serializeGameState(G),
  };

  await set(roomRef, roomData);

  // Auto-cleanup on disconnect if still waiting
  onDisconnect(ref(db, `rooms/${roomId}/players/${hostColor}`))
    .remove();

  return roomId;
}

// Join existing room — called by guest
async function joinRoom(roomId, guestColor) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var snap    = await get(roomRef);

  if (!snap.exists()) throw new Error('Room not found');
  var data = snap.val();
  if (data.status !== 'waiting') throw new Error('Game already started');
  if (data.players?.[guestColor]) throw new Error('Color already taken');

  await update(ref(db, `rooms/${roomId}`), {
    [`players/${guestColor}`]: { joined: true, ready: true },
    status: 'playing',
  });

  onDisconnect(ref(db, `rooms/${roomId}/players/${guestColor}`))
    .remove();

  return data;
}

// Submit a move — write full game state to Firebase
async function submitMove(roomId, G) {
  await update(ref(db, `rooms/${roomId}`), serializeGameState(G));
}

// Listen to room changes — fires on every state update
function listenRoom(roomId, callback) {
  var roomRef = ref(db, `rooms/${roomId}`);
  onValue(roomRef, snap => {
    if (snap.exists()) callback(snap.val());
  });
  return () => off(roomRef); // returns unsubscribe fn
}

// End game
async function endRoom(roomId, winner) {
  await update(ref(db, `rooms/${roomId}`), {
    status: 'ended',
    winner,
    over:   true,
  });
}

// Get room once (for joining)
async function getRoom(roomId) {
  var snap = await get(ref(db, `rooms/${roomId}`));
  return snap.exists() ? snap.val() : null;
}

  var base = window.location.href.split('?')[0];
  return `${base}?r=${roomId}&c=${color}`;
}

// ── SHOW LOBBY SCREEN ─────────────────────────────────────────────────
function showLobby(G, onGameStart) {
  var el = document.getElementById('lobby-screen');
  if (!el) return;
  el.style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';

  renderLobbyHome(G, onGameStart);
}

function hideLobby() {
  var el = document.getElementById('lobby-screen');
  if (el) el.style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

// ── LOBBY HOME ────────────────────────────────────────────────────────
function renderLobbyHome(G, onGameStart) {
  var el = document.getElementById('lobby-content');
  if (!el) return;

  var modeNames = {
    standard:     '♔ Standard Chess',
    chess960:     '⚄ Chess 960',
    kinghill:     '⛰ King of the Hill',
    horde:        '⚔ Horde',
    checkers:     '● Checkers',
    anticheckers: '◌ Anti-Checkers',
    coasttocoast: '⚑ Coast to Coast',
    chess123:     '♟ Chess123',
  };

  el.innerHTML = `
    <div class="lobby-card">
      <div class="lobby-title">MaxPlay</div>
      <div class="lobby-subtitle">Multiplayer</div>

      <div class="lobby-mode-label">Current Mode</div>
      <div class="lobby-mode-name">${modeNames[G.mode] || G.mode}</div>

      <div class="lobby-divider"></div>

      <button class="lobby-btn lobby-btn-primary" id="btn-host-w">
        ⚪ Host as White / Red
      </button>
      <button class="lobby-btn lobby-btn-secondary" id="btn-host-b">
        ⚫ Host as Black
      </button>

      <div class="lobby-or">— or —</div>

      <div class="lobby-join-row">
        <input class="lobby-input" id="join-code" placeholder="Enter room code" maxlength="6">
        <button class="lobby-btn lobby-btn-join" id="btn-join">Join</button>
      </div>

      <div class="lobby-err" id="lobby-err"></div>

      <button class="lobby-btn lobby-btn-back" id="btn-back">← Back to Game</button>
    </div>
  `;

  document.getElementById('btn-host-w').onclick = () => hostGame(G, 'w', onGameStart);
  document.getElementById('btn-host-b').onclick = () => hostGame(G, 'b', onGameStart);
  document.getElementById('btn-join').onclick    = () => {
    var code = document.getElementById('join-code').value.trim().toUpperCase();
    if (code.length !== 6) { showErr('Enter a 6-character room code'); return; }
    joinGame(code, G, onGameStart);
  };
  document.getElementById('join-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-join').click();
  });
  document.getElementById('btn-back').onclick = hideLobby;
}

function showErr(msg) {
  var el = document.getElementById('lobby-err');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ── HOST GAME ─────────────────────────────────────────────────────────
async function hostGame(G, color, onGameStart) {
  var roomId = genRoomId();
  var el     = document.getElementById('lobby-content');

  el.innerHTML = `<div class="lobby-card"><div class="lobby-spinner">Creating room…</div></div>`;

  try {
    await createRoom(roomId, G.mode, color, G);
    MP.roomId  = roomId;
    MP.myColor = color;
    MP.isHost  = true;
    MP.active  = true;

    renderWaitingScreen(roomId, color, G, onGameStart);
  } catch (err) {
    el.innerHTML = `<div class="lobby-card"><div class="lobby-err">Failed: ${err.message}</div></div>`;
  }
}

// ── WAITING SCREEN ────────────────────────────────────────────────────
function renderWaitingScreen(roomId, myColor, G, onGameStart) {
  var el       = document.getElementById('lobby-content');
  var oppColor = myColor === 'w' ? 'b' : 'w';
  var joinURL  = buildJoinURL(roomId, oppColor);

  el.innerHTML = `
    <div class="lobby-card">
      <div class="lobby-title">Room Created</div>
      <div class="lobby-room-code">${roomId}</div>
      <div class="lobby-waiting-msg">Waiting for opponent…</div>

      <div class="lobby-qr" id="qr-container">
        <canvas id="qr-canvas"></canvas>
      </div>

      <div class="lobby-share-label">Share this link:</div>
      <div class="lobby-share-url">${joinURL}</div>

      <button class="lobby-btn lobby-btn-copy" id="btn-copy">📋 Copy Link</button>
      <button class="lobby-btn lobby-btn-back" id="btn-cancel">✕ Cancel</button>
    </div>
  `;

  // Generate QR code
  generateQR(joinURL, 'qr-canvas');

  document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard?.writeText(joinURL).then(() => {
      document.getElementById('btn-copy').textContent = '✓ Copied!';
      setTimeout(() => { document.getElementById('btn-copy').textContent = '📋 Copy Link'; }, 2000);
    });
  };

  document.getElementById('btn-cancel').onclick = () => {
    if (MP.unsubscribe) MP.unsubscribe();
    MP.active = false;
    renderLobbyHome(G, onGameStart);
  };

  // Listen for opponent joining
  MP.unsubscribe = listenRoom(roomId, data => {
    if (data.status === 'playing' && data.players?.w?.joined && data.players?.b?.joined) {
      if (MP.unsubscribe) MP.unsubscribe();
      onGameStart(roomId, myColor, G);
    }
  });
}

// ── JOIN GAME ─────────────────────────────────────────────────────────
async function joinGame(roomId, G, onGameStart) {
  var el = document.getElementById('lobby-content');
  el.innerHTML = `<div class="lobby-card"><div class="lobby-spinner">Joining…</div></div>`;

  try {
    var data     = await getRoom(roomId);
    if (!data)     throw new Error('Room not found');
    if (data.status === 'ended') throw new Error('Game already ended');

    // Determine which color is available
    var wTaken = !!data.players?.w?.joined;
    var bTaken = !!data.players?.b?.joined;
    if (wTaken && bTaken) throw new Error('Room is full');

    var myColor = wTaken ? 'b' : 'w';
    await joinRoom(roomId, myColor);

    MP.roomId  = roomId;
    MP.myColor = myColor;
    MP.isHost  = false;
    MP.active  = true;

    onGameStart(roomId, myColor, G);
  } catch (err) {
    el.innerHTML = `
      <div class="lobby-card">
        <div class="lobby-err">${err.message}</div>
        <button class="lobby-btn lobby-btn-back" id="btn-back2">← Back</button>
      </div>`;
    document.getElementById('btn-back2').onclick = () => renderLobbyHome(G, onGameStart);
  }
}

// ── QR CODE GENERATOR ─────────────────────────────────────────────────
// Lightweight QR using Google Charts API (no library needed)
function generateQR(url, canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;

  // Use QR server API — simple and reliable
  var img  = new Image();
  var size = 160;
  img.onload = () => {
    canvas.width  = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0e8d8';
    ctx.fillRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = () => {
    // Fallback: just show URL if QR fails
    canvas.style.display = 'none';
  };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}&bgcolor=f0e8d8&color=2c1a0e`;
}

// ── AUTO-JOIN FROM URL ────────────────────────────────────────────────
// If player opens a join link, auto-start join flow
async function handleURLJoin(G, onGameStart) {
  var { roomId, color } = getRoomFromURL();
  if (!roomId) return false;

  // Clear URL params without reload
  var cleanURL = window.location.href.split('?')[0];
  window.history.replaceState({}, '', cleanURL);

  showLobby(G, onGameStart);
  var el = document.getElementById('lobby-content');
  el.innerHTML = `<div class="lobby-card"><div class="lobby-spinner">Joining room ${roomId}…</div></div>`;

  try {
    var data = await getRoom(roomId);
    if (!data) throw new Error('Room not found');

    // Determine color: use URL color if available, else pick free one
    var wTaken = !!data.players?.w?.joined;
    var bTaken = !!data.players?.b?.joined;
    var myColor  = color;

    if (myColor === 'w' && wTaken) myColor = bTaken ? null : 'b';
    if (myColor === 'b' && bTaken) myColor = wTaken ? null : 'w';
    if (!myColor) {
      myColor = !wTaken ? 'w' : !bTaken ? 'b' : null;
    }
    if (!myColor) throw new Error('Room is full');

    await joinRoom(roomId, myColor);
    MP.roomId  = roomId;
    MP.myColor = myColor;
    MP.isHost  = false;
    MP.active  = true;

    onGameStart(roomId, myColor, G);
    return true;
  } catch (err) {
    el.innerHTML = `
      <div class="lobby-card">
        <div class="lobby-err">${err.message}</div>
        <button class="lobby-btn lobby-btn-back" onclick="location.reload()">← Try Again</button>
      </div>`;
    return true; // handled (even if error)
  }
}

// ── main.js ──
// ════════════════════════════════════════════════════════
//  js/main.js — Entry point
//  Event listeners, click handling, mode switching, boot
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  GLOBAL STATE
// ════════════════════════════════════════════════════════
var G = freshState();

// ════════════════════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════════════════════
var boardEl    = document.getElementById('board');
var bwrapEl    = document.getElementById('bwrap');
var bcontEl    = document.getElementById('bcont');
var tplrEl     = document.getElementById('tplr');
var lmvEl      = document.getElementById('lmv');
var chkiEl     = document.getElementById('chki');
var scoreRow   = document.getElementById('scoreRow');
var scoreRedEl = document.getElementById('scoreRed');
var scoreBlkEl = document.getElementById('scoreBlk');
var modeBtns   = document.querySelectorAll('.mbtn');

// Pass DOM refs to render module
// ════════════════════════════════════════════════════════
//  MOVE SELECTION HELPERS
// ════════════════════════════════════════════════════════
function getMovesFor(row, col) {
  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  G.mustCap = isC ? anyCapture(G.turn, G.board) : false;

  var ms;
  if (isC)        ms = checkerMoves(row, col, G.board);
  else if (isCTC) ms = ctcMoves(row, col, G.board);
  else            ms = legalMoves(row, col, G);

  if (G.mustCap) ms = ms.filter(m => m.cap);

  // Chess123 Move-2 second piece: cannot move same piece as first
  if (is123 && G.c123.phase === 'move2-second' && G.c123.firstPiece) {
    var fp = G.c123.firstPiece;
    if (row === fp.row && col === fp.col) return []; // can't pick same piece
  }

  // Chess123 Special-2 second: MUST move same piece as first
  if (is123 && G.c123.phase === 's2-second' && G.c123.firstPiece) {
    var fp = G.c123.firstPiece;
    if (row !== fp.row || col !== fp.col) return []; // must be same piece
  }

  return ms;
}

// Expose skill activation for HUD buttons
window.activateSkill = function(skillKey) {
  G.hist.push(snapState(G, lmvEl.innerHTML));
  activateSkill123(skillKey, G, chkiEl);
};

// ════════════════════════════════════════════════════════
//  CLICK HANDLER (exposed globally for render.js)
// ════════════════════════════════════════════════════════
window.handleBoardClick = function(row, col) {
  if (G.over) return;

  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  // ── Chess123 SP promote phase: click a pawn to promote ──
  if (is123 && G.c123.phase === 'sp-promote') {
    execChess123(row, col, null, G, lmvEl, chkiEl);
    return;
  }

  // ── CTC bonus move ──
  if (isCTC && G.ctcBonus) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execCTCBonus(G.ctcBonus.row, G.ctcBonus.col, mv, G, lmvEl, chkiEl);
    }
    return;
  }

  // ── Checkers capture chain ──
  if (isC && G.chain && G.chainSq) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execChecker(G.chainSq.row, G.chainSq.col, mv, G, lmvEl, chkiEl);
    }
    return;
  }

  if (!G.sel) {
    // ── SELECT a piece ──
    var p = G.board[row][col];
    if (!p || p.color !== G.turn) return;
    if ((isC||isCTC) && p.type !== 'checker') return;

    // Chess123: during s2-second only the first piece is selectable
    if (is123 && G.c123.phase === 's2-second') {
      var fp = G.c123.firstPiece;
      if (!fp || row !== fp.row || col !== fp.col) return;
    }

    var ms = getMovesFor(row, col);
    if (!ms.length) return;

    G.sel   = {row, col};
    G.moves = ms;
    render(G);

  } else {
    var mv = G.moves.find(m => m.row===row && m.col===col);

    if (mv) {
      // ── EXECUTE move ──
      if (!is123) G.hist.push(snapState(G, lmvEl.innerHTML));
      var {row:fr, col:fc} = G.sel;
      G.sel = null; G.moves = [];

      if (isC)        execChecker(fr, fc, mv, G, lmvEl, chkiEl);
      else if (isCTC) execCTC(fr, fc, mv, G, lmvEl, chkiEl);
      else if (is123) execChess123(fr, fc, mv, G, lmvEl, chkiEl);
      else            execChess(fr, fc, mv, G, lmvEl, chkiEl);

    } else {
      // ── RESELECT ──
      var p = G.board[row][col];
      if (p && p.color===G.turn && !((isC||isCTC) && p.type!=='checker')) {
        var ms = getMovesFor(row, col);
        if (ms.length) { G.sel={row,col}; G.moves=ms; render(G); return; }
      }
      G.sel = null; G.moves = [];
      render(G);
    }
  }
};

// ════════════════════════════════════════════════════════
//  MULTIPLAYER — GAME START + SYNC
// ════════════════════════════════════════════════════════

// Called when both players have joined — start live sync
function onGameStart(roomId, myColor, gameG) {
  hideLobby();
  MP.active  = true;
  MP.roomId  = roomId;
  MP.myColor = myColor;

  // Show which color I am
  var colorLabel = document.getElementById('my-color-label');
  if (colorLabel) {
    colorLabel.textContent = myColor === 'w' ? '⚪ You are White' : '⚫ You are Black';
    colorLabel.style.display = 'block';
  }

  // Listen to Firebase for opponent moves
  MP.unsubscribe = listenRoom(roomId, data => {
    // Only update if it's NOT our turn (opponent just moved)
    if (data.turn === MP.myColor) return; // our turn = we already have state
    if (data.status === 'waiting') return;

    // Apply remote state to G
    deserializeGameState(data, G);
    G.sel   = null;
    G.moves = [];
    render(G);
  });
}

// Override execChess/execChecker etc to also push to Firebase
// We wrap the original move execution to submit after each move
var _origHandleClick = window.handleBoardClick;
window.handleBoardClick = function(row, col) {
  if (MP.active) {
    // In multiplayer: only allow moves on your turn
    if (G.turn !== MP.myColor) return;
  }
  _origHandleClick(row, col);

  // After move executed, push to Firebase
  if (MP.active && MP.roomId) {
    // Small delay to var state settle (especially for async promo)
    setTimeout(() => submitMove(MP.roomId, G), 50);
  }
};

// ════════════════════════════════════════════════════════
//  UNDO
// ════════════════════════════════════════════════════════
function doUndo() {
  if (MP.active) return; // no undo in multiplayer
  if (!G.hist.length) return;
  restoreState(G, G.hist.pop(), lmvEl);
  G.over     = false;
  G.sel      = null;
  G.moves    = [];
  G.ctcBonus = null;
  clearOverlays();
  render(G);
}

// ════════════════════════════════════════════════════════
//  RESET
// ════════════════════════════════════════════════════════
function doReset() {
  if (MP.active) {
    // In multiplayer: disconnect and return to lobby
    if (MP.unsubscribe) MP.unsubscribe();
    MP.active  = false;
    MP.roomId  = null;
    MP.myColor = null;
    var label = document.getElementById('my-color-label');
    if (label) label.style.display = 'none';
  }
  clearOverlays();
  var mode = G.mode;
  G = freshState();
  G.mode = mode;
  initBoard(G);
  lmvEl.innerHTML  = '—';
  chkiEl.innerHTML = '';
  render(G);
}
window.doReset = doReset;

// ════════════════════════════════════════════════════════
//  MODE SWITCH
// ════════════════════════════════════════════════════════
function switchMode(mode) {
  if (MP.active) return; // can't switch mode mid-game
  G.mode = mode;
  modeBtns.forEach(b => b.classList.toggle('on', b.dataset.mode===mode));
  doReset();
}

// ════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════
document.getElementById('resetBtn').addEventListener('click', doReset);
document.getElementById('undoBtn').addEventListener('click', doUndo);
modeBtns.forEach(btn => btn.addEventListener('click', () => switchMode(btn.dataset.mode)));

// Multiplayer button
var mpBtn = document.getElementById('mp-btn');
if (mpBtn) mpBtn.addEventListener('click', () => showLobby(G, onGameStart));

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
initBoard(G);
render(G);

// Check if opened via join link
handleURLJoin(G, onGameStart);

})().catch(function(err) {
  console.error('MaxPlay error:', err);
  document.body.innerHTML += '<div style="color:red;padding:20px;font-family:monospace">Error: ' + err.message + '</div>';
});

</script>
