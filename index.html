<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Multiplayer Game Variants</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:8px; }
        .app-container { max-width:600px; width:100%; margin:0 auto; background:#1e1e2e; border-radius:28px; overflow:hidden; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }

        .game-header { padding:12px 16px; background:#16162a; border-bottom:1px solid #2a2a3e; }
        .game-title h1 { font-size:18px; font-weight:700; color:#ffd700; margin-bottom:10px; text-align:center; }
        .mode-selector { display:flex; flex-wrap:wrap; gap:6px; background:#0f0f1a; padding:6px; border-radius:50px; justify-content:center; }
        .mode-btn { background:transparent; padding:5px 10px; font-size:10px; font-weight:600; color:#aaa; border-radius:40px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .mode-btn.active { background:#ffd700; color:#1a1a2e; }

        .board-wrapper { padding:16px; background:#16162a; position:relative; perspective:1000px; }
        .board-container { transition:transform 0.5s cubic-bezier(0.2,0.9,0.4,1.1); transform-style:preserve-3d; }
        .board-container.black-turn-view { transform:rotate(180deg); }

        #chessboard { display:grid; grid-template-columns:repeat(8, 1fr); width:100%; aspect-ratio:1/1; background:#f0d9b5; border-radius:12px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.3); }

        .victory-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); display:flex; justify-content:center; align-items:center; border-radius:12px; z-index:100; animation:fadeIn 0.3s ease; }
        .victory-card { background:linear-gradient(145deg, #2a2a3e, #1a1a2e); border-radius:40px; padding:20px 30px; text-align:center; border:2px solid #ffd700; box-shadow:0 20px 40px rgba(0,0,0,0.5); min-width:180px; }
        .victory-card .winner-icon { font-size:48px; margin-bottom:12px; }
        .victory-card .winner-text { font-size:24px; font-weight:800; color:#ffd700; letter-spacing:2px; margin-bottom:6px; }
        .victory-card .winner-sub { font-size:11px; color:#aaa; margin-bottom:16px; }
        .victory-card button { background:#ffd700; color:#1a1a2e; border:none; padding:8px 20px; border-radius:40px; font-weight:700; font-size:13px; cursor:pointer; margin:4px; }

        @keyframes fadeIn { from{opacity:0;transform:scale(0.9);} to{opacity:1;transform:scale(1);} }

        .square { display:flex; align-items:center; justify-content:center; cursor:pointer; aspect-ratio:1/1; position:relative; transition:all 0.1s ease; -webkit-tap-highlight-color:transparent; }
        .board-container.black-turn-view .square { transform:rotate(180deg); }
        .square span { font-size:clamp(20px, 6vw, 32px); font-weight:500; text-shadow:1px 1px 1px rgba(0,0,0,0.2); z-index:2; position:relative; pointer-events:none; display:inline-block; }
        .square .red-king { color:#e74c3c; text-shadow:0 0 6px #ff0000,0 0 3px #ff6b6b,1px 1px 1px rgba(0,0,0,0.4); font-size:clamp(24px,7vw,38px); font-weight:bold; -webkit-text-stroke:1px #c0392b; display:inline-block; }
        .square .black-king { color:#1a1a2e; text-shadow:0 0 6px #4a4a6a,0 0 3px #6a6a8a,1px 1px 1px rgba(0,0,0,0.5); font-size:clamp(24px,7vw,38px); font-weight:bold; -webkit-text-stroke:1px #000000; display:inline-block; }
        .square.light { background-color:#f0d9b5; }
        .square.dark { background-color:#b58863; }
        .square.selected { background:linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow:inset 0 0 0 2px #ffd700; }
        .square.in-check { position:relative; animation:checkPulse 0.5s ease-in-out 3; }
        .square.in-check::before { content:""; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; background:radial-gradient(circle, rgba(192,57,43,0.6), rgba(192,57,43,0.2)); border-radius:4px; pointer-events:none; z-index:1; }
        .square.check-giver { position:relative; animation:checkGiverPulse 0.5s ease-in-out 3; }
        .square.check-giver::before { content:""; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; background:radial-gradient(circle, rgba(230,126,34,0.6), rgba(230,126,34,0.2)); border-radius:4px; pointer-events:none; z-index:1; }
        .square.hill-square::before { content:"🏔️"; position:absolute; font-size:clamp(10px,3vw,14px); bottom:2px; right:2px; opacity:0.6; pointer-events:none; z-index:1; }
        @keyframes checkPulse { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.15);} }
        @keyframes checkGiverPulse { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.2);} }
        .square.last-move-from::before { content:""; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(52,152,219,0.4); pointer-events:none; z-index:1; }
        .square.last-move-to::before { content:""; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(46,204,113,0.4); pointer-events:none; z-index:1; }
        .square.valid-move::after { content:""; position:absolute; width:25%; height:25%; background:#4caf50; border-radius:50%; opacity:0.8; pointer-events:none; z-index:2; }
        .square.capture::after { background:#ff5722; width:55%; height:55%; border-radius:8px; }

        .control-panel { padding:0 16px 16px 16px; }
        .status-bar { background:#16162a; border-radius:60px; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
        .turn-indicator { background:linear-gradient(135deg, #2a2a3e, #1a1a2e); border-radius:50px; padding:8px 16px; text-align:center; flex:1; border-left:4px solid #ffd700; }
        .turn-indicator .turn-label { font-size:9px; color:#888; letter-spacing:1.5px; margin-bottom:2px; }
        .turn-indicator .turn-player { font-size:14px; font-weight:800; color:#ffd700; }
        button { background:#2a2a3e; border:none; color:white; font-weight:600; padding:8px 16px; border-radius:40px; font-size:12px; cursor:pointer; transition:all 0.1s; font-family:inherit; -webkit-tap-highlight-color:transparent; }
        button:active { transform:scale(0.95); background:#3a3a4e; }
        .reset-btn { background:#8b5a2b; }
        .reset-btn:active { background:#6b4420; }

        .move-history { background:#16162a; padding:8px 16px; border-top:1px solid #2a2a3e; display:flex; gap:12px; font-size:10px; flex-wrap:wrap; }
        .last-move-info { color:#aaa; flex:1; }
        .last-move-info span, .check-info span { color:#ffd700; font-weight:bold; }
        .check-info { color:#e67e22; }

        footer { text-align:center; padding:10px; font-size:8px; color:#5a5a6e; border-top:1px solid #2a2a3e; background:#16162a; }

        /* Lobby styles */
        .lobby-container { padding:20px; text-align:center; }
        .lobby-container h2 { color:#ffd700; margin-bottom:12px; }
        .lobby-input { background:#2a2a3e; border:1px solid #3a3a4e; color:white; padding:10px; border-radius:20px; width:100%; margin-bottom:10px; text-align:center; font-size:16px; outline:none; }
        .lobby-input::placeholder { color:#888; }
        .lobby-btn { background:#ffd700; color:#1a1a2e; border:none; padding:12px 24px; border-radius:40px; font-weight:700; margin:6px; cursor:pointer; }
        .room-info { background:#16162a; padding:8px 12px; border-radius:20px; margin:10px 0; display:flex; justify-content:space-between; align-items:center; }
        .room-code { font-size:18px; font-weight:bold; color:#ffd700; letter-spacing:2px; }
        .player-badge { background:#2a2a3e; padding:4px 12px; border-radius:12px; font-size:12px; }

        .hidden { display:none; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Lobby (visible until game starts) -->
    <div id="lobbyContainer" class="lobby-container">
        <h2>♟️ Multiplayer Lobby</h2>
        <div id="lobbyActions">
            <button class="lobby-btn" id="createRoomBtn">Create New Room</button>
            <p style="color:#aaa; margin:12px 0;">— or —</p>
            <input class="lobby-input" id="joinCodeInput" placeholder="Enter room code" maxlength="6">
            <button class="lobby-btn" id="joinRoomBtn">Join Room</button>
        </div>
        <div id="roomStatus" class="hidden">
            <div class="room-info">
                <span>Room:</span>
                <span class="room-code" id="roomCodeDisplay"></span>
            </div>
            <div id="playersInfo" style="color:#aaa; font-size:12px; margin:8px 0;">Waiting for opponent...</div>
            <button class="lobby-btn" id="leaveRoomBtn" style="background:#8b5a2b;">Leave Room</button>
        </div>
    </div>

    <!-- Main Game UI (hidden until game starts) -->
    <div id="gameUI" class="hidden">
        <div class="game-header">
            <div class="game-title">
                <h1 id="gameTitle">🎲 GAME VARIANTS</h1>
                <div class="mode-selector hidden" id="variantSelector">
                    <!-- Host-only variant changer (after game over) -->
                </div>
            </div>
        </div>

        <div class="board-wrapper" id="boardWrapper">
            <div class="board-container" id="boardContainer">
                <div id="chessboard"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="status-bar">
                <div class="turn-indicator" id="turnIndicator">
                    <div class="turn-label">CURRENT TURN</div>
                    <div class="turn-player" id="turnPlayer">⚪ WHITE</div>
                </div>
                <button id="resetBtn" class="reset-btn hidden">NEW</button>
            </div>
            <div class="move-history">
                <div class="last-move-info">📍 Last: <span id="lastMove">None</span></div>
                <div class="check-info" id="checkInfo"></div>
            </div>
        </div>
        <footer>💀 Anti = Lose all pieces to win | 🏔️ Hill = king to center | ⚔️ Horde = 36 pawns | Board rotates to player's side!</footer>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==================== AUTH ====================
    let currentUser = null;
    firebase.auth().signInAnonymously()
        .then(userCred => { currentUser = userCred.user; console.log("Signed in"); })
        .catch(err => console.error(err));

    // ==================== MULTIPLAYER STATE ====================
    let myColor = null;          // 'w' or 'b'
    let roomRef = null;
    let roomListener = null;
    let isHost = false;
    let remoteUpdateInProgress = false;

    // ==================== GAME STATE ====================
    let board = [];
    let currentTurn = 'w';
    let selectedSquare = null;
    let validMovesList = [];
    let gameOver = false;
    let winner = null;
    let currentMode = 'standard';
    let mustCapture = false;
    let captureChain = false;
    let lastMoveFrom = null;
    let lastMoveTo = null;

    // DOM elements (game)
    const boardDiv = document.getElementById('chessboard');
    const boardContainer = document.getElementById('boardContainer');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const lastMoveSpan = document.getElementById('lastMove');
    const checkInfoSpan = document.getElementById('checkInfo');
    const variantSelectorDiv = document.getElementById('variantSelector');
    const gameTitle = document.getElementById('gameTitle');

    // Lobby elements
    const lobbyContainer = document.getElementById('lobbyContainer');
    const lobbyActions = document.getElementById('lobbyActions');
    const roomStatus = document.getElementById('roomStatus');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersInfo = document.getElementById('playersInfo');
    const gameUI = document.getElementById('gameUI');

    // ==================== ORIGINAL ENGINE (identical to your logic) ====================
    const chessSymbols = {
        'wr':'♖','wn':'♘','wb':'♗','wq':'♕','wk':'♔','wp':'♙',
        'br':'♜','bn':'♞','bb':'♝','bq':'♛','bk':'♚','bp':'♟'
    };
    const pieceName = {
        'r':'Rook','n':'Knight','b':'Bishop','q':'Queen','k':'King','p':'Pawn',
        'checker':'Checker'
    };

    function updateBoardRotation() {
        if (gameOver) return;
        if (currentTurn === 'b') {
            boardContainer.classList.add('black-turn-view');
        } else {
            boardContainer.classList.remove('black-turn-view');
        }
    }

    function showVictory(winnerName, winnerType) {
        const existing = document.querySelector('.victory-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';

        let icon = '';
        if (winnerType === 'white') icon = '🏆 ♔ 🏆';
        else if (winnerType === 'black') icon = '🏆 ♚ 🏆';
        else if (winnerType === 'red') icon = '🔴 👑 🔴';
        else if (winnerType === 'black_checkers') icon = '⚫ 👑 ⚫';
        else if (winnerType === 'horde') icon = '⚔️ 🏆 ⚔️';
        else if (winnerType === 'anticheckers_red') icon = '💀 🔴 💀';
        else if (winnerType === 'anticheckers_black') icon = '💀 ⚫ 💀';
        else icon = '♟️';

        let buttons = '';
        if (isHost) {
            buttons = `<button onclick="showVariantSelectorAfterGame()">🔄 Change Variant</button>`;
        }
        buttons += `<button onclick="leaveRoom()">🚪 Leave Room</button>`;

        overlay.innerHTML = `
            <div class="victory-card">
                <div class="winner-icon">${icon}</div>
                <div class="winner-text">${winnerName} WINS!</div>
                <div class="winner-sub">Game Over</div>
                ${buttons}
            </div>
        `;
        boardWrapper.appendChild(overlay);
    }

    window.showVariantSelectorAfterGame = function() {
        const overlay = document.querySelector('.victory-overlay');
        if (overlay) overlay.remove();
        // Show variant selector
        variantSelectorDiv.classList.remove('hidden');
        populateVariantSelector();
    };

    function updateTurnDisplay() {
        if (gameOver) return;
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            turnPlayerSpan.innerHTML = currentTurn === 'w' ? '🔴 RED\'S TURN' : '⚫ BLACK\'S TURN';
        } else if (currentMode === 'horde') {
            turnPlayerSpan.innerHTML = currentTurn === 'w' ? '⚪ WHITE (HORDE)' : '⚫ BLACK';
        } else {
            turnPlayerSpan.innerHTML = currentTurn === 'w' ? '⚪ WHITE\'S TURN' : '⚫ BLACK\'S TURN';
        }
        updateBoardRotation();
    }

    function getPieceDisplay(piece) {
        if (!piece) return '';
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            return piece.king ? '<span class="red-king">👑</span>' : (piece.color === 'w' ? '🔴' : '⚫');
        }
        const key = (piece.color === 'w' ? 'w' : 'b') + piece.type;
        return chessSymbols[key] || '';
    }

    // --- Win condition checks ---
    function checkAntiCheckerWin() { /* unchanged */ }
    function checkKingOfTheHillWin() { /* unchanged */ }
    function checkHordeWin() { /* unchanged */ }

    // --- Board initialisation ---
    function initCheckers() { /* unchanged */ }
    function initHorde() { /* unchanged */ }
    function generateChess960Position() { /* unchanged */ }
    function initChess() { /* unchanged */ }
    function initBoard() {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') initCheckers();
        else if (currentMode === 'horde') initHorde();
        else initChess();
    }

    // --- Movement helpers ---
    function toRowCol(square) { /* unchanged */ }
    function toSquare(row, col) { /* unchanged */ }
    function getCheckersMoves(row, col, boardState) { /* unchanged */ }
    function isCaptureAvailable(color, boardState) { /* unchanged */ }
    function getAllMoves(row, col, boardState) { /* unchanged */ }
    function isAttacked(row, col, color, boardState) { /* unchanged */ }
    function findKingPosition(color, boardState) { /* unchanged */ }
    function findCheckGiver(color, boardState) { /* unchanged */ }
    function getLegalMoves(row, col, boardState) { /* unchanged */ }
    function hasAnyLegalMoves(color, boardState) { /* unchanged */ }
    function inCheck(color, boardState) { /* unchanged */ }

    // --- Square styling helpers ---
    function isSquareInCheck(row, col) { /* unchanged */ }
    function isSquareCheckGiver(row, col) { /* unchanged */ }
    function isHillSquare(row, col) { /* unchanged */ }

    // --- makeMove (OVERWRITTEN to handle multiplayer) ---
    function makeMove(fromRow, fromCol, toRow, toCol) {
        // Prevent move if not our turn or game over
        if (gameOver) return false;
        if (myColor !== currentTurn) return false;

        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            const result = makeCheckersMove(fromRow, fromCol, toRow, toCol);
            if (result && result.success) {
                lastMoveFrom = toSquare(fromRow, fromCol);
                lastMoveTo = toSquare(toRow, toCol);
                lastMoveSpan.innerHTML = `${currentTurn === 'w' ? 'Red' : 'Black'} ${lastMoveFrom}→${lastMoveTo}`;
                currentTurn = currentTurn === 'w' ? 'b' : 'w';
                updateTurnDisplay();

                if (result.chain) {
                    currentTurn = currentTurn === 'w' ? 'b' : 'w'; // switch back for chained capture
                    selectedSquare = result.fromSquare;
                    const { row: sr, col: sc } = toRowCol(result.fromSquare);
                    validMovesList = getLegalMoves(sr, sc, board);
                } else {
                    selectedSquare = null;
                    validMovesList = [];
                }

                syncGameState();
                if (currentMode === 'anticheckers') checkAntiCheckerWin();
                else if (!hasAnyLegalMoves(currentTurn, board)) {
                    gameOver = true;
                    winner = currentTurn === 'w' ? 'BLACK' : 'RED';
                    showVictory(winner, currentTurn === 'w' ? 'black_checkers' : 'red');
                    syncGameState();
                }
                renderBoard();
                return true;
            }
            return false;
        }

        // Standard chess / horde
        const piece = board[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;

        const legalMoves = getLegalMoves(fromRow, fromCol, board);
        const isValid = legalMoves.some(m => m.row === toRow && m.col === toCol);
        if (!isValid) return false;

        const fromSquare = toSquare(fromRow, fromCol);
        const toSquareName = toSquare(toRow, toCol);
        const capturedPiece = board[toRow][toCol];

        board[toRow][toCol] = board[fromRow][fromCol];
        board[fromRow][fromCol] = null;

        if (piece.type === 'p' && (toRow === 0 || toRow === 7)) {
            board[toRow][toCol] = { type: 'q', color: piece.color };
        }

        lastMoveFrom = fromSquare;
        lastMoveTo = toSquareName;
        const pieceDisplay = pieceName[piece.type];
        const captureText = capturedPiece ? ` capturing ${pieceName[capturedPiece.type]}` : '';
        const colorText = piece.color === 'w' ? 'White' : 'Black';
        lastMoveSpan.innerHTML = `${colorText} ${pieceDisplay} ${fromSquare}→${toSquareName}${captureText}`;

        currentTurn = currentTurn === 'w' ? 'b' : 'w';
        updateTurnDisplay();

        syncGameState();

        if (currentMode === 'kinghill' && checkKingOfTheHillWin()) {
            gameOver = true;
            syncGameState();
        }
        if (currentMode === 'horde' && checkHordeWin()) {
            gameOver = true;
            syncGameState();
        }

        if (!gameOver && !hasAnyLegalMoves(currentTurn, board)) {
            gameOver = true;
            if (inCheck(currentTurn, board)) {
                winner = currentTurn === 'w' ? 'BLACK' : 'WHITE';
                showVictory(winner, winner === 'WHITE' ? 'white' : 'black');
            } else {
                winner = null;
                showVictory('STALEMATE - DRAW', 'draw');
            }
            syncGameState();
        }

        selectedSquare = null;
        validMovesList = [];
        renderBoard();
        return true;
    }

    function makeCheckersMove(fromRow, fromCol, toRow, toCol) {
        const piece = board[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;

        const moves = getCheckersMoves(fromRow, fromCol, board);
        const validMove = moves.find(m => m.row === toRow && m.col === toCol);
        if (!validMove) return false;

        board[toRow][toCol] = board[fromRow][fromCol];
        board[fromRow][fromCol] = null;

        if (validMove.capture) {
            board[validMove.capture.row][validMove.capture.col] = null;
        }

        if ((piece.color === 'w' && toRow === 0) || (piece.color === 'b' && toRow === 7)) {
            board[toRow][toCol].king = true;
        }

        const newMoves = getCheckersMoves(toRow, toCol, board);
        const hasMoreCaptures = newMoves.some(m => m.capture);

        if (validMove.capture && hasMoreCaptures) {
            captureChain = true;
            mustCapture = true;
            return { success: true, chain: true, fromSquare: toSquare(toRow, toCol) };
        }

        captureChain = false;
        mustCapture = false;
        return { success: true, chain: false };
    }

    // --- Firestore sync ---
    function syncGameState() {
        if (!roomRef || remoteUpdateInProgress) return;
        roomRef.update({
            board: JSON.parse(JSON.stringify(board)), // deep copy for firestore
            currentTurn,
            lastMoveFrom,
            lastMoveTo,
            gameOver,
            winner,
            currentMode,
            selectedSquare,
            validMovesList,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(err => console.error("Sync error:", err));
    }

    function listenToRoom() {
        if (!roomRef) return;
        roomListener = roomRef.onSnapshot(doc => {
            if (!doc.exists) {
                alert("Room closed by host.");
                leaveRoom();
                return;
            }
            const data = doc.data();
            if (data.guest && !playersInfo.textContent.includes('joined')) {
                playersInfo.textContent = "Opponent joined!";
            }

            // Avoid updating if we just wrote this
            if (remoteUpdateInProgress) return;

            remoteUpdateInProgress = true;
            // Update local state from remote (except board if we're the one who moved? simpler: always update)
            board = data.board;
            currentTurn = data.currentTurn;
            lastMoveFrom = data.lastMoveFrom || null;
            lastMoveTo = data.lastMoveTo || null;
            gameOver = data.gameOver;
            winner = data.winner;
            currentMode = data.currentMode || 'standard';
            selectedSquare = data.selectedSquare || null;
            validMovesList = data.validMovesList || [];
            renderBoard();
            updateTurnDisplay();
            if (gameOver) {
                showVictory(winner || 'Game Over', determineWinnerType());
            }
            remoteUpdateInProgress = false;
        });
    }

    function determineWinnerType() {
        if (!winner) return 'draw';
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            return winner === 'RED' ? 'red' : 'black_checkers';
        }
        return winner === 'WHITE' ? 'white' : 'black';
    }

    // --- handleSquareClick (with multiplayer turn check) ---
    function handleSquareClick(square) {
        if (gameOver) return;
        if (myColor !== currentTurn) return;

        const { row, col } = toRowCol(square);

        if (!selectedSquare) {
            const piece = board[row][col];
            if (!piece || piece.color !== currentTurn) return;

            if (currentMode === 'checkers' || currentMode === 'anticheckers') {
                mustCapture = isCaptureAvailable(currentTurn, board);
            }
            selectedSquare = square;
            validMovesList = getLegalMoves(row, col, board);
            if (mustCapture) validMovesList = validMovesList.filter(m => m.capture);
            if (validMovesList.length === 0) selectedSquare = null;
            renderBoard();
        } else {
            const { row: fromRow, col: fromCol } = toRowCol(selectedSquare);
            makeMove(fromRow, fromCol, row, col);
        }
    }

    // --- renderBoard (with local tweaks) ---
    function renderBoard() {
        boardDiv.innerHTML = '';
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = board[row][col];
                const isLight = (row + col) % 2 === 0;
                const squareName = toSquare(row, col);
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light' : 'dark'}`;

                if (selectedSquare === squareName) square.classList.add('selected');
                if (lastMoveFrom === squareName) square.classList.add('last-move-from');
                if (lastMoveTo === squareName) square.classList.add('last-move-to');
                if (isSquareInCheck(row, col)) square.classList.add('in-check');
                if (isSquareCheckGiver(row, col)) square.classList.add('check-giver');
                if (isHillSquare(row, col)) square.classList.add('hill-square');

                const isValidTarget = validMovesList && validMovesList.some(m => m.row === row && m.col === col);
                if (isValidTarget) {
                    square.classList.add('valid-move');
                    if (board[row][col] && board[row][col].color !== currentTurn) square.classList.add('capture');
                }

                const span = document.createElement('span');
                const display = getPieceDisplay(piece);
                if (display.includes('red-king') || display.includes('black-king')) span.innerHTML = display;
                else span.textContent = display;
                square.appendChild(span);

                square.addEventListener('click', () => handleSquareClick(squareName));
                boardDiv.appendChild(square);
            }
        }
        updateTurnDisplay();
        if (!gameOver && currentMode !== 'checkers' && currentMode !== 'anticheckers' && currentMode !== 'horde') {
            if (inCheck(currentTurn, board)) {
                const attackers = findCheckGiver(currentTurn, board);
                if (attackers.length === 1) checkInfoSpan.innerHTML = `⚠️ CHECK! ${pieceName[attackers[0].piece.type]}`;
                else checkInfoSpan.innerHTML = '⚠️ CHECK!';
            } else checkInfoSpan.innerHTML = '';
        } else checkInfoSpan.innerHTML = '';
    }

    // ==================== LOBBY & ROOM MANAGEMENT ====================
    function lobbyUI() {
        gameUI.classList.add('hidden');
        lobbyContainer.classList.remove('hidden');
        lobbyActions.classList.remove('hidden');
        roomStatus.classList.add('hidden');
        variantSelectorDiv.classList.add('hidden');
        resetLocal();
    }

    function joinRoomUI(code) {
        lobbyContainer.classList.add('hidden');
        gameUI.classList.remove('hidden');
        roomCodeDisplay.textContent = code;
        playersInfo.textContent = "Waiting for opponent...";
        variantSelectorDiv.classList.add('hidden');
        document.getElementById('resetBtn').classList.add('hidden');
    }

    function startGame() {
        lobbyContainer.classList.add('hidden');
        gameUI.classList.remove('hidden');
        renderBoard();
        updateTurnDisplay();
        updateBoardRotation();
    }

    async function createRoom() {
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        await db.collection('rooms').doc(code).set({
            code,
            host: currentUser.uid,
            guest: null,
            variant: 'standard',
            board: [],
            currentTurn: 'w',
            lastMoveFrom: null,
            lastMoveTo: null,
            gameOver: false,
            winner: null,
            selectedSquare: null,
            validMovesList: [],
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });
        roomRef = db.collection('rooms').doc(code);
        isHost = true;
        myColor = 'w';
        currentMode = 'standard';
        initBoard();
        syncGameState();
        joinRoomUI(code);
        listenToRoom();
        startGame();
    }

    async function joinRoom(code) {
        const docRef = db.collection('rooms').doc(code);
        const doc = await docRef.get();
        if (!doc.exists) { alert("Room not found"); return; }
        const data = doc.data();
        if (data.guest) { alert("Room already full"); return; }
        await docRef.update({ guest: currentUser.uid });
        roomRef = docRef;
        isHost = false;
        myColor = 'b';
        currentMode = data.variant || 'standard';
        board = data.board || [];
        currentTurn = data.currentTurn || 'w';
        gameOver = data.gameOver || false;
        winner = data.winner || null;
        lastMoveFrom = data.lastMoveFrom || null;
        lastMoveTo = data.lastMoveTo || null;
        if (!board.length) initBoard();
        joinRoomUI(code);
        playersInfo.textContent = "Opponent joined!";
        listenToRoom();
        startGame();
    }

    function leaveRoom() {
        if (roomListener) roomListener();
        if (roomRef) {
            if (isHost) {
                roomRef.delete().catch(console.error);
            } else {
                roomRef.update({ guest: null }).catch(console.error);
            }
        }
        resetLocal();
        lobbyUI();
        // Remove victory overlay if any
        const ov = document.querySelector('.victory-overlay');
        if (ov) ov.remove();
    }

    function resetLocal() {
        roomRef = null;
        roomListener = null;
        isHost = false;
        myColor = null;
        gameOver = false;
        winner = null;
        board = [];
        currentTurn = 'w';
        lastMoveFrom = null;
        lastMoveTo = null;
        selectedSquare = null;
        validMovesList = [];
        remoteUpdateInProgress = false;
    }

    // ==================== VARIANT SELECTION (HOST ONLY) ====================
    const variants = [
        { id: 'standard', label: '♔ Chess' },
        { id: 'chess960', label: '🎲 960' },
        { id: 'kinghill', label: '🏔️ Hill' },
        { id: 'horde', label: '⚔️ Horde' },
        { id: 'checkers', label: '🔴 Checkers' },
        { id: 'anticheckers', label: '💀 Anti' }
    ];

    function populateVariantSelector() {
        variantSelectorDiv.innerHTML = '';
        variants.forEach(v => {
            const btn = document.createElement('div');
            btn.className = `mode-btn ${v.id === currentMode ? 'active' : ''}`;
            btn.textContent = v.label;
            btn.dataset.mode = v.id;
            btn.addEventListener('click', () => hostChangeVariant(v.id));
            variantSelectorDiv.appendChild(btn);
        });
        variantSelectorDiv.classList.remove('hidden');
    }

    async function hostChangeVariant(newMode) {
        if (!isHost || !roomRef) return;
        currentMode = newMode;
        gameOver = false;
        winner = null;
        lastMoveFrom = null;
        lastMoveTo = null;
        selectedSquare = null;
        validMovesList = [];
        mustCapture = false;
        captureChain = false;
        currentTurn = 'w';  // white always starts
        initBoard();
        await syncGameState();
        variantSelectorDiv.classList.add('hidden');
        renderBoard();
        updateTurnDisplay();
        updateBoardRotation();
        const ov = document.querySelector('.victory-overlay');
        if (ov) ov.remove();
    }

    // ==================== BUTTON LISTENERS ====================
    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    document.getElementById('joinRoomBtn').addEventListener('click', () => {
        const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
        if (code) joinRoom(code);
    });
    document.getElementById('leaveRoomBtn').addEventListener('click', leaveRoom);

    // ==================== INITIAL SETUP ====================
    // Wait for Firebase auth before enabling lobby
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            lobbyContainer.classList.remove('hidden');
        }
    });
</script>
</body>
