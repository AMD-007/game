<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Multiplayer Game Variants</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            padding: 8px;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Lobby Styles */
        .lobby-screen {
            padding: 20px;
        }

        .lobby-card {
            background: #16162a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .lobby-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: inherit;
        }

        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-secondary {
            background: #2a2a3e;
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .room-code {
            background: #0f0f1a;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin: 16px 0;
        }

        .room-code span {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 4px;
        }

        .waiting-message {
            text-align: center;
            color: #aaa;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Game Styles */
        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }

        .game-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
        }

        .room-info {
            display: flex;
            justify-content: space-between;
            background: #0f0f1a;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .room-info .code {
            color: #ffd700;
            font-weight: bold;
        }

        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
        }

        .board-container {
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .board-container.black-turn-view {
            transform: rotate(180deg);
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .board-container.black-turn-view .square {
            transform: rotate(180deg);
        }

        /* Victory Overlay */
        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .victory-card {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px;
            padding: 20px 30px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .victory-card .winner-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .victory-card .winner-text {
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 16px;
        }

        .victory-card button {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Square Styles */
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: all 0.1s ease;
        }

        .square span {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
            position: relative;
            pointer-events: none;
        }

        .square.light {
            background-color: #f0d9b5;
        }

        .square.dark {
            background-color: #b58863;
        }

        .square.selected {
            background: linear-gradient(135deg, #6f9e4f, #4a7a2e);
            box-shadow: inset 0 0 0 2px #ffd700;
        }

        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 25%;
            height: 25%;
            background: #4caf50;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }

        .square.capture::after {
            background: #ff5722;
            width: 55%;
            height: 55%;
            border-radius: 8px;
        }

        .square.in-check {
            animation: checkPulse 0.5s ease-in-out 3;
        }
        
        .square.in-check::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: radial-gradient(circle, rgba(192, 57, 43, 0.6), rgba(192, 57, 43, 0.2));
            border-radius: 4px;
            pointer-events: none;
        }

        @keyframes checkPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.15); }
        }

        .control-panel {
            padding: 0 16px 16px 16px;
        }

        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 50px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            border-left: 4px solid #ffd700;
        }

        .turn-indicator .turn-player {
            font-size: 14px;
            font-weight: 800;
            color: #ffd700;
        }

        button {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
        }

        .reset-btn {
            background: #8b5a2b;
        }

        .leave-btn {
            background: #c0392b;
        }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 8px;
            color: #5a5a6e;
            border-top: 1px solid #2a2a3e;
            background: #16162a;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- Lobby Screen -->
    <div id="lobbyScreen">
        <div class="lobby-screen">
            <div class="lobby-card">
                <div class="lobby-title">🎮 MULTIPLAYER GAMES</div>
                
                <div class="input-group">
                    <label>🎲 Create or Join Room</label>
                    <button class="btn-primary" onclick="showCreateRoom()">✨ Create New Room</button>
                    <button class="btn-secondary" onclick="showJoinRoom()">🔗 Join Existing Room</button>
                </div>
            </div>

            <div id="createRoomPanel" class="lobby-card hidden">
                <div class="lobby-title">✨ Create Room</div>
                <div class="input-group">
                    <label>Choose Game Mode</label>
                    <select id="createGameMode">
                        <option value="standard">♔ Standard Chess</option>
                        <option value="chess960">🎲 Chess 960</option>
                        <option value="kinghill">🏔️ King of the Hill</option>
                        <option value="horde">⚔️ Horde Chess</option>
                        <option value="checkers">🔴 Checkers</option>
                        <option value="anticheckers">💀 Anti-Checkers</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Choose Your Side</label>
                    <select id="createSide">
                        <option value="white">⚪ White / 🔴 Red</option>
                        <option value="black">⚫ Black</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="createRoom()">Create Room & Invite</button>
                <button class="btn-secondary" onclick="hideCreatePanel()">Cancel</button>
            </div>

            <div id="joinRoomPanel" class="lobby-card hidden">
                <div class="lobby-title">🔗 Join Room</div>
                <div class="input-group">
                    <label>Enter Room Code</label>
                    <input type="text" id="joinCode" placeholder="e.g., ABC123" maxlength="6" style="text-transform:uppercase">
                </div>
                <div class="input-group">
                    <label>Your Name (optional)</label>
                    <input type="text" id="playerName" placeholder="Guest">
                </div>
                <button class="btn-primary" onclick="joinRoom()">Join Room</button>
                <button class="btn-secondary" onclick="hideJoinPanel()">Cancel</button>
            </div>

            <div id="waitingPanel" class="lobby-card hidden">
                <div class="lobby-title">⏳ Waiting for Opponent</div>
                <div class="room-code">
                    Room Code: <span id="waitingRoomCode">---</span>
                </div>
                <div class="waiting-message">
                    <div class="spinner"></div>
                    <p style="margin-top: 12px">Share this code with your friend to join!</p>
                </div>
                <button class="btn-secondary" onclick="cancelWaiting()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden">
        <div class="game-header">
            <div class="game-title">
                <h1 id="gameTitle">Game Variants</h1>
                <div class="room-info">
                    <span>Room: <span class="code" id="gameRoomCode">---</span></span>
                    <span id="playerSideDisplay">⚪ Playing as White</span>
                </div>
            </div>
        </div>

        <div class="board-wrapper" id="boardWrapper">
            <div class="board-container" id="boardContainer">
                <div id="chessboard"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="status-bar">
                <div class="turn-indicator" id="turnIndicator">
                    <div class="turn-player" id="turnPlayer">⚪ WHITE'S TURN</div>
                </div>
                <button id="leaveGameBtn" class="leave-btn">LEAVE</button>
            </div>
        </div>
        <footer>💀 Anti = Lose all pieces to win | 🏔️ Hill = king to center | ⚔️ Horde = 36 pawns</footer>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };
    
    // Initialize Firebase (with demo warning)
    let database;
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        console.log("Firebase initialized");
    } catch(e) {
        console.warn("Firebase init error, using mock mode");
        // Mock database for demo purposes
        database = {
            ref: () => ({ 
                set: (d) => Promise.resolve(), 
                on: (e, cb) => {},
                off: () => {},
                update: (d) => Promise.resolve(),
                remove: () => Promise.resolve()
            })
        };
    }

    // Game State
    let currentRoom = null;
    let playerSide = null;
    let currentMode = 'standard';
    let board = [];
    let currentTurn = 'w';
    let selectedSquare = null;
    let validMovesList = [];
    let gameOver = false;
    let mustCapture = false;
    let captureChain = false;
    let lastMoveFrom = null;
    let lastMoveTo = null;
    let gameRef = null;
    let moveListener = null;

    // Helper functions for game logic (same as before)
    const chessSymbols = {
        'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔', 'wp': '♙',
        'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚', 'bp': '♟'
    };

    function getPieceDisplay(piece) {
        if (!piece) return '';
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            if (piece.king) return piece.color === 'w' ? '👑' : '👑';
            return piece.color === 'w' ? '🔴' : '⚫';
        }
        const key = (piece.color === 'w' ? 'w' : 'b') + piece.type;
        return chessSymbols[key] || '';
    }

    // Initialize board based on mode
    function initBoardByMode(mode) {
        board = Array(8).fill().map(() => Array(8).fill(null));
        
        if (mode === 'checkers' || mode === 'anticheckers') {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const isDarkSquare = (row + col) % 2 === 1;
                    if (isDarkSquare) {
                        if (row < 3) board[row][col] = { type: 'checker', color: 'b', king: false };
                        else if (row > 4) board[row][col] = { type: 'checker', color: 'w', king: false };
                    }
                }
            }
        } else if (mode === 'horde') {
            const blackPieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) board[0][i] = { type: blackPieces[i], color: 'b' };
            for (let i = 0; i < 8; i++) board[1][i] = { type: 'p', color: 'b' };
            for (let i = 0; i < 8; i++) {
                board[7][i] = { type: 'p', color: 'w' };
                board[6][i] = { type: 'p', color: 'w' };
                board[5][i] = { type: 'p', color: 'w' };
                board[4][i] = { type: 'p', color: 'w' };
            }
            const row3Pattern = [false, true, true, false, false, true, true, false];
            for (let i = 0; i < 8; i++) if (row3Pattern[i]) board[3][i] = { type: 'p', color: 'w' };
        } else {
            for (let i = 0; i < 8; i++) {
                board[1][i] = { type: 'p', color: 'b' };
                board[6][i] = { type: 'p', color: 'w' };
            }
            if (mode === 'standard' || mode === 'kinghill') {
                const pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
                for (let i = 0; i < 8; i++) {
                    board[0][i] = { type: pieces[i], color: 'b' };
                    board[7][i] = { type: pieces[i], color: 'w' };
                }
            } else if (mode === 'chess960') {
                const whiteBackRow = generateChess960Position();
                const blackBackRow = [...whiteBackRow];
                for (let i = 0; i < 8; i++) {
                    board[0][i] = { type: blackBackRow[i], color: 'b' };
                    board[7][i] = { type: whiteBackRow[i], color: 'w' };
                }
            }
        }
    }

    function generateChess960Position() {
        let pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        let valid = false;
        while (!valid) {
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            const kingPos = pieces.indexOf('k');
            const rookPositions = pieces.map((p, idx) => p === 'r' ? idx : -1).filter(i => i !== -1);
            const bishopPositions = pieces.map((p, idx) => p === 'b' ? idx : -1).filter(i => i !== -1);
            if (rookPositions[0] < kingPos && kingPos < rookPositions[1] && 
                (bishopPositions[0] % 2) !== (bishopPositions[1] % 2)) valid = true;
        }
        return pieces;
    }

    function toRowCol(square) {
        const col = square.charCodeAt(0) - 97;
        const row = 8 - parseInt(square[1]);
        return { row, col };
    }

    function toSquare(row, col) {
        return String.fromCharCode(97 + col) + (8 - row);
    }

    function renderBoard() {
        const boardDiv = document.getElementById('chessboard');
        if (!boardDiv) return;
        boardDiv.innerHTML = '';
        
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = board[row][col];
                const isLight = (row + col) % 2 === 0;
                const squareName = toSquare(row, col);
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light' : 'dark'}`;
                
                if (selectedSquare === squareName) square.classList.add('selected');
                if (lastMoveFrom === squareName) square.classList.add('last-move-from');
                if (lastMoveTo === squareName) square.classList.add('last-move-to');
                
                const isValidTarget = validMovesList.some(m => m.row === row && m.col === col);
                if (isValidTarget) {
                    square.classList.add('valid-move');
                    if (board[row][col] && board[row][col].color !== currentTurn) square.classList.add('capture');
                }
                
                const span = document.createElement('span');
                span.textContent = getPieceDisplay(piece);
                square.appendChild(span);
                
                square.addEventListener('click', () => handleMove(squareName));
                boardDiv.appendChild(square);
            }
        }
        
        const turnText = currentTurn === 'w' ? (currentMode.includes('checker') ? '🔴 RED' : '⚪ WHITE') : '⚫ BLACK';
        document.getElementById('turnPlayer').innerHTML = `${turnText}'S TURN`;
        
        // Rotate board for black player's perspective
        const boardContainer = document.getElementById('boardContainer');
        if (playerSide === 'black' && currentTurn === 'b') {
            boardContainer.classList.add('black-turn-view');
        } else {
            boardContainer.classList.remove('black-turn-view');
        }
    }

    function handleMove(square) {
        if (gameOver) return;
        if (currentTurn !== playerSide) return;
        
        const { row, col } = toRowCol(square);
        
        if (!selectedSquare) {
            const piece = board[row][col];
            if (!piece || piece.color !== currentTurn) return;
            selectedSquare = square;
            validMovesList = getAllLegalMoves(row, col);
            if (validMovesList.length === 0) selectedSquare = null;
            renderBoard();
        } else {
            const { row: fromRow, col: fromCol } = toRowCol(selectedSquare);
            if (makeMoveOnBoard(fromRow, fromCol, row, col)) {
                selectedSquare = null;
                validMovesList = [];
                // Send move to Firebase
                if (gameRef && currentRoom) {
                    gameRef.update({
                        board: board,
                        currentTurn: currentTurn,
                        lastMoveFrom: lastMoveFrom,
                        lastMoveTo: lastMoveTo,
                        gameOver: gameOver
                    });
                }
                renderBoard();
            } else {
                selectedSquare = null;
                validMovesList = [];
                renderBoard();
            }
        }
    }

    function getAllLegalMoves(row, col) {
        // Simplified move generation (same logic as before)
        const piece = board[row][col];
        if (!piece) return [];
        const moves = [];
        if (currentMode.includes('checker')) {
            return getCheckerMoves(row, col);
        }
        // Basic moves for demo
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                const r = row + dr;
                const c = col + dc;
                if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = board[r][c];
                    if (!target || target.color !== piece.color) moves.push({ row: r, col: c });
                }
            }
        }
        return moves;
    }

    function getCheckerMoves(row, col) {
        const piece = board[row][col];
        if (!piece) return [];
        const moves = [];
        const dir = piece.color === 'w' ? -1 : 1;
        for (const dc of [-1, 1]) {
            const r = row + dir;
            const c = col + dc;
            if (r >= 0 && r < 8 && c >= 0 && c < 8 && !board[r][c]) moves.push({ row: r, col: c });
        }
        return moves;
    }

    function makeMoveOnBoard(fromRow, fromCol, toRow, toCol) {
        const piece = board[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;
        
        const moves = getAllLegalMoves(fromRow, fromCol);
        if (!moves.some(m => m.row === toRow && m.col === toCol)) return false;
        
        lastMoveFrom = toSquare(fromRow, fromCol);
        lastMoveTo = toSquare(toRow, toCol);
        board[toRow][toCol] = board[fromRow][fromCol];
        board[fromRow][fromCol] = null;
        
        currentTurn = currentTurn === 'w' ? 'b' : 'w';
        
        // Check win conditions
        if (checkWinCondition()) {
            gameOver = true;
            showVictory(currentTurn === 'w' ? 'BLACK' : 'WHITE');
        }
        
        return true;
    }

    function checkWinCondition() {
        if (currentMode === 'anticheckers') {
            let hasRed = false, hasBlack = false;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const p = board[i][j];
                    if (p && p.type === 'checker') {
                        if (p.color === 'w') hasRed = true;
                        else hasBlack = true;
                    }
                }
            }
            if (!hasRed || !hasBlack) return true;
        }
        return false;
    }

    function showVictory(winnerName) {
        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = `
            <div class="victory-card">
                <div class="winner-icon">🏆</div>
                <div class="winner-text">${winnerName} WINS!</div>
                <button onclick="closeVictory()">PLAY AGAIN</button>
            </div>
        `;
        document.getElementById('boardWrapper').appendChild(overlay);
    }

    window.closeVictory = function() {
        const overlay = document.querySelector('.victory-overlay');
        if (overlay) overlay.remove();
    };

    // Firebase Functions
    function generateRoomCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function showCreateRoom() {
        document.getElementById('createRoomPanel').classList.remove('hidden');
    }

    function hideCreatePanel() {
        document.getElementById('createRoomPanel').classList.add('hidden');
    }

    function showJoinRoom() {
        document.getElementById('joinRoomPanel').classList.remove('hidden');
    }

    function hideJoinPanel() {
        document.getElementById('joinRoomPanel').classList.add('hidden');
    }

    async function createRoom() {
        const mode = document.getElementById('createGameMode').value;
        const side = document.getElementById('createSide').value;
        const roomCode = generateRoomCode();
        
        currentRoom = roomCode;
        playerSide = side;
        currentMode = mode;
        
        initBoardByMode(mode);
        currentTurn = 'w';
        gameOver = false;
        
        const roomData = {
            mode: mode,
            players: {
                [side]: { connected: true, ready: true },
                [side === 'white' ? 'black' : 'white']: { connected: false, ready: false }
            },
            board: board,
            currentTurn: 'w',
            gameOver: false,
            lastMoveFrom: null,
            lastMoveTo: null,
            createdAt: Date.now()
        };
        
        gameRef = database.ref(`games/${roomCode}`);
        await gameRef.set(roomData);
        
        document.getElementById('waitingRoomCode').innerText = roomCode;
        document.getElementById('createRoomPanel').classList.add('hidden');
        document.getElementById('waitingPanel').classList.remove('hidden');
        
        // Wait for opponent
        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.players && data.players[side === 'white' ? 'black' : 'white']?.connected) {
                startGame();
            }
        });
    }

    async function joinRoom() {
        const roomCode = document.getElementById('joinCode').value.toUpperCase();
        if (!roomCode) return;
        
        currentRoom = roomCode;
        gameRef = database.ref(`games/${roomCode}`);
        
        const snapshot = await gameRef.once('value');
        const roomData = snapshot.val();
        
        if (!roomData) {
            alert("Room not found!");
            return;
        }
        
        // Determine available side
        if (!roomData.players.white.connected) {
            playerSide = 'white';
        } else if (!roomData.players.black.connected) {
            playerSide = 'black';
        } else {
            alert("Room is full!");
            return;
        }
        
        currentMode = roomData.mode;
        board = roomData.board;
        currentTurn = roomData.currentTurn;
        gameOver = roomData.gameOver;
        lastMoveFrom = roomData.lastMoveFrom;
        lastMoveTo = roomData.lastMoveTo;
        
        await gameRef.child(`players/${playerSide}/connected`).set(true);
        
        startGame();
        
        // Listen for moves
        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const oldBoard = JSON.stringify(board);
                board = data.board;
                currentTurn = data.currentTurn;
                gameOver = data.gameOver;
                lastMoveFrom = data.lastMoveFrom;
                lastMoveTo = data.lastMoveTo;
                if (JSON.stringify(board) !== oldBoard) {
                    renderBoard();
                }
            }
        });
    }

    function startGame() {
        document.getElementById('waitingPanel').classList.add('hidden');
        document.getElementById('lobbyScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('gameRoomCode').innerText = currentRoom;
        document.getElementById('gameTitle').innerHTML = getGameTitle(currentMode);
        document.getElementById('playerSideDisplay').innerHTML = playerSide === 'white' ? '⚪ Playing as White' : '⚫ Playing as Black';
        renderBoard();
    }

    function getGameTitle(mode) {
        const titles = {
            'standard': '♔ Standard Chess',
            'chess960': '🎲 Chess 960',
            'kinghill': '🏔️ King of the Hill',
            'horde': '⚔️ Horde Chess',
            'checkers': '🔴 Checkers',
            'anticheckers': '💀 Anti-Checkers'
        };
        return titles[mode] || 'Game Variants';
    }

    function cancelWaiting() {
        if (gameRef) gameRef.remove();
        document.getElementById('waitingPanel').classList.add('hidden');
        location.reload();
    }

    document.getElementById('leaveGameBtn').addEventListener('click', () => {
        if (gameRef && currentRoom) {
            gameRef.child(`players/${playerSide}/connected`).set(false);
            gameRef.off();
        }
        location.reload();
    });
</script>
</body>
</html>
