  if (window._applyBoardOrientation) window._applyBoardOrientation();

  if (is123Mode(G.mode)) render123HUD(G);

  }
}

// ── clock.js ──
// ════════════════════════════════════════════════════════
//  js/clock.js — Chess clock
//  Per-player countdown timer. Optional — off by default.
// ════════════════════════════════════════════════════════
var Clock = {
  enabled:   false,
  times:     { w: 0, b: 0 },  // remaining seconds
  active:    null,              // 'w' | 'b' | null
  interval:  null,
  onTimeout: null,              // callback(color) when time runs out
  onTick:    null,              // callback() every second for UI update
};

function clockInit(secondsPerPlayer, onTimeout, onTick) {
  Clock.enabled   = true;
  Clock.times     = { w: secondsPerPlayer, b: secondsPerPlayer };
  Clock.active    = null;
  Clock.onTimeout = onTimeout;
  Clock.onTick    = onTick;
  clearInterval(Clock.interval);
  Clock.interval  = null;
}

function clockStart(color) {
  if (!Clock.enabled) return;
  clockStop();
  Clock.active   = color;
  Clock.interval = setInterval(() => {
    if (!Clock.active) return;
    Clock.times[Clock.active] = Math.max(0, Clock.times[Clock.active] - 1);
    if (Clock.onTick) Clock.onTick();
    if (Clock.times[Clock.active] === 0) {
      clockStop();
      if (Clock.onTimeout) Clock.onTimeout(Clock.active);
    }
  }, 1000);
}

function clockStop() {
  clearInterval(Clock.interval);
  Clock.interval = null;
  Clock.active   = null;
}

function clockReset() {
  clockStop();
  Clock.enabled = false;
  Clock.times   = { w: 0, b: 0 };
}

function clockSwitch(newColor) {
  if (!Clock.enabled) return;
  clockStart(newColor);
}

function clockFormat(seconds) {
  var m = Math.floor(seconds / 60);
  var s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// Render clock UI into existing element
function renderClock(el, turn) {
  if (!el) return;
  if (!Clock.enabled) { el.style.display = 'none'; return; }
  el.style.display = 'flex';

  var wTime = clockFormat(Clock.times.w);
  var bTime = clockFormat(Clock.times.b);
  var wLow  = Clock.times.w <= 30;
  var bLow  = Clock.times.b <= 30;

  el.innerHTML = `
    <div class="clock-pip ${turn==='b' && Clock.times.b<=30 ? 'clock-low' : ''} ${turn==='b' ? 'clock-active' : ''}">
      <span class="clock-label">⚫ BLACK</span>
      <span class="clock-time ${bLow ? 'clock-urgent' : ''}">${bTime}</span>
    </div>
    <div class="clock-divider">⏱</div>
    <div class="clock-pip ${turn==='w' && Clock.times.w<=30 ? 'clock-low' : ''} ${turn==='w' ? 'clock-active' : ''}">
      <span class="clock-label">⚪ WHITE</span>
      <span class="clock-time ${wLow ? 'clock-urgent' : ''}">${wTime}</span>
    </div>
  `;
}

// ── BOARD SERIALISATION ───────────────────────────────────────────────
// Firebase can't store arrays with null — serialize board to flat object
function serializeBoard(board) {
  var obj = {};
  for (var r=0; r<8; r++) for (var c=0; c<8; c++) {
    var p = board[r][c];
    if (p) obj[`${r}_${c}`] = p;
  }
  return obj;
}

function deserializeBoard(obj) {
  var board = Array(8).fill(null).map(() => Array(8).fill(null));
  if (!obj) return board;
  for (var [key, val] of Object.entries(obj)) {
    var [r,c] = key.split('_').map(Number);
    board[r][c] = val;
  }
  return board;
}

// ── GAME STATE → FIREBASE ─────────────────────────────────────────────
function serializeGameState(G) {
  return {
    mode:     G.mode,
    turn:     G.turn,
    board:    serializeBoard(G.board),
    ep:       G.ep    ? `${G.ep.row},${G.ep.col}`    : null,
    cr:       { wk:G.cr.w.k, wq:G.cr.w.q, bk:G.cr.b.k, bq:G.cr.b.q },
    rsc:      { wk:G.rsc.w.k, wq:G.rsc.w.q, bk:G.rsc.b.k, bq:G.rsc.b.q },
    lmFrom:   G.lmFrom || null,
    lmTo:     G.lmTo   || null,
    hmc:      G.hmc,
    posHist:  G.posHist.length ? G.posHist.join('|') : null,
    over:     G.over,
    winner:   G.winner || null,
    lastPromo: G.lastPromo || null,
    clockSeconds: G.clockSeconds || 0,
    // Checkers
    mustCap:  G.mustCap,
    chain:    G.chain,
    chainSq:  G.chainSq ? `${G.chainSq.row},${G.chainSq.col}` : null,
    // CTC
    ctcScore: G.ctcScore,
    ctcBonus: G.ctcBonus ? `${G.ctcBonus.row},${G.ctcBonus.col}` : null,
    // Chess123
    skills:   G.mode === 'chess123' ? {
      w: serializeSkills(G.skills.w),
      b: serializeSkills(G.skills.b),
    } : null,
    c123phase:     G.mode === 'chess123' ? G.c123.phase : null,
    c123firstPiece:G.mode === 'chess123' && G.c123.firstPiece
                    ? `${G.c123.firstPiece.row},${G.c123.firstPiece.col}` : null,
    c123skillUsed: G.mode === 'chess123' ? (G.c123.skillUsed || null) : null,
    c123spPawns:   G.mode === 'chess123' && G.c123.spPawns
                    ? G.c123.spPawns.map(p=>`${p.row},${p.col}`).join('|') : null,
  };
}

function serializeSkills(sk) {
  return {
    bank:         sk.bank,
    checkCount:   sk.checkCount,
    s2unlocked:   sk.s2unlocked,
    s2used:       sk.s2used,
    autoBank:     sk.autoBank.length ? sk.autoBank.map(a=>a.turnsLeft).join(',') : null,
    spUnlocked:   sk.spUnlocked,
    spPending:    sk.spPending,
    spConfirming: sk.spConfirming,
    spDone:       sk.spDone,
    cooldown:     sk.cooldown,
    midLost:      sk.midLost,
  };
}

function deserializeGameState(data, G) {
  if (!data) return;
  G.mode    = data.mode    || G.mode;
  G.turn    = data.turn    || 'w';
  G.board   = deserializeBoard(data.board);
  G.ep      = data.ep ? { row: parseInt(data.ep.split(',')[0]), col: parseInt(data.ep.split(',')[1]) } : null;
  G.cr      = { w:{k:!!(data.cr && data.cr.wk), q:!!(data.cr && data.cr.wq)}, b:{k:!!(data.cr && data.cr.bk), q:!!(data.cr && data.cr.bq)} };
  G.rsc     = { w:{k:(data.rsc && data.rsc.wk)||7, q:(data.rsc && data.rsc.wq)||0}, b:{k:(data.rsc && data.rsc.bk)||7, q:(data.rsc && data.rsc.bq)||0} };
  G.lmFrom  = data.lmFrom  || null;
  G.lmTo    = data.lmTo    || null;
  G.hmc     = data.hmc     || 0;
  G.posHist = data.posHist ? data.posHist.split('|') : [];
  G.over    = !!data.over;
  G.clockSeconds = data.clockSeconds || 0;
  G.mustCap = !!data.mustCap;
  G.chain   = !!data.chain;
  G.chainSq = data.chainSq ? { row:parseInt(data.chainSq.split(',')[0]), col:parseInt(data.chainSq.split(',')[1]) } : null;
  G.ctcScore = data.ctcScore || {w:0, b:0};
  G.ctcBonus = data.ctcBonus ? { row:parseInt(data.ctcBonus.split(',')[0]), col:parseInt(data.ctcBonus.split(',')[1]) } : null;

  if (data.mode === 'chess123' && data.skills) {
    G.skills = {
      w: deserializeSkills(data.skills.w),
      b: deserializeSkills(data.skills.b),
    };
    G.c123.phase      = data.c123phase || 'normal';
    G.c123.skillUsed  = data.c123skillUsed || null;
    G.c123.firstPiece = data.c123firstPiece
      ? { row: parseInt(data.c123firstPiece.split(',')[0]), col: parseInt(data.c123firstPiece.split(',')[1]) }
      : null;
    G.c123.spPawns = data.c123spPawns
      ? data.c123spPawns.split('|').map(s => ({ row: parseInt(s.split(',')[0]), col: parseInt(s.split(',')[1]) }))
      : null;
  }
}

function deserializeSkills(sk) {
  if (!sk) return null;
  var s = freshSkills();
  s.bank         = sk.bank         || 2;
  s.checkCount   = sk.checkCount   || 0;
  s.s2unlocked   = !!sk.s2unlocked;
  s.s2used       = !!sk.s2used;
  s.autoBank     = sk.autoBank ? sk.autoBank.split(',').map(t=>({turnsLeft:parseInt(t)})) : [];
  s.spUnlocked   = !!sk.spUnlocked;
  s.spPending    = sk.spPending    || 0;
  s.spConfirming = !!sk.spConfirming;
  s.spDone       = !!sk.spDone;
  s.cooldown     = !!sk.cooldown;
  s.midLost      = sk.midLost      || 0;
  return s;
}

// ── ROOM OPERATIONS ───────────────────────────────────────────────────

// Create a new room — called by host
async function createRoom(roomId, mode, hostColor, G) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var expires = Date.now() + 6 * 60 * 60 * 1000; // 6 hours

  var roomData = {
    mode,
    status:    'waiting',
    createdAt: serverTimestamp(),
    expiresAt: expires,
    players: {
      [hostColor]: { joined: true, ready: true }
    },
    myColor:  hostColor,
    ...serializeGameState(G),
  };

  await set(roomRef, roomData);

  // Auto-cleanup on disconnect if still waiting
  onDisconnect(ref(db, `rooms/${roomId}/players/${hostColor}`))
    .remove();

  return roomId;
}

// Join existing room — called by guest
async function joinRoom(roomId, guestColor) {
  var roomRef = ref(db, `rooms/${roomId}`);
  var snap    = await get(roomRef);

  if (!snap.exists()) throw new Error('Room not found');
  var data = snap.val();
  if (data.status !== 'waiting') throw new Error('Game already started');
  if ((data.players && data.players[guestColor])) throw new Error('Color already taken');

  await update(ref(db, `rooms/${roomId}`), {
    [`players/${guestColor}`]: { joined: true, ready: true },
    status: 'playing',
  });

  onDisconnect(ref(db, `rooms/${roomId}/players/${guestColor}`))
    .remove();

  return data;
}

// Submit a move — write full game state to Firebase
async function submitMove(roomId, G) {
  await update(ref(db, `rooms/${roomId}`), serializeGameState(G));
}

// Listen to room changes — fires on every state update
function listenRoom(roomId, callback) {
  var roomRef = ref(db, `rooms/${roomId}`);
  onValue(roomRef, snap => {
    if (snap.exists()) callback(snap.val());
  });
  return () => off(roomRef); // returns unsubscribe fn
}

// End game
async function endRoom(roomId, winner) {
  await update(ref(db, `rooms/${roomId}`), {
    status: 'ended',
    winner,
    over:   true,
  });
}

// Get room once (for joining)
async function getRoom(roomId) {
  var snap = await get(ref(db, `rooms/${roomId}`));
  return snap.exists() ? snap.val() : null;
}

// ── UNDO REQUEST ──────────────────────────────────────────
async function requestUndo(roomId, color) {
  await update(ref(db, `rooms/${roomId}`), { undoRequest: color });
}

async function resolveUndo(roomId, accepted) {
  await update(ref(db, `rooms/${roomId}`), {
    undoRequest: null,
    undoAccepted: accepted ? true : null
  });
}

async function clearUndoSignal(roomId) {
  await update(ref(db, `rooms/${roomId}`), {
    undoRequest: null,
    undoAccepted: null
  });
}

var MP = {
  active:      false,
  roomId:      null,
  myColor:     null,   // 'w' or 'b'
  isHost:      false,

  oppUnsubscribe: null,

// ── SCREEN SWITCHING ──────────────────────────────────────
function showHomeScreen() {
  document.getElementById('home-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
}
function showGameScreen() {
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
}

// ── URL HELPERS ───────────────────────────────────────────
function getRoomFromURL() {
  var params = new URLSearchParams(window.location.search);
  return { roomId: params.get('r'), color: params.get('c') };
}
function buildJoinURL(roomId, color) {
  var base = window.location.href.split('?')[0];
  return `${base}?r=${roomId}&c=${color}`;
}

// ── MODE LABELS ───────────────────────────────────────────
var modeLabels = {
  standard:'Standard Chess', chess960:'Chess 960',
  kinghill:'King of the Hill', horde:'Horde',
  checkers:'Checkers', anticheckers:'Anti-Checkers',
  coasttocoast:'Coast to Coast', chess123:'Chess123',
};

// ── HOME SCREEN ───────────────────────────────────────────
function renderHome(G, onLocalStart, onGameStart) {
  var el = document.getElementById('home-content');
  if (!el) return;

  var modeBtns = Object.entries(modeLabels).map(([key, label]) => {
    var bgStyle = MODE_IMGS[key]
      ? `background-image:url('${MODE_IMGS[key]}');background-size:cover;background-position:center;`
      : '';
    return `<button class="home-mode-btn ${G.mode===key?'active':''}" data-mode="${key}" style="${bgStyle}">
      <span class="mode-label-overlay">${label}</span>
    </button>`;
  }).join('');

  el.innerHTML = `
    <div class="home-wrap">
      <div class="home-main">
        <div class="home-logo-wrap">
          <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
          <div class="home-tagline">Game Variants &nbsp;·&nbsp; by MaxMin</div>
        </div>
        <div class="home-section-label">Select Game</div>
        <div class="home-modes" id="home-modes">${modeBtns}</div>
      </div>
      <div class="home-bottom">
        <div class="home-actions">
          <button class="home-action-btn home-action-local" id="btn-local">
            <span class="ha-icon">&#9816;</span>
            <span class="ha-text">
              <span class="ha-title">Local Play</span>
              <span class="ha-sub">2 players · 1 device</span>
            </span>
          </button>
          <button class="home-action-btn home-action-multi" id="btn-multi">
            <span class="ha-icon">&#9675;</span>
            <span class="ha-text">
              <span class="ha-title">Multiplayer</span>
              <span class="ha-sub">2 devices · online</span>
            </span>
          </button>
        </div>
        <div class="home-footer">MaxPlay &nbsp;·&nbsp; MaxMin &copy; 2025</div>
      </div>
    </div>
  `;

  el.querySelectorAll('.home-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      G.mode = btn.dataset.mode;
      el.querySelectorAll('.home-mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === G.mode));
    });
  });

  document.getElementById('btn-local').addEventListener('click', () => {
    showRulesPopup(G.mode, () => showTimeSelect(G, () => onLocalStart(G)));
  });
  document.getElementById('btn-multi').addEventListener('click', () => renderMultiLobby(G, onGameStart));
}

// ── TIME SELECTION ────────────────────────────────────────
function showTimeSelect(G, onConfirm) {
  var existing = document.getElementById('time-select-popup');
  if (existing) existing.remove();

  var popup = document.createElement('div');
  popup.id = 'time-select-popup';
  popup.style.cssText = 'position:fixed;inset:0;z-index:2100;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:16px';

  var options = [
    {label:'No Clock', seconds:0},
    {label:'5 min',    seconds:300},
    {label:'10 min',   seconds:600},
    {label:'15 min',   seconds:900},
    {label:'20 min',   seconds:1200},
  ];

  popup.innerHTML = `
    <div class="rules-card" style="max-width:320px">
      <div class="rules-icon">⏱</div>
      <div class="rules-title">Chess Clock</div>
      <div class="rules-subtitle">TIME PER PLAYER</div>
      <div class="time-opt-grid">
        ${options.map((o,i) => `
          <button class="time-opt-btn ${i===0?'active':''}" data-sec="${o.seconds}">
            ${o.label}
          </button>`).join('')}
      </div>
      <button class="rules-btn-start" id="time-confirm">START</button>
      <button class="rules-btn-back" id="time-back" style="margin-top:8px">← Back</button>
    </div>
  `;

  document.body.appendChild(popup);

  var selected = 0;
  popup.querySelectorAll('.time-opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selected = parseInt(btn.dataset.sec);
      popup.querySelectorAll('.time-opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('time-confirm').onclick = () => {
    G.clockSeconds = selected;
    popup.remove();
    onConfirm();
  };
  document.getElementById('time-back').onclick = () => {
    popup.remove();
  };
}

// ── MULTIPLAYER LOBBY ─────────────────────────────────────
function renderMultiLobby(G, onGameStart) {
  var el = document.getElementById('home-content');
  el.innerHTML = `
    <div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo" style="margin-bottom:6px">
      <div class="lobby-sub-title">Multiplayer</div>

      <div class="home-section-label">
        Game: <span style="color:#f0f0f0" id="mp-mode-display">${modeLabels[G.mode]}</span>
      </div>
      <div class="home-modes" id="mp-modes" style="margin-bottom:14px">
        ${Object.entries(modeLabels).map(([k,v]) => {

  };

function showErr(msg) {

// ── HOST ──────────────────────────────────────────────────
async function hostGame(G, color, onGameStart) {
  var el = document.getElementById('home-content');
  var roomId = genRoomId();
  el.innerHTML = `<div class="home-wrap"><div class="home-spinner">Creating room…</div></div>`;

  try {
    // Init board BEFORE saving to Firebase so pieces are included
    if (window._initBoard) window._initBoard(G);

    await createRoom(roomId, G.mode, color, G);
    MP.roomId = roomId; MP.myColor = color;
    MP.isHost = true; MP.active = true;
    renderWaiting(roomId, color, G, onGameStart);
  } catch(err) {
    el.innerHTML = `
      <div class="home-wrap">
        <div class="home-err" style="display:block">${err.message.includes('permission') ? '🔒 Firebase rules not set — go to Firebase Console → Realtime Database → Rules and allow read/write.' : 'Error: '+err.message}</div>
        <button class="home-btn home-btn-back" id="btn-retry">← Back</button>
      </div>`;
    document.getElementById('btn-retry').onclick = () =>
      renderMultiLobby(G, onGameStart);
  }
}

// ── WAITING ROOM ──────────────────────────────────────────
function renderWaiting(roomId, myColor, G, onGameStart) {
  var el       = document.getElementById('home-content');
  var oppColor = myColor === 'w' ? 'b' : 'w';
  var joinURL  = buildJoinURL(roomId, oppColor);

  el.innerHTML = `
    <div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
      <div class="lobby-sub-title">Room Created</div>

      <div class="home-room-code" id="room-code-display">${roomId}</div>
      <div class="home-waiting-msg" id="waiting-status">Waiting for opponent…</div>

      <div class="home-room-info">
        <div class="home-room-detail">Mode: <b>${modeLabels[G.mode]}</b></div>
        <div class="home-room-detail">You are: <b>${myColor==='w'?'White / Red':'Black'}</b></div>
      </div>

      <div class="home-qr"><canvas id="qr-canvas"></canvas></div>

      <div class="home-share-label">Share link with opponent</div>
      <div class="home-share-url">${joinURL}</div>

      <button class="home-btn home-btn-copy" id="btn-copy">&#128203; Copy Link</button>
      <button class="home-btn home-btn-back" id="btn-cancel">&#10005; Cancel</button>
    </div>
  `;

  generateQR(joinURL, 'qr-canvas');

  document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard && navigator.clipboard.writeText(joinURL).then(() => {
      var b = document.getElementById('btn-copy');
      if (b) b.textContent = '✓ Copied!';
      setTimeout(() => { var b2=document.getElementById('btn-copy'); if(b2) b2.textContent='📋 Copy Link'; }, 2000);

    if (MP.unsubscribe) MP.unsubscribe();
    MP.active = false; MP.roomId = null; MP.isHost = false;
    renderHome(G, window._onLocalStart, onGameStart);
  };

  // Listen for opponent joining
  MP.unsubscribe = listenRoom(roomId, data => {
    if (data.status === 'playing' && (data.players && data.players.w && data.players.w.joined) && (data.players && data.players.b && data.players.b.joined)) {
      if (MP.unsubscribe) MP.unsubscribe();
      MP.unsubscribe = null;
      onGameStart(roomId, myColor, G);

  });

// ── JOIN ──────────────────────────────────────────────────
async function joinGame(roomId, G, onGameStart) {
  var el = document.getElementById('home-content');
  el.innerHTML = `<div class="home-wrap"><div class="home-spinner">Joining room ${roomId}…</div></div>`;

  try {
    var data = await getRoom(roomId);
    if (!data)                  throw new Error('Room not found. Check code and try again.');
    if (data.status === 'ended') throw new Error('This game has already ended.');

    var wTaken = !!(data.players && data.players.w && data.players.w.joined);
    var bTaken = !!(data.players && data.players.b && data.players.b.joined);
    if (wTaken && bTaken)       throw new Error('Room is full.');

    var myColor = !wTaken ? 'w' : 'b';
    await joinRoom(roomId, myColor);

    // Sync mode from host
    if (data.mode) G.mode = data.mode;

    MP.roomId = roomId; MP.myColor = myColor;
    MP.isHost = false; MP.active = true;
    onGameStart(roomId, myColor, G);
  } catch(err) {
    el.innerHTML = `
      <div class="home-wrap">
        <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
        <div class="home-err" style="display:block">${err.message}</div>
        <div class="home-join-row" style="margin-top:12px">
          <input class="home-join-input" id="retry-code" placeholder="ROOM CODE" maxlength="6" autocomplete="off" value="${roomId}">
          <button class="home-btn home-btn-red home-btn-join" id="btn-retry-join">JOIN</button>
        </div>
        <button class="home-btn home-btn-back" id="btn-back-err" style="margin-top:8px">&#8592; Back</button>
      </div>`;
    document.getElementById('btn-retry-join').onclick = () => {
      var code = (document.getElementById('retry-code').value||'').trim().toUpperCase();
      if (code.length === 6) joinGame(code, G, onGameStart);
    };
    document.getElementById('back-err') && document.getElementById('back-err').addEventListener('click', () =>
      renderHome(G, window._onLocalStart, onGameStart));
    document.getElementById('btn-back-err').onclick = () =>
      renderHome(G, window._onLocalStart, onGameStart);
  }
}

// ── QR GENERATOR ─────────────────────────────────────────
function generateQR(url, canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var img = new Image(), size = 180;
  img.onload = () => {
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);
  };
  img.onerror = () => { if(canvas) canvas.style.display='none'; };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}&bgcolor=f0f0f0&color=0d0d0d&margin=10`;
}

// ── AUTO JOIN FROM URL ────────────────────────────────────
async function handleURLJoin(G, onLocalStart, onGameStart) {
  var { roomId, color } = getRoomFromURL();
  if (!roomId) return false;

  // Clear URL params
  window.history.replaceState({}, '', window.location.href.split('?')[0]);

  // Show home screen with spinner
  showHomeScreen();
  var el = document.getElementById('home-content');
  el.innerHTML = `<div class="home-wrap">
    <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
    <div class="home-spinner">Joining room ${roomId}…</div>
  </div>`;

  try {
    var data = await getRoom(roomId);
    if (!data) throw new Error('Room not found.');

    var wTaken = !!(data.players && data.players.w && data.players.w.joined);
    var bTaken = !!(data.players && data.players.b && data.players.b.joined);

    // Determine color
    var myColor = color;
    if (myColor === 'w' && wTaken && !bTaken) myColor = 'b';
    if (myColor === 'b' && bTaken && !wTaken) myColor = 'w';
    if (!myColor) myColor = !wTaken ? 'w' : !bTaken ? 'b' : null;
    if (!myColor || (myColor==='w'&&wTaken) || (myColor==='b'&&bTaken)) {
      // Show manual join form
      el.innerHTML = `<div class="home-wrap">
        <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
        <div class="home-err" style="display:block">Room full or already joined. Enter code to try again:</div>
        <div class="home-join-row" style="margin-top:12px">
          <input class="home-join-input" id="fallback-code" placeholder="ROOM CODE" maxlength="6" value="${roomId}">
          <button class="home-btn home-btn-red home-btn-join" id="btn-fb-join">JOIN</button>
        </div>
        <button class="home-btn home-btn-back" id="btn-fb-back" style="margin-top:8px">&#8592; Home</button>
      </div>`;
      document.getElementById('btn-fb-join').onclick = () => {
        var code = (document.getElementById('fallback-code').value||'').trim().toUpperCase();
        if (code.length===6) joinGame(code, G, onGameStart);
      };
      document.getElementById('btn-fb-back').onclick = () =>
        renderHome(G, window._onLocalStart, onGameStart);
      return true;
    }

    // Sync mode from host
    if (data.mode) G.mode = data.mode;

    await joinRoom(roomId, myColor);
    MP.roomId = roomId; MP.myColor = myColor;
    MP.isHost = false; MP.active = true;
    onGameStart(roomId, myColor, G);
    return true;
  } catch(err) {
    el.innerHTML = `<div class="home-wrap">
      <img src="${LOGO_SRC}" alt="MaxPlay" class="home-logo">
      <div class="home-err" style="display:block">${err.message}</div>
      <div class="home-join-row" style="margin-top:12px">
        <input class="home-join-input" id="err-code" placeholder="ROOM CODE" maxlength="6" value="${roomId}">
        <button class="home-btn home-btn-red home-btn-join" id="btn-err-join">JOIN</button>
      </div>
      <button class="home-btn home-btn-back" id="btn-err-back" style="margin-top:8px">&#8592; Home</button>
    </div>`;
    document.getElementById('btn-err-join').onclick = () => {
      var code = (document.getElementById('err-code').value||'').trim().toUpperCase();
      if (code.length===6) joinGame(code, G, onGameStart);
    };
    document.getElementById('btn-err-back').onclick = () =>
      renderHome(G, window._onLocalStart, onGameStart);
    return true;
  }
}

// ════════════════════════════════════════════════════════
//  BOARD ORIENTATION
//  White player → pieces at bottom (normal)
//  Black player → board flipped (pieces at bottom)
//  Local play   → never flips
// ════════════════════════════════════════════════════════
function applyBoardOrientation() {
  var isCheckerOrCTC = G.mode === 'checkers' || G.mode === 'anticheckers' || G.mode === 'coasttocoast';

  if (!MP.active) {
    // Local checkers/CTC: flip when black's turn so each player sees their pieces at bottom
    if (isCheckerOrCTC && G.turn === 'b') {
      bcontEl.classList.add('flip');
    } else {
      bcontEl.classList.remove('flip');
    }
    return;
  }
  // Multiplayer: Black player always sees flipped board
  if (MP.myColor === 'b') {
    bcontEl.classList.add('flip');
  } else {
    bcontEl.classList.remove('flip');
  }
}

// ════════════════════════════════════════════════════════
//  MOVE SELECTION
// ════════════════════════════════════════════════════════
function getMovesFor(row, col) {
  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  G.mustCap = isC ? anyCapture(G.turn, G.board) : false;

  var ms;
  if (isC)        ms = checkerMoves(row, col, G.board);
  else if (isCTC) ms = ctcMoves(row, col, G.board);
  else            ms = legalMoves(row, col, G);

  if (G.mustCap) ms = ms.filter(m => m.cap);

  if (is123 && G.c123.phase === 'move2-second' && G.c123.firstPiece) {
    if (row === G.c123.firstPiece.row && col === G.c123.firstPiece.col) return [];
  }
  if (is123 && G.c123.phase === 's2-second' && G.c123.firstPiece) {
    if (row !== G.c123.firstPiece.row || col !== G.c123.firstPiece.col) return [];
  }
  return ms;
}

window.activateSkill = function(skillKey) {
  G.hist.push(snapState(G, lmvEl.innerHTML));
  activateSkill123(skillKey, G, chkiEl);
};

// ════════════════════════════════════════════════════════
//  CLICK HANDLER
// ════════════════════════════════════════════════════════
window.handleBoardClick = function(row, col) {
  if (G.over) return;

  // Multiplayer: block clicks on opponent's turn
  if (MP.active && G.turn !== MP.myColor) return;

  var isC   = isCheckerMode(G.mode);
  var isCTC = isCTCMode(G.mode);
  var is123 = is123Mode(G.mode);

  if (is123 && G.c123.phase === 'sp-promote') {
    execChess123(row, col, null, G, lmvEl, chkiEl);
    if (MP.active && MP.roomId) submitMove(MP.roomId, G);
    return;
  }

  if (isCTC && G.ctcBonus) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execCTCBonus(G.ctcBonus.row, G.ctcBonus.col, mv, G, lmvEl, chkiEl,
        MP.active && MP.roomId ? () => submitMove(MP.roomId, G) : null);
    }
    return;
  }

  if (isC && G.chain && G.chainSq) {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      G.hist.push(snapState(G, lmvEl.innerHTML));
      execChecker(G.chainSq.row, G.chainSq.col, mv, G, lmvEl, chkiEl,
        MP.active && MP.roomId ? () => submitMove(MP.roomId, G) : null);
    }
    return;
  }

  if (!G.sel) {
    var p = G.board[row][col];
    if (!p || p.color !== G.turn) return;
    if ((isC||isCTC) && p.type !== 'checker') return;
    if (is123 && G.c123.phase === 's2-second') {
      var fp = G.c123.firstPiece;
      if (!fp || row !== fp.row || col !== fp.col) return;
    }
    var ms = getMovesFor(row, col);
    if (!ms.length) return;
    G.sel = {row, col}; G.moves = ms;
    render(G);
  } else {
    var mv = G.moves.find(m => m.row===row && m.col===col);
    if (mv) {
      if (!is123) G.hist.push(snapState(G, lmvEl.innerHTML));
      var {row:fr, col:fc} = G.sel;
      G.sel = null; G.moves = [];

      // afterMove fires AFTER animation + state update complete
      var afterMove = () => {
        if (MP.active && MP.roomId) submitMove(MP.roomId, G);
        // Switch clock to next player
        if (Clock.enabled) {
          clockSwitch(G.turn);
          updateClockUI();
        }
      };

      if (isC)        execChecker(fr, fc, mv, G, lmvEl, chkiEl, afterMove);
      else if (isCTC) execCTC(fr, fc, mv, G, lmvEl, chkiEl, afterMove);
      else if (is123) { execChess123(fr, fc, mv, G, lmvEl, chkiEl); afterMove(); }
      else            execChess(fr, fc, mv, G, lmvEl, chkiEl, afterMove);
    } else {
      var p = G.board[row][col];
      if (p && p.color===G.turn && !((isC||isCTC) && p.type!=='checker')) {
        var ms = getMovesFor(row, col);
        if (ms.length) { G.sel={row,col}; G.moves=ms; render(G); return; }
      }
      G.sel = null; G.moves = [];
      render(G);
    }
  }
};

// ════════════════════════════════════════════════════════
//  OPPONENT DISCONNECT DETECTION
// ════════════════════════════════════════════════════════
var disconnectTimer = null;

function watchOpponentPresence(roomId, myColor, oppColor) {
  // Heartbeat: write own timestamp every 5s
  var heartbeatRef = ref(db, 'rooms/' + roomId + '/heartbeat/' + myColor);
  var heartbeatInterval = setInterval(() => {
    if (!MP.active) { clearInterval(heartbeatInterval); return; }
    update(heartbeatRef, { t: Date.now(), alive: true });
  }, 5000);
  // Write immediately
  update(heartbeatRef, { t: Date.now(), alive: true });

  // Watch opponent heartbeat — if stale for 12s, show disconnect
  var oppHbRef = ref(db, 'rooms/' + roomId + '/heartbeat/' + oppColor);
  var lastSeen = Date.now();
  var checkInterval = setInterval(() => {
    if (!MP.active) { clearInterval(checkInterval); return; }
    var stale = Date.now() - lastSeen > 12000;
    if (stale && !G.over && MP.active) {
      var existing = document.getElementById('disconnect-overlay');
      if (!existing) showDisconnectOverlay();
    }
  }, 3000);

  var oppUnsub = onValue(oppHbRef, snap => {
    if (!snap.exists()) return;
    var data = snap.val();
    if (data && data.t) {
      lastSeen = data.t;
      // Opponent heartbeat received — remove disconnect overlay if shown
      var ov = document.getElementById('disconnect-overlay');
      if (ov) {
        var title = ov.querySelector('.disconnect-title');
        var msg = ov.querySelector('.disconnect-msg');
        if (title) title.textContent = 'OPPONENT BACK!';
        if (msg) msg.textContent = 'Your opponent has reconnected.';
        if (ov._cdInterval) clearInterval(ov._cdInterval);
        setTimeout(() => { var o=document.getElementById('disconnect-overlay'); if(o) o.remove(); }, 1500);
      }
    }
  });

  return () => {
    clearInterval(heartbeatInterval);
    clearInterval(checkInterval);
    off(oppHbRef);
    // Mark self as offline
    update(heartbeatRef, { alive: false });
  };
}

function showDisconnectOverlay(roomId) {
  var existing = document.getElementById('disconnect-overlay');
  if (existing) return;

  var popup = document.createElement('div');
  popup.id = 'disconnect-overlay';
  popup.style.cssText = 'position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:20px';

  popup.innerHTML = `
    <div class="disconnect-card">
      <div class="disconnect-icon">📡</div>
      <div class="disconnect-title">OPPONENT OFFLINE</div>
      <div class="disconnect-msg">Your opponent has disconnected.<br>Waiting for them to reconnect…</div>
      <div class="disconnect-countdown" id="dc-countdown">Auto-exit in <span id="dc-secs">30</span>s</div>
      <div class="disconnect-actions">
        <button class="disconnect-wait" id="dc-wait">⏳ Keep Waiting</button>
        <button class="disconnect-leave" id="dc-leave">← Leave Game</button>
      </div>
    </div>
  `;

  document.body.appendChild(popup);

  // Countdown to auto-leave
  var secsLeft = 30;
  var cdInterval = setInterval(() => {
    secsLeft--;
    var el = document.getElementById('dc-secs');
    if (el) el.textContent = secsLeft;
    if (secsLeft <= 0) {
      clearInterval(cdInterval);
      var o = document.getElementById('disconnect-overlay');
      if (o) o.remove();
      window.doReset();
    }
  }, 1000);

  document.getElementById('dc-wait').onclick = () => {
    // Reset countdown to 60s
    secsLeft = 60;
    var el = document.getElementById('dc-secs');
    if (el) el.textContent = secsLeft;
    var waitBtn = document.getElementById('dc-wait');
    if (waitBtn) waitBtn.style.display = 'none';
  };

  document.getElementById('dc-leave').onclick = () => {
    clearInterval(cdInterval);
    popup.remove();
    window.doReset();
  };

  // Store interval so we can clear on reconnect
  popup._cdInterval = cdInterval;
}

// ════════════════════════════════════════════════════════
//  LOCAL GAME START
// ════════════════════════════════════════════════════════
function onLocalStart(G_ref) {
  var mode = G_ref.mode;
  Object.assign(G, freshState());
  G.mode = mode;
  initBoard(G);
  lmvEl.innerHTML = '—';
  chkiEl.innerHTML = '';

  var modeLbl = document.getElementById('game-mode-label');
  var typeLbl = document.getElementById('game-type-label');
  if (modeLbl) modeLbl.textContent = modeLabels[mode] || mode;
  if (typeLbl) { typeLbl.textContent = 'Local'; typeLbl.className = 'game-type-label local'; }

  var clrLbl = document.getElementById('my-color-label');
  if (clrLbl) clrLbl.style.display = 'none';

  bcontEl.classList.remove('flip');
  showGameScreen();
  render(G);

  // Init clock if requested
  var clockRow = document.getElementById('clock-row');
  if (G.clockSeconds && G.clockSeconds > 0) {
    clockInit(G.clockSeconds, (loser) => {
      var type = loser === 'w' ? 'black' : 'white';
      endGame(type, `⏰ Time's up! ${loser==='w'?'Black':'White'} wins!`, G, lmvEl, chkiEl);
    }, updateClockUI);
    clockStart('w');
    updateClockUI();
  } else {
    clockReset();
    if (clockRow) clockRow.style.display = 'none';
  }
}
window._onLocalStart = onLocalStart;
window._initBoard = function(g) { initBoard(g); };
window._MP = MP; // expose for endGame win/loss overlay
window._applyBoardOrientation = applyBoardOrientation;

// ════════════════════════════════════════════════════════
//  MULTIPLAYER GAME START
// ════════════════════════════════════════════════════════
function onGameStart(roomId, myColor, gameG) {
  MP.active  = true;
  MP.roomId  = roomId;
  MP.myColor = myColor;

  // Color label
  var colorLabel = document.getElementById('my-color-label');
  if (colorLabel) {
    colorLabel.textContent = myColor === 'w' ? 'YOU ARE WHITE / RED' : 'YOU ARE BLACK';
    colorLabel.style.display = 'block';
  }

  // In-game header
  var modeLbl = document.getElementById('game-mode-label');
  var typeLbl = document.getElementById('game-type-label');
  if (modeLbl) modeLbl.textContent = modeLabels[G.mode] || G.mode;
  if (typeLbl) { typeLbl.textContent = 'Online'; typeLbl.className = 'game-type-label online'; }

  // Apply board orientation immediately
  applyBoardOrientation();

  showGameScreen();
  initBoard(G);
  render(G);

  // Init clock for HOST
  if (G.clockSeconds && G.clockSeconds > 0) {
    clockInit(G.clockSeconds, (loser) => {
      var type = loser === 'w' ? 'black' : 'white';
      endGame(type, "⏰ Time's up! " + (loser==='w'?'Black':'White') + " wins!", G, lmvEl, chkiEl);
      if (MP.active && MP.roomId) submitMove(MP.roomId, G);
    }, updateClockUI);
    clockStart('w'); // always starts white's turn first
    updateClockUI();
  }

  // Watch opponent presence for disconnect detection
  var oppColor = myColor === 'w' ? 'b' : 'w';
  if (MP.oppUnsubscribe) MP.oppUnsubscribe();
  MP.oppUnsubscribe = watchOpponentPresence(roomId, myColor, oppColor);

  // Watch undo requests — show as popup overlay
  var undoReqRef = ref(db, `rooms/${roomId}/undoRequest`);
  onValue(undoReqRef, snap => {
    var req = snap.val();
    // Remove existing popup
    var existing = document.getElementById('undo-popup');
    if (existing) existing.remove();

    if (req && req !== myColor) {
      // Show popup overlay
      var popup = document.createElement('div');
      popup.id = 'undo-popup';
      popup.style.cssText = 'position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px';
      popup.innerHTML = `
        <div class="undo-popup-card">
          <div class="undo-popup-icon">↩</div>
          <div class="undo-popup-title">UNDO REQUEST</div>
          <div class="undo-popup-msg">Your opponent wants to undo their last move.</div>
          <div class="undo-popup-actions">
            <button class="undo-popup-accept" id="undo-popup-accept">✓ ACCEPT</button>
            <button class="undo-popup-decline" id="undo-popup-decline">✗ DECLINE</button>
          </div>
        </div>
      `;
      document.body.appendChild(popup);

      document.getElementById('undo-popup-accept').onclick = async () => {
        popup.remove();
        await resolveUndo(roomId, true);
      };
      document.getElementById('undo-popup-decline').onclick = async () => {
        popup.remove();
        await resolveUndo(roomId, false);
      };
    }
  });

  // Watch undo accepted signal
  var undoAckRef = ref(db, `rooms/${roomId}/undoAccepted`);
  onValue(undoAckRef, snap => {
    var accepted = snap.val();
    if (accepted === true && MP.myColor === G.turn) {
      // My undo was accepted — apply it
      clearUndoSignal(roomId);
      if (G.hist.length > 0) {
        restoreState(G, G.hist.pop(), lmvEl);
        G.over = false; G.sel = null; G.moves = [];
        G.ctcBonus = null;
        clearOverlays();
        render(G);
        submitMove(roomId, G);
      }
    } else if (accepted === false) {
      clearUndoSignal(roomId);
      chkiEl.innerHTML = '❌ Undo declined by opponent';
      setTimeout(() => { chkiEl.innerHTML = ''; }, 2500);
    }
  });

  // Firebase state listener
  var firstSync = true; // track first update after game starts
  if (MP.unsubscribe) MP.unsubscribe();
  MP.unsubscribe = listenRoom(roomId, data => {
    if (!data || data.status === 'waiting') return;

    // Sync mode
    if (data.mode && data.mode !== G.mode) {
      G.mode = data.mode;
      if (modeLbl) modeLbl.textContent = modeLabels[G.mode] || G.mode;
    }

    // Apply game state from Firebase
    // Guard: if Firebase board is empty, use initBoard locally
    var boardHasPieces = data.board && Object.keys(data.board).length > 0;
    if (boardHasPieces) {
      deserializeGameState(data, G);
    } else {
      // Firebase has no pieces — board not yet initialized properly
      // Keep local board (already set by initBoard above)
      if (data.turn) G.turn = data.turn;
      if (data.mode) G.mode = data.mode;
    }
    // Init clock for guest on first sync (host already set it)
    if (firstSync && !MP.isHost && G.clockSeconds && G.clockSeconds > 0 && !Clock.enabled) {
      clockInit(G.clockSeconds, (loser) => {
        var type = loser === 'w' ? 'black' : 'white';
        endGame(type, "⏰ Time's up! " + (loser==='w'?'Black':'White') + " wins!", G, lmvEl, chkiEl);
        if (MP.active && MP.roomId) submitMove(MP.roomId, G);
      }, updateClockUI);
      clockStart(G.turn);
      updateClockUI();
    }
    firstSync = false;
    G.sel = null; G.moves = [];

    // Game over — show overlay on BOTH devices
    if (G.over) {
      chkiEl.innerHTML = '';
      render(G);
      // Determine winner from Firebase data
      var winner = data.winner; // 'w','b','draw', etc
      // Map winner to victory type
      var typeMap = {
        w: 'white', b: 'black', draw: 'draw',
        white: 'white', black: 'black',
        red: 'red', horde: 'horde',
        ared: 'ared', ablk: 'ablk',
        ctc_red: 'ctc_red', ctc_blk: 'ctc_blk',
      };
      var type = typeMap[winner] || winner || 'draw';
      setTimeout(() => showVictory(type, MP.myColor), 200);
      return;
    }

    // Turn indicator
    var isMyTurn = G.turn === MP.myColor;
    if (!G.over) {
      chkiEl.innerHTML = isMyTurn ? '' : '⏳ Opponent\'s turn…';
    }

    // Keep board orientation correct
    applyBoardOrientation();
    render(G);
  });
}

// ════════════════════════════════════════════════════════
//  UNDO
// ════════════════════════════════════════════════════════
function doUndo() {
  if (!G.hist.length) { chkiEl.innerHTML = 'Nothing to undo'; setTimeout(()=>chkiEl.innerHTML='',1500); return; }
  if (MP.active && MP.roomId) {
    // Multiplayer: request undo from opponent
    chkiEl.innerHTML = '⏳ Waiting for opponent to accept undo…';
    requestUndo(MP.roomId, MP.myColor);
    return;
  }
  // Local: undo immediately
  restoreState(G, G.hist.pop(), lmvEl);
  G.over = false; G.sel = null; G.moves = [];
  G.ctcBonus = null;
  clearOverlays();
  if (Clock.enabled) { clockSwitch(G.turn); updateClockUI(); }
  render(G);
}

// ════════════════════════════════════════════════════════
//  RESIGN / BACK HOME
// ════════════════════════════════════════════════════════
function doResignOrReset() {
  clearTimeout(disconnectTimer);

  // Stop and reset clock
  clockReset();
  var clockRow = document.getElementById('clock-row');
  if (clockRow) clockRow.style.display = 'none';

  if (MP.active) {
    if (MP.unsubscribe)    MP.unsubscribe();
    if (MP.oppUnsubscribe) MP.oppUnsubscribe();
    MP.active = false; MP.roomId = null; MP.myColor = null;
  }

  // Remove any open popups
  var undoPop = document.getElementById('undo-popup');
  if (undoPop) undoPop.remove();
  var dcPop = document.getElementById('disconnect-overlay');
  if (dcPop) {
    if (dcPop._cdInterval) clearInterval(dcPop._cdInterval);
    dcPop.remove();
  }
  clearOverlays();

  var mode = G.mode;
  Object.assign(G, freshState());
  G.mode = mode;
  G.clockSeconds = 0; // clear clock setting
  lmvEl.innerHTML = '—';
  chkiEl.innerHTML = '';

  var clrLbl = document.getElementById('my-color-label');
  if (clrLbl) clrLbl.style.display = 'none';

  bcontEl.classList.remove('flip');
  showHomeScreen();
  renderHome(G, onLocalStart, onGameStart);
}
window.doReset = doResignOrReset;

// ════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════
var _backBtn=document.getElementById('game-back-btn'); if(_backBtn) _backBtn.addEventListener('click', doResignOrReset);
var _undoBtn=document.getElementById('undoBtn'); if(_undoBtn) _undoBtn.addEventListener('click', doUndo);
var _resetBtn=document.getElementById('resetBtn'); if(_resetBtn) _resetBtn.addEventListener('click', doResignOrReset);

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
var joined = await handleURLJoin(G, onLocalStart, onGameStart);
if (!joined) {
  initBoard(G);
  renderHome(G, onLocalStart, onGameStart);
}
})().catch(function(err) {
  console.error('MaxPlay error:', err);
  var d=document.createElement('div');
  d.style.cssText='color:#ff8090;padding:16px;font-family:monospace;position:fixed;top:10px;left:10px;right:10px;background:#2c2c2e;z-index:9999;font-size:12px;border:2px solid #e8253a;border-radius:4px';
  d.textContent='Error: '+err.message;
  document.body.appendChild(d);
});

</script>
