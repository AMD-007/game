<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Multi-Device Games - Play Together!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* Connection Screen */
        .connection-screen {
            max-width: 500px;
            width: 100%;
            background: #1e1e2e;
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .connection-screen h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .connection-screen p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .room-code {
            font-size: 52px;
            font-weight: 800;
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            letter-spacing: 12px;
            color: #ffd700;
            margin: 20px 0;
            font-family: monospace;
        }

        .input-code {
            background: #0f0f1a;
            border: 2px solid #2a2a3e;
            color: white;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border-radius: 16px;
            width: 100%;
            font-family: monospace;
            letter-spacing: 8px;
        }

        .btn {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
        }

        .btn-danger {
            background: #c0392b;
        }

        .waiting-status {
            color: #ffd700;
            margin-top: 20px;
            font-size: 14px;
        }

        .qr-container {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }

        /* Game Screen */
        .game-screen {
            display: none;
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }

        .room-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-code-display {
            background: #0f0f1a;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
        }

        .player-role {
            font-size: 14px;
            font-weight: bold;
            padding: 6px 14px;
            background: #0f0f1a;
            border-radius: 30px;
        }

        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #0f0f1a;
            padding: 6px;
            border-radius: 50px;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: all 0.1s ease;
        }

        .square span {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .square .red-king {
            color: #e74c3c;
            text-shadow: 0 0 6px #ff0000;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #c0392b;
        }
        
        .square .black-king {
            color: #1a1a2e;
            text-shadow: 0 0 6px #4a4a6a;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #000000;
        }

        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background: linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow: inset 0 0 0 2px #ffd700; }
        
        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 25%;
            height: 25%;
            background: #4caf50;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        
        .square.capture::after {
            background: #ff5722;
            width: 55%;
            height: 55%;
            border-radius: 8px;
        }

        .square.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .control-panel {
            padding: 0 16px 16px 16px;
        }

        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 50px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            border-left: 4px solid #ffd700;
        }

        .turn-indicator .turn-label { font-size: 9px; color: #888; letter-spacing: 1.5px; }
        .turn-indicator .turn-player { font-size: 14px; font-weight: 800; color: #ffd700; }

        button {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
        }

        button:active { transform: scale(0.95); }

        .reset-btn { background: #8b5a2b; }
        .leave-btn { background: #c0392b; padding: 6px 14px; font-size: 11px; }

        .move-history {
            background: #16162a;
            padding: 10px 16px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
            border-radius: 30px;
        }

        .move-history span { color: #ffd700; font-weight: bold; }

        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
        }

        .victory-card {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px;
            padding: 24px 32px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .victory-card .winner-text { font-size: 28px; font-weight: 800; color: #ffd700; margin-bottom: 16px; }
        .victory-card button { background: #ffd700; color: #1a1a2e; margin-top: 16px; }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 9px;
            color: #5a5a6e;
            border-top: 1px solid #2a2a3e;
            background: #16162a;
        }

        @media (max-width: 500px) {
            .room-code { font-size: 36px; letter-spacing: 8px; }
            .input-code { font-size: 22px; letter-spacing: 6px; }
            .btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- Connection Screen -->
<div id="connectionScreen" class="connection-screen">
    <h1>🎮 MULTI-DEVICE GAMES</h1>
    <p>Play Chess & Checkers with friends on different devices!</p>
    
    <button id="createGameBtn" class="btn btn-primary">➕ CREATE GAME ROOM</button>
    
    <div style="margin: 20px 0">— OR JOIN EXISTING —</div>
    
    <input type="text" id="joinCodeInput" class="input-code" placeholder="000000" maxlength="6" inputmode="numeric">
    <button id="joinGameBtn" class="btn">🔗 JOIN GAME</button>
    
    <div id="waitingStatus" class="waiting-status"></div>
    <div id="qrContainer" style="margin-top: 20px;"></div>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="game-screen">
    <div class="game-header">
        <div class="room-info">
            <span class="room-code-display" id="roomCodeDisplay">Room: ------</span>
            <span class="player-role" id="playerRole">⚪ WHITE</span>
            <button id="leaveBtn" class="leave-btn">🚪 Leave</button>
        </div>
        <div class="mode-selector" id="modeSelector">
            <div class="mode-btn" data-mode="standard">♔ Chess</div>
            <div class="mode-btn" data-mode="chess960">🎲 960</div>
            <div class="mode-btn" data-mode="kinghill">🏔️ Hill</div>
            <div class="mode-btn" data-mode="horde">⚔️ Horde</div>
            <div class="mode-btn" data-mode="checkers">🔴 Checkers</div>
            <div class="mode-btn" data-mode="anticheckers">💀 Anti</div>
        </div>
    </div>

    <div class="board-wrapper" id="boardWrapper">
        <div id="chessboard"></div>
    </div>

    <div class="control-panel">
        <div class="status-bar">
            <div class="turn-indicator">
                <div class="turn-label">CURRENT TURN</div>
                <div class="turn-player" id="turnPlayer">⚪ WHITE</div>
            </div>
            <button id="resetGameBtn" class="reset-btn">🔄 NEW</button>
        </div>
        <div class="move-history" id="moveHistory">
            📍 Last move: <span id="lastMoveSpan">None</span>
        </div>
    </div>
    <footer>🔗 Playing on different devices • Room code auto-syncs</footer>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ==================== FIREBASE CONFIGURATION ====================
    // !!! REPLACE THIS WITH YOUR FIREBASE CONFIG !!!
    // Get this from https://console.firebase.google.com -> Project Settings -> Your apps
    
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };
    
    // Initialize Firebase
    let database = null;
    let firebaseInitialized = false;
    
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        firebaseInitialized = true;
        console.log("✅ Firebase connected! Ready for multiplayer.");
    } catch (e) {
        console.warn("⚠️ Firebase not configured. Using demo mode (single device only).");
        console.warn("To enable multiplayer, replace firebaseConfig with your Firebase project settings.");
    }
    
    // ==================== GAME VARIABLES ====================
    let currentRoomId = null;
    let playerColor = null; // 'white' or 'black'
    let currentMode = 'standard';
    let gameState = null;
    let selectedSquare = null;
    let validMovesList = [];
    let myTurn = false;
    let gameOver = false;
    let listenerRef = null;
    
    // DOM Elements
    const connectionScreen = document.getElementById('connectionScreen');
    const gameScreen = document.getElementById('gameScreen');
    const boardDiv = document.getElementById('chessboard');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const lastMoveSpan = document.getElementById('lastMoveSpan');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playerRoleSpan = document.getElementById('playerRole');
    const waitingStatus = document.getElementById('waitingStatus');
    const qrContainer = document.getElementById('qrContainer');
    
    // ==================== PIECE SYMBOLS ====================
    const chessSymbols = {
        'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔', 'wp': '♙',
        'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚', 'bp': '♟'
    };
    
    // ==================== INITIAL BOARD SETUP ====================
    function getInitialBoard(mode) {
        const board = Array(8).fill().map(() => Array(8).fill(null));
        
        if (mode === 'checkers' || mode === 'anticheckers') {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        if (row < 3) board[row][col] = { type: 'checker', color: 'black', king: false };
                        else if (row > 4) board[row][col] = { type: 'checker', color: 'white', king: false };
                    }
                }
            }
            return board;
        }
        
        if (mode === 'horde') {
            // Black setup
            const blackPieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board[0][i] = { type: blackPieces[i], color: 'black' };
                board[1][i] = { type: 'p', color: 'black' };
            }
            // White horde - 36 pawns
            for (let i = 0; i < 8; i++) {
                board[7][i] = { type: 'p', color: 'white' };
                board[6][i] = { type: 'p', color: 'white' };
                board[5][i] = { type: 'p', color: 'white' };
                board[4][i] = { type: 'p', color: 'white' };
            }
            const row3Pattern = [false, true, true, false, false, true, true, false];
            for (let i = 0; i < 8; i++) {
                if (row3Pattern[i]) board[3][i] = { type: 'p', color: 'white' };
            }
            return board;
        }
        
        // Chess / Chess960 / King of the Hill
        for (let i = 0; i < 8; i++) {
            board[1][i] = { type: 'p', color: 'black' };
            board[6][i] = { type: 'p', color: 'white' };
        }
        
        const pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        
        if (mode === 'chess960') {
            // Random valid Chess960 position
            let shuffled = [...pieces];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            // Validate king between rooks
            const kingPos = shuffled.indexOf('k');
            const rookPositions = shuffled.map((p, idx) => p === 'r' ? idx : -1).filter(i => i !== -1);
            if (rookPositions[0] < kingPos && kingPos < rookPositions[1]) {
                for (let i = 0; i < 8; i++) {
                    board[0][i] = { type: shuffled[i], color: 'black' };
                    board[7][i] = { type: shuffled[i], color: 'white' };
                }
            } else {
                // Fallback to standard
                for (let i = 0; i < 8; i++) {
                    board[0][i] = { type: pieces[i], color: 'black' };
                    board[7][i] = { type: pieces[i], color: 'white' };
                }
            }
        } else {
            // Standard or King of the Hill
            for (let i = 0; i < 8; i++) {
                board[0][i] = { type: pieces[i], color: 'black' };
                board[7][i] = { type: pieces[i], color: 'white' };
            }
        }
        
        return board;
    }
    
    function getInitialGameState(mode) {
        return {
            board: getInitialBoard(mode),
            currentTurn: 'white',
            gameOver: false,
            winner: null,
            mode: mode,
            lastMove: null,
            lastMoveFrom: null,
            lastMoveTo: null
        };
    }
    
    // ==================== RENDER BOARD ====================
    function getPieceDisplay(piece, mode) {
        if (!piece) return '';
        if (mode === 'checkers' || mode === 'anticheckers') {
            if (piece.king) {
                if (piece.color === 'white') return '<span class="red-king">👑</span>';
                else return '<span class="black-king">👑</span>';
            }
            return piece.color === 'white' ? '🔴' : '⚫';
        }
        const key = (piece.color === 'white' ? 'w' : 'b') + piece.type;
        return chessSymbols[key] || '';
    }
    
    function renderBoard() {
        if (!gameState) return;
        
        boardDiv.innerHTML = '';
        const board = gameState.board;
        const mode = gameState.mode;
        
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = board[row][col];
                const isLight = (row + col) % 2 === 0;
                const squareName = String.fromCharCode(97 + col) + (8 - row);
                
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light' : 'dark'}`;
                
                if (selectedSquare === squareName) square.classList.add('selected');
                if (gameState.lastMoveFrom === squareName) square.classList.add('last-move-from');
                if (gameState.lastMoveTo === squareName) square.classList.add('last-move-to');
                
                const isValidTarget = validMovesList.some(m => m.row === row && m.col === col);
                if (isValidTarget) {
                    square.classList.add('valid-move');
                    if (board[row][col] && board[row][col].color !== gameState.currentTurn) {
                        square.classList.add('capture');
                    }
                }
                
                const span = document.createElement('span');
                const displayValue = getPieceDisplay(piece, mode);
                if (displayValue.includes('red-king') || displayValue.includes('black-king')) {
                    span.innerHTML = displayValue;
                } else {
                    span.textContent = displayValue;
                }
                square.appendChild(span);
                
                square.addEventListener('click', (function(r, c) {
                    return () => onSquareClick(r, c);
                })(row, col));
                
                boardDiv.appendChild(square);
            }
        }
        
        // Update turn display
        if (gameState.gameOver) {
            turnPlayerSpan.innerHTML = gameState.winner ? `🏆 ${gameState.winner} WINS! 🏆` : 'DRAW';
        } else {
            const isMyTurn = (gameState.currentTurn === playerColor);
            turnPlayerSpan.innerHTML = `${gameState.currentTurn === 'white' ? '⚪ WHITE' : '⚫ BLACK'}'s TURN${isMyTurn ? ' (YOU)' : ''}`;
        }
        
        lastMoveSpan.textContent = gameState.lastMove || 'None';
    }
    
    // ==================== CHECKERS MOVE LOGIC ====================
    function getCheckersMoves(row, col, boardState) {
        const piece = boardState[row][col];
        if (!piece || piece.type !== 'checker') return [];
        
        const color = piece.color;
        const direction = color === 'white' ? -1 : 1;
        const isKing = piece.king;
        const moves = [];
        const dirs = isKing ? [-1, 1] : [direction];
        
        for (const dr of dirs) {
            for (const dc of [-1, 1]) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                    const target = boardState[newRow][newCol];
                    if (!target) {
                        moves.push({ row: newRow, col: newCol, capture: null });
                    } else if (target.color !== color) {
                        const jumpRow = newRow + dr;
                        const jumpCol = newCol + dc;
                        if (jumpRow >= 0 && jumpRow < 8 && jumpCol >= 0 && jumpCol < 8) {
                            if (!boardState[jumpRow][jumpCol]) {
                                moves.push({ row: jumpRow, col: jumpCol, capture: { row: newRow, col: newCol } });
                            }
                        }
                    }
                }
            }
        }
        return moves;
    }
    
    function makeCheckersMove(fromRow, fromCol, toRow, toCol, boardState) {
        const piece = boardState[fromRow][fromCol];
        if (!piece) return false;
        
        const moves = getCheckersMoves(fromRow, fromCol, boardState);
        const validMove = moves.find(m => m.row === toRow && m.col === toCol);
        if (!validMove) return false;
        
        boardState[toRow][toCol] = boardState[fromRow][fromCol];
        boardState[fromRow][fromCol] = null;
        
        if (validMove.capture) {
            boardState[validMove.capture.row][validMove.capture.col] = null;
        }
        
        if ((piece.color === 'white' && toRow === 0) || (piece.color === 'black' && toRow === 7)) {
            boardState[toRow][toCol].king = true;
        }
        
        return true;
    }
    
    function hasAnyCheckersMoves(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'checker' && piece.color === color) {
                    if (getCheckersMoves(i, j, boardState).length > 0) return true;
                }
            }
        }
        return false;
    }
    
    function checkAntiCheckerWin(boardState) {
        let hasWhite = false, hasBlack = false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'checker') {
                    if (piece.color === 'white') hasWhite = true;
                    else hasBlack = true;
                }
            }
        }
        if (!hasWhite) return 'black';
        if (!hasBlack) return 'white';
        return null;
    }
    
    // ==================== MAKE MOVE ====================
    function makeMove(fromRow, fromCol, toRow, toCol) {
        if (!gameState || gameState.gameOver) return false;
        if (gameState.currentTurn !== playerColor) return false;
        
        const newBoard = JSON.parse(JSON.stringify(gameState.board));
        let moveMade = false;
        let moveNotation = '';
        
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            moveMade = makeCheckersMove(fromRow, fromCol, toRow, toCol, newBoard);
            if (moveMade) {
                const fromSquare = String.fromCharCode(97 + fromCol) + (8 - fromRow);
                const toSquare = String.fromCharCode(97 + toCol) + (8 - toRow);
                moveNotation = `${fromSquare}→${toSquare}`;
                
                // Check win condition
                if (currentMode === 'anticheckers') {
                    const winner = checkAntiCheckerWin(newBoard);
                    if (winner) {
                        gameState.gameOver = true;
                        gameState.winner = winner === 'white' ? 'WHITE' : 'BLACK';
                    }
                } else {
                    const nextTurn = gameState.currentTurn === 'white' ? 'black' : 'white';
                    if (!hasAnyCheckersMoves(nextTurn, newBoard)) {
                        gameState.gameOver = true;
                        gameState.winner = gameState.currentTurn === 'white' ? 'WHITE' : 'BLACK';
                    }
                }
            }
        }
        
        if (moveMade) {
            gameState.board = newBoard;
            gameState.lastMove = moveNotation;
            gameState.lastMoveFrom = String.fromCharCode(97 + fromCol) + (8 - fromRow);
            gameState.lastMoveTo = String.fromCharCode(97 + toCol) + (8 - toRow);
            gameState.currentTurn = gameState.currentTurn === 'white' ? 'black' : 'white';
            
            // Save to Firebase
            if (database && currentRoomId) {
                database.ref(`games/${currentRoomId}`).set(gameState);
            }
            
            renderBoard();
            selectedSquare = null;
            validMovesList = [];
            return true;
        }
        
        return false;
    }
    
    function onSquareClick(row, col) {
        if (!gameState || gameState.gameOver) return;
        if (gameState.currentTurn !== playerColor) return;
        
        const square = String.fromCharCode(97 + col) + (8 - row);
        
        if (selectedSquare === null) {
            const piece = gameState.board[row][col];
            if (!piece) return;
            if (piece.color !== playerColor) return;
            
            selectedSquare = square;
            
            if (currentMode === 'checkers' || currentMode === 'anticheckers') {
                validMovesList = getCheckersMoves(row, col, gameState.board);
            } else {
                // For chess modes, simplified - just allow moves
                validMovesList = [];
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const newRow = row + dr;
                        const newCol = col + dc;
                        if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                            validMovesList.push({ row: newRow, col: newCol });
                        }
                    }
                }
            }
            renderBoard();
        } else {
            const fromRowCol = {
                row: 8 - parseInt(selectedSquare[1]),
                col: selectedSquare.charCodeAt(0) - 97
            };
            makeMove(fromRowCol.row, fromRowCol.col, row, col);
            selectedSquare = null;
            validMovesList = [];
            renderBoard();
        }
    }
    
    // ==================== FIREBASE SYNC ====================
    function createGameRoom() {
        const roomCode = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        currentRoomId = roomCode;
        playerColor = 'white';
        currentMode = 'standard';
        
        gameState = getInitialGameState(currentMode);
        
        if (database) {
            database.ref(`games/${roomCode}`).set(gameState);
            startListening(roomCode);
        }
        
        showGameScreen(roomCode);
        showQRCode(roomCode);
    }
    
    function joinGameRoom(roomCode) {
        if (!database) {
            waitingStatus.innerHTML = '⚠️ Firebase not configured. Multiplayer requires Firebase setup.';
            return;
        }
        
        currentRoomId = roomCode;
        playerColor = 'black';
        
        database.ref(`games/${roomCode}`).once('value', (snapshot) => {
            if (snapshot.exists()) {
                gameState = snapshot.val();
                currentMode = gameState.mode;
                startListening(roomCode);
                showGameScreen(roomCode);
            } else {
                waitingStatus.innerHTML = '❌ Room not found! Check the code.';
            }
        });
    }
    
    function startListening(roomCode) {
        if (listenerRef) listenerRef.off();
        listenerRef = database.ref(`games/${roomCode}`);
        listenerRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const newState = snapshot.val();
                gameState = newState;
                currentMode = gameState.mode;
                renderBoard();
                
                // Check for game over victory popup
                if (gameState.gameOver && gameState.winner) {
                    showVictory(gameState.winner);
                }
            }
        });
    }
    
    function resetGame() {
        if (!database || !currentRoomId) return;
        gameState = getInitialGameState(currentMode);
        gameState.currentTurn = 'white';
        gameState.gameOver = false;
        gameState.winner = null;
        database.ref(`games/${currentRoomId}`).set(gameState);
        renderBoard();
    }
    
    function changeMode(mode) {
        currentMode = mode;
        if (database && currentRoomId && playerColor === 'white') {
            gameState = getInitialGameState(mode);
            database.ref(`games/${currentRoomId}`).set(gameState);
        }
        renderBoard();
    }
    
    function leaveGame() {
        if (listenerRef) listenerRef.off();
        currentRoomId = null;
        playerColor = null;
        gameState = null;
        connectionScreen.style.display = 'flex';
        gameScreen.style.display = 'none';
        waitingStatus.innerHTML = '';
        qrContainer.innerHTML = '';
    }
    
    function showGameScreen(roomCode) {
        connectionScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        roomCodeDisplay.innerHTML = `Room: ${roomCode}`;
        playerRoleSpan.innerHTML = playerColor === 'white' ? '⚪ WHITE (Creator)' : '⚫ BLACK (Joiner)';
        renderBoard();
        
        // Update mode selector active state
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.dataset.mode === currentMode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function showVictory(winner) {
        const wrapper = document.getElementById('boardWrapper');
        const existing = document.querySelector('.victory-overlay');
        if (existing) existing.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = `
            <div class="victory-card">
                <div class="winner-text">🏆 ${winner} WINS! 🏆</div>
                <button onclick="document.querySelector('.victory-overlay')?.remove()">CONTINUE</button>
            </div>
        `;
        wrapper.appendChild(overlay);
    }
    
    function showQRCode(roomCode) {
        const url = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
        qrContainer.innerHTML = `
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}" alt="QR Code">
                <p style="margin-top: 10px; font-size: 12px;">Share this QR code</p>
            </div>
        `;
    }
    
    function checkUrlForRoom() {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');
        if (room && room.length === 6) {
            document.getElementById('joinCodeInput').value = room;
            setTimeout(() => joinGameRoom(room), 500);
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('createGameBtn').addEventListener('click', () => {
        if (!firebaseInitialized) {
            alert('⚠️ Firebase not configured!\n\nTo enable multiplayer:\n1. Create a Firebase project\n2. Copy your config to firebaseConfig\n3. Deploy this file');
            return;
        }
        createGameRoom();
    });
    
    document.getElementById('joinGameBtn').addEventListener('click', () => {
        const code = document.getElementById('joinCodeInput').value.trim();
        if (code.length === 6) joinGameRoom(code);
        else alert('Enter 6-digit room code');
    });
    
    document.getElementById('leaveBtn').addEventListener('click', leaveGame);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (playerColor === 'white') {
                changeMode(btn.dataset.mode);
            }
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    
    // Check URL on load
    checkUrlForRoom();
    
    if (!firebaseInitialized) {
        waitingStatus.innerHTML = '⚠️ Multiplayer requires Firebase setup. See instructions in code.';
    }
    
    console.log('%c🎮 MULTI-DEVICE GAMES READY!', 'color: #ffd700; font-size: 16px');
    console.log('%cTo enable multiplayer: Replace firebaseConfig with your Firebase project settings', 'color: #aaa');
</script>
</body>
