<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multi-Device Games - Play Together!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* Connection Screen */
        .connection-screen {
            max-width: 500px;
            width: 100%;
            background: #1e1e2e;
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .connection-screen h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .connection-screen p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .room-code {
            font-size: 48px;
            font-weight: 800;
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            letter-spacing: 10px;
            color: #ffd700;
            margin: 20px 0;
            font-family: monospace;
        }

        .input-code {
            background: #0f0f1a;
            border: 2px solid #2a2a3e;
            color: white;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border-radius: 16px;
            width: 100%;
            font-family: monospace;
            letter-spacing: 8px;
        }

        .btn {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.1s;
        }

        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #ffd700; color: #1a1a2e; }
        .btn-danger { background: #c0392b; }

        .waiting-status {
            color: #ffd700;
            margin-top: 20px;
            font-size: 14px;
        }

        .qr-container {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }

        /* Game Screen */
        .game-screen {
            display: none;
            max-width: 550px;
            width: 100%;
            background: #1e1e2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .game-header {
            padding: 12px 16px;
            background: #16162a;
            border-bottom: 1px solid #2a2a3e;
        }

        .room-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-code-display {
            background: #0f0f1a;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
        }

        .player-role {
            font-size: 14px;
            font-weight: bold;
            padding: 6px 14px;
            background: #0f0f1a;
            border-radius: 30px;
        }

        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #0f0f1a;
            padding: 6px;
            border-radius: 50px;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        .board-wrapper {
            padding: 16px;
            background: #16162a;
            position: relative;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0d9b5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: all 0.1s ease;
        }

        .square span {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .square .red-king {
            color: #e74c3c;
            text-shadow: 0 0 6px #ff0000;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #c0392b;
        }
        
        .square .black-king {
            color: #1a1a2e;
            text-shadow: 0 0 6px #4a4a6a;
            font-size: clamp(24px, 7vw, 38px);
            font-weight: bold;
            -webkit-text-stroke: 1px #000000;
        }

        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background: linear-gradient(135deg, #6f9e4f, #4a7a2e); box-shadow: inset 0 0 0 2px #ffd700; }
        
        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 25%;
            height: 25%;
            background: #4caf50;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        
        .square.capture::after {
            background: #ff5722;
            width: 55%;
            height: 55%;
            border-radius: 8px;
        }

        .square.last-move-from::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(52, 152, 219, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .square.last-move-to::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(46, 204, 113, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .square.in-check::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: radial-gradient(circle, rgba(192, 57, 43, 0.6), rgba(192, 57, 43, 0.2));
            border-radius: 4px;
            pointer-events: none;
            z-index: 1;
        }

        .square.hill-square {
            position: relative;
        }
        
        .square.hill-square::before {
            content: "🏔️";
            position: absolute;
            font-size: clamp(10px, 3vw, 14px);
            bottom: 2px;
            right: 2px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }

        .control-panel {
            padding: 0 16px 16px 16px;
        }

        .status-bar {
            background: #16162a;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 50px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            border-left: 4px solid #ffd700;
        }

        .turn-indicator .turn-label { font-size: 9px; color: #888; letter-spacing: 1.5px; }
        .turn-indicator .turn-player { font-size: 14px; font-weight: 800; color: #ffd700; }

        button {
            background: #2a2a3e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
        }

        button:active { transform: scale(0.95); }

        .reset-btn { background: #8b5a2b; }
        .leave-btn { background: #c0392b; padding: 6px 14px; font-size: 11px; }

        .move-history {
            background: #16162a;
            padding: 10px 16px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
            border-radius: 30px;
        }

        .move-history span { color: #ffd700; font-weight: bold; }

        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
        }

        .victory-card {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px;
            padding: 24px 32px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .victory-card .winner-text { font-size: 24px; font-weight: 800; color: #ffd700; margin-bottom: 16px; }
        .victory-card button { background: #ffd700; color: #1a1a2e; margin-top: 16px; }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 9px;
            color: #5a5a6e;
            border-top: 1px solid #2a2a3e;
            background: #16162a;
        }

        @media (max-width: 500px) {
            .room-code { font-size: 36px; letter-spacing: 8px; }
            .input-code { font-size: 22px; letter-spacing: 6px; }
            .btn { padding: 10px 20px; font-size: 14px; }
            .mode-btn { padding: 4px 8px; font-size: 9px; }
        }
    </style>
</head>
<body>

<!-- Connection Screen -->
<div id="connectionScreen" class="connection-screen">
    <h1>🎮 MULTI-DEVICE GAMES</h1>
    <p>Play Chess, Checkers & variants with friends on different devices!</p>
    
    <button id="createGameBtn" class="btn btn-primary">➕ CREATE GAME ROOM</button>
    
    <div style="margin: 20px 0">— OR JOIN EXISTING —</div>
    
    <input type="text" id="joinCodeInput" class="input-code" placeholder="000000" maxlength="6" inputmode="numeric">
    <button id="joinGameBtn" class="btn">🔗 JOIN GAME</button>
    
    <div id="waitingStatus" class="waiting-status"></div>
    <div id="qrContainer"></div>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="game-screen">
    <div class="game-header">
        <div class="room-info">
            <span class="room-code-display" id="roomCodeDisplay">Room: ------</span>
            <span class="player-role" id="playerRole">⚪ WHITE</span>
            <button id="leaveBtn" class="leave-btn">🚪 Leave</button>
        </div>
        <div class="mode-selector">
            <div class="mode-btn" data-mode="standard">♔ Chess</div>
            <div class="mode-btn" data-mode="chess960">🎲 960</div>
            <div class="mode-btn" data-mode="kinghill">🏔️ Hill</div>
            <div class="mode-btn" data-mode="horde">⚔️ Horde</div>
            <div class="mode-btn" data-mode="checkers">🔴 Checkers</div>
            <div class="mode-btn" data-mode="anticheckers">💀 Anti</div>
        </div>
    </div>

    <div class="board-wrapper" id="boardWrapper">
        <div id="chessboard"></div>
    </div>

    <div class="control-panel">
        <div class="status-bar">
            <div class="turn-indicator">
                <div class="turn-label">CURRENT TURN</div>
                <div class="turn-player" id="turnPlayer">⚪ WHITE</div>
            </div>
            <button id="resetGameBtn" class="reset-btn">🔄 NEW</button>
        </div>
        <div class="move-history">
            📍 Last move: <span id="lastMoveSpan">None</span>
        </div>
    </div>
    <footer>🔗 Playing on different devices • Room code auto-syncs</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ==================== FIREBASE CONFIG ====================
    // REPLACE THIS with your Firebase project settings from console.firebase.google.com
    const firebaseConfig = {
        apiKey: "AIzaSyBVMVofp3tqPWDsv7PJr_3-9QD7r1FTF4A",
        authDomain: "multidevicegames-deb35.firebaseapp.com",
        databaseURL: "https://multidevicegames-deb35-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "multidevicegames-deb35",
        storageBucket: "multidevicegames-deb35.firebasestorage.app",
        messagingSenderId: "550870350070",
        appId: "1:550870350070:web:292fdd7696b3a8c59a94d7"
    };
    
    let database = null;
    let firebaseReady = false;
    
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        firebaseReady = true;
        console.log("✅ Firebase connected!");
    } catch(e) {
        console.warn("⚠️ Firebase not configured. Playing in demo mode (single device).");
    }
    
    // ==================== GAME ENGINE (WORKING) ====================
    let board = [];
    let currentTurn = 'w';
    let selectedSquare = null;
    let validMovesList = [];
    let gameOver = false;
    let winner = null;
    let currentMode = 'standard';
    let mustCapture = false;
    let captureChain = false;
    let lastMoveFrom = null;
    let lastMoveTo = null;
    
    // Multiplayer vars
    let currentRoomId = null;
    let playerColor = null; // 'w' or 'b'
    let isMyTurn = false;
    let gameStateListener = null;
    
    const boardDiv = document.getElementById('chessboard');
    const boardWrapper = document.getElementById('boardWrapper');
    const turnPlayerSpan = document.getElementById('turnPlayer');
    const resetBtn = document.getElementById('resetGameBtn');
    const lastMoveSpan = document.getElementById('lastMoveSpan');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const connectionScreen = document.getElementById('connectionScreen');
    const gameScreen = document.getElementById('gameScreen');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playerRoleSpan = document.getElementById('playerRole');
    const waitingStatus = document.getElementById('waitingStatus');
    const qrContainer = document.getElementById('qrContainer');
    
    const chessSymbols = {
        'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔', 'wp': '♙',
        'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚', 'bp': '♟'
    };
    
    const pieceName = {
        'r': 'Rook', 'n': 'Knight', 'b': 'Bishop', 'q': 'Queen', 'k': 'King', 'p': 'Pawn',
        'checker': 'Checker'
    };
    
    function showVictory(winnerName, winnerType) {
        const existing = document.querySelector('.victory-overlay');
        if (existing) existing.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = `
            <div class="victory-card">
                <div class="winner-text">🏆 ${winnerName} WINS! 🏆</div>
                <button onclick="this.closest('.victory-overlay').remove()">CONTINUE</button>
            </div>
        `;
        boardWrapper.appendChild(overlay);
    }
    
    function updateTurnDisplay() {
        if (gameOver) return;
        
        let displayText = '';
        let yourTurn = (currentTurn === playerColor);
        
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            displayText = currentTurn === 'w' ? '🔴 RED' : '⚫ BLACK';
        } else if (currentMode === 'horde') {
            displayText = currentTurn === 'w' ? '⚪ WHITE (HORDE)' : '⚫ BLACK';
        } else {
            displayText = currentTurn === 'w' ? '⚪ WHITE' : '⚫ BLACK';
        }
        
        turnPlayerSpan.innerHTML = `${displayText}'s TURN${yourTurn ? ' (YOU)' : ''}`;
    }
    
    function getPieceDisplay(piece) {
        if (!piece) return '';
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            if (piece.king) {
                if (piece.color === 'w') return '<span class="red-king">👑</span>';
                else return '<span class="black-king">👑</span>';
            }
            return piece.color === 'w' ? '🔴' : '⚫';
        }
        const key = (piece.color === 'w' ? 'w' : 'b') + piece.type;
        return chessSymbols[key] || '';
    }
    
    function checkAntiCheckerWin() {
        if (currentMode !== 'anticheckers') return false;
        
        let hasRed = false, hasBlack = false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = board[i][j];
                if (piece && piece.type === 'checker') {
                    if (piece.color === 'w') hasRed = true;
                    else hasBlack = true;
                }
            }
        }
        
        if (!hasRed) {
            gameOver = true;
            winner = 'BLACK';
            showVictory('BLACK', 'black');
            return true;
        }
        if (!hasBlack) {
            gameOver = true;
            winner = 'RED';
            showVictory('RED', 'red');
            return true;
        }
        return false;
    }
    
    function checkKingOfTheHillWin() {
        if (currentMode !== 'kinghill') return false;
        for (let row = 3; row <= 4; row++) {
            for (let col = 3; col <= 4; col++) {
                const piece = board[row][col];
                if (piece && piece.type === 'k') {
                    gameOver = true;
                    winner = piece.color === 'w' ? 'WHITE' : 'BLACK';
                    showVictory(winner, winner === 'WHITE' ? 'white' : 'black');
                    return true;
                }
            }
        }
        return false;
    }
    
    function initHorde() {
        board = Array(8).fill().map(() => Array(8).fill(null));
        const blackPieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        for (let i = 0; i < 8; i++) {
            board[0][i] = { type: blackPieces[i], color: 'b' };
            board[1][i] = { type: 'p', color: 'b' };
        }
        for (let i = 0; i < 8; i++) {
            board[7][i] = { type: 'p', color: 'w' };
            board[6][i] = { type: 'p', color: 'w' };
            board[5][i] = { type: 'p', color: 'w' };
            board[4][i] = { type: 'p', color: 'w' };
        }
        const row3Pattern = [false, true, true, false, false, true, true, false];
        for (let i = 0; i < 8; i++) {
            if (row3Pattern[i]) board[3][i] = { type: 'p', color: 'w' };
        }
    }
    
    function checkHordeWin() {
        if (currentMode !== 'horde') return false;
        
        let hasBlack = false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                if (board[i][j] && board[i][j].color === 'b') { hasBlack = true; break; }
            }
        }
        if (!hasBlack) {
            gameOver = true;
            showVictory('WHITE', 'white');
            return true;
        }
        
        let hasWhite = false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                if (board[i][j] && board[i][j].color === 'w') { hasWhite = true; break; }
            }
        }
        if (!hasWhite) {
            gameOver = true;
            showVictory('BLACK', 'black');
            return true;
        }
        return false;
    }
    
    function initCheckers() {
        board = Array(8).fill().map(() => Array(8).fill(null));
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                if ((row + col) % 2 === 1) {
                    if (row < 3) board[row][col] = { type: 'checker', color: 'b', king: false };
                    else if (row > 4) board[row][col] = { type: 'checker', color: 'w', king: false };
                }
            }
        }
    }
    
    function generateChess960Position() {
        let pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        let valid = false;
        let attempts = 0;
        while (!valid && attempts < 100) {
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            const kingPos = pieces.indexOf('k');
            const rookPositions = pieces.map((p, idx) => p === 'r' ? idx : -1).filter(i => i !== -1);
            const bishopPositions = pieces.map((p, idx) => p === 'b' ? idx : -1).filter(i => i !== -1);
            if (rookPositions[0] < kingPos && kingPos < rookPositions[1] && (bishopPositions[0] % 2) !== (bishopPositions[1] % 2)) valid = true;
            attempts++;
        }
        return pieces;
    }
    
    function initChess() {
        board = Array(8).fill().map(() => Array(8).fill(null));
        for (let i = 0; i < 8; i++) {
            board[1][i] = { type: 'p', color: 'b' };
            board[6][i] = { type: 'p', color: 'w' };
        }
        
        if (currentMode === 'standard' || currentMode === 'kinghill') {
            const pieces = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board[0][i] = { type: pieces[i], color: 'b' };
                board[7][i] = { type: pieces[i], color: 'w' };
            }
        } else if (currentMode === 'chess960') {
            const whiteBackRow = generateChess960Position();
            const blackBackRow = [...whiteBackRow];
            for (let i = 0; i < 8; i++) {
                board[0][i] = { type: blackBackRow[i], color: 'b' };
                board[7][i] = { type: whiteBackRow[i], color: 'w' };
            }
        }
    }
    
    function initBoard() {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') initCheckers();
        else if (currentMode === 'horde') initHorde();
        else initChess();
    }
    
    function toRowCol(square) {
        const col = square.charCodeAt(0) - 97;
        const row = 8 - parseInt(square[1]);
        return { row, col };
    }
    
    function toSquare(row, col) {
        return String.fromCharCode(97 + col) + (8 - row);
    }
    
    function getCheckersMoves(row, col, boardState) {
        const piece = boardState[row][col];
        if (!piece || piece.type !== 'checker') return [];
        
        const color = piece.color;
        const direction = color === 'w' ? -1 : 1;
        const isKing = piece.king;
        const moves = [];
        const dirs = isKing ? [-1, 1] : [direction];
        
        for (const dr of dirs) {
            for (const dc of [-1, 1]) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                    const target = boardState[newRow][newCol];
                    if (!target) {
                        if (!mustCapture || captureChain) moves.push({ row: newRow, col: newCol, capture: null });
                    } else if (target.color !== color) {
                        const jumpRow = newRow + dr;
                        const jumpCol = newCol + dc;
                        if (jumpRow >= 0 && jumpRow < 8 && jumpCol >= 0 && jumpCol < 8 && !boardState[jumpRow][jumpCol]) {
                            moves.push({ row: jumpRow, col: jumpCol, capture: { row: newRow, col: newCol } });
                        }
                    }
                }
            }
        }
        return moves;
    }
    
    function isCaptureAvailable(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'checker' && piece.color === color) {
                    if (getCheckersMoves(i, j, boardState).some(m => m.capture)) return true;
                }
            }
        }
        return false;
    }
    
    function makeCheckersMove(fromRow, fromCol, toRow, toCol) {
        const piece = board[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;
        
        const moves = getCheckersMoves(fromRow, fromCol, board);
        const validMove = moves.find(m => m.row === toRow && m.col === toCol);
        if (!validMove) return false;
        
        board[toRow][toCol] = board[fromRow][fromCol];
        board[fromRow][fromCol] = null;
        if (validMove.capture) board[validMove.capture.row][validMove.capture.col] = null;
        if ((piece.color === 'w' && toRow === 0) || (piece.color === 'b' && toRow === 7)) board[toRow][toCol].king = true;
        
        const newMoves = getCheckersMoves(toRow, toCol, board);
        if (validMove.capture && newMoves.some(m => m.capture)) {
            captureChain = true;
            mustCapture = true;
            return { success: true, chain: true, fromSquare: toSquare(toRow, toCol) };
        }
        captureChain = false;
        mustCapture = false;
        return { success: true, chain: false };
    }
    
    function hasAnyCheckersMoves(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'checker' && piece.color === color) {
                    if (getCheckersMoves(i, j, boardState).length > 0) return true;
                }
            }
        }
        return false;
    }
    
    function getAllMoves(row, col, boardState) {
        const piece = boardState[row][col];
        if (!piece || piece.type === 'checker') return [];
        
        const color = piece.color;
        const type = piece.type;
        const moves = [];
        
        if (type === 'p') {
            const dir = color === 'w' ? -1 : 1;
            const startRow = color === 'w' ? 6 : 1;
            const r1 = row + dir;
            if (r1 >= 0 && r1 < 8 && !boardState[r1][col]) {
                moves.push({ row: r1, col });
                if (row === startRow && !boardState[r1 + dir][col]) moves.push({ row: r1 + dir, col });
            }
            for (const dc of [-1, 1]) {
                const c = col + dc;
                if (c >= 0 && c < 8) {
                    const r = row + dir;
                    if (r >= 0 && r < 8) {
                        const target = boardState[r][c];
                        if (target && target.color !== color) moves.push({ row: r, col: c });
                    }
                }
            }
        }
        else if (type === 'n') {
            const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
            for (const [dr, dc] of offsets) {
                const r = row + dr, c = col + dc;
                if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target || target.color !== color) moves.push({ row: r, col: c });
                }
            }
        }
        else if (type === 'r' || type === 'q') {
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for (const [dr, dc] of dirs) {
                let r = row + dr, c = col + dc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target) moves.push({ row: r, col: c });
                    else {
                        if (target.color !== color) moves.push({ row: r, col: c });
                        break;
                    }
                    r += dr; c += dc;
                }
            }
        }
        if (type === 'b' || type === 'q') {
            const dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
            for (const [dr, dc] of dirs) {
                let r = row + dr, c = col + dc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const target = boardState[r][c];
                    if (!target) moves.push({ row: r, col: c });
                    else {
                        if (target.color !== color) moves.push({ row: r, col: c });
                        break;
                    }
                    r += dr; c += dc;
                }
            }
        }
        else if (type === 'k') {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                        const target = boardState[r][c];
                        if (!target || target.color !== color) moves.push({ row: r, col: c });
                    }
                }
            }
        }
        return moves;
    }
    
    function isAttacked(row, col, color, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers' || currentMode === 'horde') return false;
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.color !== color && piece.type !== 'checker') {
                    if (getAllMoves(i, j, boardState).some(m => m.row === row && m.col === col)) return true;
                }
            }
        }
        return false;
    }
    
    function findKingPosition(color, boardState) {
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.type === 'k' && piece.color === color) return { row: i, col: j };
            }
        }
        return null;
    }
    
    function getLegalMoves(row, col, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') return getCheckersMoves(row, col, boardState);
        
        const piece = boardState[row][col];
        if (!piece) return [];
        if (currentMode === 'horde' && piece.color === 'w') return getAllMoves(row, col, boardState);
        
        const allMoves = getAllMoves(row, col, boardState);
        const legal = [];
        for (const move of allMoves) {
            const savedTarget = boardState[move.row][move.col];
            const savedPiece = boardState[row][col];
            boardState[move.row][move.col] = boardState[row][col];
            boardState[row][col] = null;
            
            let kingRow, kingCol;
            if (piece.type === 'k') {
                kingRow = move.row;
                kingCol = move.col;
            } else {
                const kingPos = findKingPosition(piece.color, boardState);
                if (kingPos) {
                    kingRow = kingPos.row;
                    kingCol = kingPos.col;
                } else {
                    boardState[row][col] = savedPiece;
                    boardState[move.row][move.col] = savedTarget;
                    legal.push(move);
                    continue;
                }
            }
            
            const safe = !isAttacked(kingRow, kingCol, piece.color, boardState);
            boardState[row][col] = savedPiece;
            boardState[move.row][move.col] = savedTarget;
            if (safe) legal.push(move);
        }
        return legal;
    }
    
    function hasAnyLegalMoves(color, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') return hasAnyCheckersMoves(color, boardState);
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const piece = boardState[i][j];
                if (piece && piece.color === color && getLegalMoves(i, j, boardState).length > 0) return true;
            }
        }
        return false;
    }
    
    function inCheck(color, boardState) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers' || currentMode === 'horde') return false;
        const kingPos = findKingPosition(color, boardState);
        return kingPos && isAttacked(kingPos.row, kingPos.col, color, boardState);
    }
    
    function makeMove(fromRow, fromCol, toRow, toCol) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers') {
            const result = makeCheckersMove(fromRow, fromCol, toRow, toCol);
            if (result && result.success) {
                lastMoveFrom = toSquare(fromRow, fromCol);
                lastMoveTo = toSquare(toRow, toCol);
                lastMoveSpan.innerHTML = `${lastMoveFrom}→${lastMoveTo}`;
                currentTurn = currentTurn === 'w' ? 'b' : 'w';
                
                if (result.chain) {
                    currentTurn = currentTurn === 'w' ? 'b' : 'w';
                    selectedSquare = result.fromSquare;
                    const { row: sr, col: sc } = toRowCol(result.fromSquare);
                    validMovesList = getLegalMoves(sr, sc, board);
                    renderBoard();
                    return true;
                }
                
                if (currentMode === 'anticheckers') checkAntiCheckerWin();
                else {
                    if (!hasAnyLegalMoves(currentTurn, board)) {
                        gameOver = true;
                        showVictory(currentTurn === 'w' ? 'BLACK' : 'RED', currentTurn === 'w' ? 'black' : 'red');
                    }
                }
                return true;
            }
            return false;
        }
        
        const piece = board[fromRow][fromCol];
        if (!piece || piece.color !== currentTurn) return false;
        
        const legalMoves = getLegalMoves(fromRow, fromCol, board);
        if (!legalMoves.some(m => m.row === toRow && m.col === toCol)) return false;
        
        const fromSquare = toSquare(fromRow, fromCol);
        const toSquareName = toSquare(toRow, toCol);
        const capturedPiece = board[toRow][toCol];
        
        board[toRow][toCol] = board[fromRow][fromCol];
        board[fromRow][fromCol] = null;
        if (piece.type === 'p' && (toRow === 0 || toRow === 7)) board[toRow][toCol] = { type: 'q', color: piece.color };
        
        lastMoveFrom = fromSquare;
        lastMoveTo = toSquareName;
        lastMoveSpan.innerHTML = `${fromSquare}→${toSquareName}`;
        currentTurn = currentTurn === 'w' ? 'b' : 'w';
        
        checkKingOfTheHillWin();
        checkHordeWin();
        
        if (!gameOver && !hasAnyLegalMoves(currentTurn, board)) {
            gameOver = true;
            if (inCheck(currentTurn, board)) showVictory(currentTurn === 'w' ? 'BLACK' : 'WHITE', currentTurn === 'w' ? 'black' : 'white');
            else showVictory('STALEMATE', 'draw');
        }
        
        return true;
    }
    
    function isSquareInCheck(row, col) {
        if (currentMode === 'checkers' || currentMode === 'anticheckers' || currentMode === 'horde') return false;
        const piece = board[row][col];
        return piece && piece.type === 'k' && isAttacked(row, col, piece.color, board);
    }
    
    function isHillSquare(row, col) {
        return currentMode === 'kinghill' && row >= 3 && row <= 4 && col >= 3 && col <= 4;
    }
    
    function renderBoard() {
        boardDiv.innerHTML = '';
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = board[row][col];
                const isLight = (row + col) % 2 === 0;
                const squareName = toSquare(row, col);
                
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light' : 'dark'}`;
                if (selectedSquare === squareName) square.classList.add('selected');
                if (lastMoveFrom === squareName) square.classList.add('last-move-from');
                if (lastMoveTo === squareName) square.classList.add('last-move-to');
                if (isSquareInCheck(row, col)) square.classList.add('in-check');
                if (isHillSquare(row, col)) square.classList.add('hill-square');
                
                const isValidTarget = validMovesList.some(m => m.row === row && m.col === col);
                if (isValidTarget) {
                    square.classList.add('valid-move');
                    if (board[row][col] && board[row][col].color !== currentTurn) square.classList.add('capture');
                }
                
                const span = document.createElement('span');
                const displayValue = getPieceDisplay(piece);
                if (displayValue.includes('red-king') || displayValue.includes('black-king')) span.innerHTML = displayValue;
                else span.textContent = displayValue;
                square.appendChild(span);
                square.addEventListener('click', (r, c) => () => handleSquareClick(toSquare(r, c))(row, col));
                boardDiv.appendChild(square);
            }
        }
        updateTurnDisplay();
    }
    
    function handleSquareClick(square) {
        if (gameOver) return;
        if (currentRoomId && playerColor !== currentTurn) return;
        
        const { row, col } = toRowCol(square);
        
        if (!selectedSquare) {
            const piece = board[row][col];
            if (!piece || piece.color !== currentTurn) return;
            if (currentMode === 'checkers' || currentMode === 'anticheckers') mustCapture = isCaptureAvailable(currentTurn, board);
            selectedSquare = square;
            validMovesList = getLegalMoves(row, col, board);
            if (mustCapture) validMovesList = validMovesList.filter(m => m.capture);
            if (validMovesList.length === 0) selectedSquare = null;
            else renderBoard();
        } else {
            const { row: fromRow, col: fromCol } = toRowCol(selectedSquare);
            const success = makeMove(fromRow, fromCol, row, col);
            selectedSquare = null;
            validMovesList = [];
            renderBoard();
            
            if (success && currentRoomId && database) {
                syncGameState();
            }
        }
    }
    
    function syncGameState() {
        if (!database || !currentRoomId) return;
        const state = {
            board: board,
            currentTurn: currentTurn,
            gameOver: gameOver,
            winner: winner,
            currentMode: currentMode,
            lastMoveFrom: lastMoveFrom,
            lastMoveTo: lastMoveTo,
            lastMove: lastMoveSpan.innerHTML
        };
        database.ref(`games/${currentRoomId}`).set(state);
    }
    
    function resetGame() {
        initBoard();
        currentTurn = 'w';
        selectedSquare = null;
        validMovesList = [];
        gameOver = false;
        winner = null;
        mustCapture = false;
        captureChain = false;
        lastMoveFrom = null;
        lastMoveTo = null;
        renderBoard();
        lastMoveSpan.innerHTML = "None";
        if (currentRoomId && database) syncGameState();
    }
    
    function switchMode(mode) {
        if (currentRoomId && playerColor !== 'w') return;
        currentMode = mode;
        resetGame();
        modeBtns.forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // ==================== MULTIPLAYER ====================
    function createGameRoom() {
        const roomCode = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        currentRoomId = roomCode;
        playerColor = 'w';
        initBoard();
        currentTurn = 'w';
        renderBoard();
        
        if (database) {
            syncGameState();
            startGameListener();
        }
        
        showGameScreen(roomCode);
        showQRCode(roomCode);
    }
    
    function joinGameRoom(roomCode) {
        if (!database) {
            waitingStatus.innerHTML = '⚠️ Firebase required. Check config.';
            return;
        }
        currentRoomId = roomCode;
        playerColor = 'b';
        database.ref(`games/${roomCode}`).once('value', (snapshot) => {
            if (snapshot.exists()) {
                loadGameState(snapshot.val());
                startGameListener();
                showGameScreen(roomCode);
            } else {
                waitingStatus.innerHTML = '❌ Room not found!';
            }
        });
    }
    
    function loadGameState(state) {
        board = state.board;
        currentTurn = state.currentTurn;
        gameOver = state.gameOver;
        winner = state.winner;
        currentMode = state.currentMode;
        lastMoveFrom = state.lastMoveFrom;
        lastMoveTo = state.lastMoveTo;
        if (state.lastMove) lastMoveSpan.innerHTML = state.lastMove;
        renderBoard();
        
        modeBtns.forEach(btn => {
            if (btn.dataset.mode === currentMode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function startGameListener() {
        if (gameStateListener) database.ref(`games/${currentRoomId}`).off();
        gameStateListener = database.ref(`games/${currentRoomId}`);
        gameStateListener.on('value', (snapshot) => {
            if (snapshot.exists() && snapshot.val()) {
                const newState = snapshot.val();
                if (JSON.stringify(board) !== JSON.stringify(newState.board)) {
                    loadGameState(newState);
                }
            }
        });
    }
    
    function showGameScreen(roomCode) {
        connectionScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        roomCodeDisplay.innerHTML = `Room: ${roomCode}`;
        playerRoleSpan.innerHTML = playerColor === 'w' ? '⚪ WHITE (Creator)' : '⚫ BLACK (Joiner)';
    }
    
    function showQRCode(roomCode) {
        const url = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
        qrContainer.innerHTML = `<div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}" alt="QR"><p style="margin-top:10px;font-size:12px;">Scan to join</p></div>`;
    }
    
    function leaveGame() {
        if (gameStateListener && database) database.ref(`games/${currentRoomId}`).off();
        currentRoomId = null;
        playerColor = null;
        connectionScreen.style.display = 'flex';
        gameScreen.style.display = 'none';
        waitingStatus.innerHTML = '';
        qrContainer.innerHTML = '';
        initBoard();
        currentTurn = 'w';
        renderBoard();
    }
    
    function checkUrlForRoom() {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');
        if (room && room.length === 6) {
            document.getElementById('joinCodeInput').value = room;
            setTimeout(() => joinGameRoom(room), 500);
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('createGameBtn').addEventListener('click', createGameRoom);
    document.getElementById('joinGameBtn').addEventListener('click', () => joinGameRoom(document.getElementById('joinCodeInput').value.trim()));
    document.getElementById('leaveBtn').addEventListener('click', leaveGame);
    resetBtn.addEventListener('click', resetGame);
    modeBtns.forEach(btn => btn.addEventListener('click', () => switchMode(btn.dataset.mode)));
    
    checkUrlForRoom();
    initBoard();
    renderBoard();
</script>
</body>
